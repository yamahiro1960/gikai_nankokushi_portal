<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議案や資料のアーカイブ | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- ヘッダー -->
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                    <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
                </a>
            </div>
            <span class="text-sm">議案や資料のアーカイブ</span>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルトップに戻る
            </a>
        </div>

        <section class="rounded-2xl p-6 md:p-8 bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg mb-8">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">議案や資料のアーカイブ</h1>
                    <p class="text-blue-50">予算書や会議録を全文検索し、必要な資料へすぐにアクセスできます。</p>
                </div>
                <div class="text-sm bg-white/20 px-3 py-2 rounded-lg">モード: 資料検索</div>
            </div>
        </section>

        <!-- 検索エリア -->
        <div class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h2 class="text-lg font-bold mb-4">資料を検索</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <input type="text" placeholder="キーワードで検索..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="w-full md:w-48">
                    <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option>すべての種類</option>
                        <option>予算書</option>
                        <option>決算書</option>
                        <option>会議録</option>
                        <option>議案資料</option>
                        <option>委員会資料</option>
                    </select>
                </div>
                <button class="bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-800 transition">
                    <i class="fas fa-search mr-2"></i>検索
                </button>
            </div>
        </div>

        <section class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h2 class="text-xl font-bold mb-4">議会回次から選択</h2>
            <p class="text-sm text-gray-600 mb-5">以下のボタンから回次を選ぶと、各回次の議案（第1号〜第30号）ページへ移動します。</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <a href="assembly-documents.html?session=446" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第446回議会</a>
                <a href="assembly-documents.html?session=445" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第445回議会</a>
                <a href="assembly-documents.html?session=444" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第444回議会</a>
                <a href="assembly-documents.html?session=443" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第443回議会</a>
                <a href="assembly-documents.html?session=442" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第442回議会</a>
                <a href="assembly-documents.html?session=441" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第441回議会</a>
                <a href="assembly-documents.html?session=440" class="bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition">第440回議会</a>
            </div>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "archive.html"
        });
    </script>
</body>
</html>
