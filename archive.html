<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議案や資料のアーカイブ | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- ヘッダー -->
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                    <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
                </a>
            </div>
            <span class="text-sm">議案や資料のアーカイブ</span>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルトップに戻る
            </a>
        </div>

        <section class="rounded-2xl p-6 md:p-8 bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg mb-8">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">議案や資料のアーカイブ</h1>
                    <p class="text-blue-50">予算書や会議録を全文検索し、必要な資料へすぐにアクセスできます。</p>
                </div>
                <div class="text-sm bg-white/20 px-3 py-2 rounded-lg">モード: 資料検索</div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h2 class="text-xl font-bold mb-4">議会回次から選択</h2>
            <p class="text-sm text-gray-600 mb-5">以下のボタンから回次を選ぶと、各回次の議案ページへ移動します。</p>
            <div id="session-buttons" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <p class="text-sm text-gray-500">回次一覧を読み込んでいます...</p>
            </div>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        const DEFAULT_SESSIONS = ["446", "445", "444", "443", "442", "441", "440"];

        function renderSessionButtons(sessions) {
            const container = document.getElementById("session-buttons");
            container.innerHTML = "";

            if (!sessions.length) {
                const message = document.createElement("p");
                message.className = "text-sm text-gray-500";
                message.textContent = "表示できる回次がありません。";
                container.appendChild(message);
                return;
            }

            for (const session of sessions) {
                const link = document.createElement("a");
                link.href = `assembly-documents.html?session=${encodeURIComponent(session)}`;
                link.className = "bg-indigo-700 text-white px-4 py-3 rounded-lg font-semibold text-center hover:bg-indigo-800 transition";
                link.textContent = `第${session}回議会`;
                container.appendChild(link);
            }
        }

        async function loadArchiveSessions() {
            const sessionSet = new Set(DEFAULT_SESSIONS);

            try {
                const supabase = window.portalAuth && typeof window.portalAuth.ensureClient === "function"
                    ? window.portalAuth.ensureClient()
                    : window.supabase.createClient(window.AUTH_CONFIG.supabaseUrl, window.AUTH_CONFIG.supabaseAnonKey);

                const { data, error } = await supabase
                    .from("meeting_settings")
                    .select("setting_key, setting_payload")
                    .like("setting_key", "uploaded_documents_%");

                if (!error && data) {
                    for (const record of data) {
                        const payloadSession = record.setting_payload && record.setting_payload.session;
                        const keyMatch = /^uploaded_documents_(\d+)_/.exec(record.setting_key || "");
                        const session = String(payloadSession || (keyMatch ? keyMatch[1] : "")).trim();
                        if (/^\d+$/.test(session)) {
                            sessionSet.add(session);
                        }
                    }
                }
            } catch (error) {
                console.warn("回次一覧の読込に失敗しました:", error);
            }

            const sessions = Array.from(sessionSet).sort((left, right) => Number(right) - Number(left));
            renderSessionButtons(sessions);
        }

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "archive.html",
            onReady: loadArchiveSessions
        });
    </script>
</body>
</html>
