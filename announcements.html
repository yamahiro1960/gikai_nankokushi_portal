<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ一覧 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
            </a>
            <div class="text-right">
                <span class="text-sm">お知らせ一覧</span>
                <div id="authArea"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6 flex flex-wrap gap-3">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルに戻る
            </a>
            <a href="announcement-register.html" class="text-rose-700 hover:text-rose-900 text-sm font-semibold">
                <i class="fas fa-pen-to-square mr-1"></i>お知らせを登録する
            </a>
        </div>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-rose-500">
            <h1 class="text-2xl font-bold mb-2 text-gray-700">お知らせ一覧</h1>
            <p class="text-sm text-gray-600 mb-4">過去のお知らせを含めて、新しい順に表示します。</p>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="text-left p-2 border">日付</th>
                            <th class="text-left p-2 border">時間</th>
                            <th class="text-left p-2 border">タイトル</th>
                            <th class="text-left p-2 border">内容</th>
                            <th class="text-left p-2 border">登録者</th>
                            <th class="text-left p-2 border">出欠確認</th>
                            <th class="text-left p-2 border">操作</th>
                        </tr>
                    </thead>
                    <tbody id="announcement-list">
                        <tr>
                            <td class="p-2 border text-gray-500" colspan="7">読み込み中です...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p id="announcement-edit-note" class="mt-2 text-xs text-gray-500 hidden">修正は管理者のみ可能です。</p>
            <p id="announcement-message" class="mt-3 text-sm text-gray-600"></p>
        </section>

        <section id="attendance-admin-section" class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-indigo-500 mt-6 hidden">
            <h2 class="text-xl font-bold mb-2 text-gray-700">未回答者抽出（管理者）</h2>
            <p class="text-sm text-gray-600 mb-4">出欠確認ありのお知らせを選ぶと、未回答者のみを表示します。</p>

            <div class="flex flex-col md:flex-row md:items-end gap-3 mb-4">
                <div class="flex-1">
                    <label for="attendance-target-select" class="text-sm font-semibold text-gray-700">対象お知らせ</label>
                    <select id="attendance-target-select" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></select>
                </div>
                <button id="attendance-refresh-btn" type="button" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">再読み込み</button>
            </div>

            <p id="attendance-summary" class="text-sm text-gray-700 mb-3"></p>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="text-left p-2 border">氏名</th>
                            <th class="text-left p-2 border">メール</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-unanswered-list">
                        <tr>
                            <td class="p-2 border text-gray-500" colspan="2">対象を選択してください。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="announcement-edit-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4">お知らせを修正</h2>
            <form id="announcement-edit-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="edit_notice_no" type="hidden">
                <div>
                    <label class="text-sm font-semibold text-gray-700">日付</label>
                    <input id="edit_notice_date" type="date" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">タイトル</label>
                    <input id="edit_notice_title" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">開始時間</label>
                    <input id="edit_start_time" type="time" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">終了時間</label>
                    <input id="edit_end_time" type="time" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">内容</label>
                    <textarea id="edit_notice_content" rows="3" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">登録者</label>
                    <input id="edit_owner_name" readonly class="mt-1 w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-700">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">連絡先電話</label>
                    <input id="edit_contact_phone" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">連絡先メール</label>
                    <input id="edit_contact_email" type="email" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">備考</label>
                    <input id="edit_remarks" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="flex items-center gap-2">
                        <input id="edit_attendance_required" type="checkbox" class="w-4 h-4">
                        <span class="text-sm font-semibold text-gray-700">このお知らせで出欠確認を行う</span>
                    </label>
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">回答期限（出欠確認ありの場合）</label>
                    <input id="edit_attendance_deadline" type="datetime-local" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" disabled>
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">配信対象</label>
                    <div class="mt-2 space-y-2">
                        <label class="flex items-center gap-2">
                            <input id="edit_visibility_all" type="radio" name="edit_visibility" value="all" checked class="w-4 h-4">
                            <span class="text-sm">全員に配信</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input id="edit_visibility_specific" type="radio" name="edit_visibility" value="specific" class="w-4 h-4">
                            <span class="text-sm">特定のメンバーのみに配信</span>
                        </label>
                    </div>
                </div>
                <div id="edit-specific-members-section" class="md:col-span-2 hidden">
                    <label class="text-sm font-semibold text-gray-700 block mb-2">グループ選択（複数可）</label>
                    <div id="edit-member-group-list" class="border border-gray-300 rounded-lg p-3 bg-gray-50 mb-3">
                        <p class="text-sm text-gray-500">グループ読み込み中...</p>
                    </div>
                    <label class="text-sm font-semibold text-gray-700 block mb-2">配信対象メンバー</label>
                    <div id="edit-members-list" class="border border-gray-300 rounded-lg p-3 max-h-48 overflow-y-auto bg-gray-50">
                        <p class="text-sm text-gray-500">メンバー読み込み中...</p>
                    </div>
                </div>
                <div class="md:col-span-2 flex gap-3 justify-end pt-2">
                    <button type="button" id="announcement-edit-cancel" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold">閉じる</button>
                    <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">保存</button>
                </div>
            </form>
            <p id="announcement-edit-message" class="mt-3 text-sm text-gray-600"></p>
        </div>
    </div>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;
        let currentRole = "viewer";
        let currentUserEmail = "";
        let allMembers = [];
        let currentEditingAnnouncementNo = null;
        let currentOwnerName = "未設定";
        const announcementByNo = new Map();
        const myAttendanceByNo = new Map();
        const attendanceStatsByNo = new Map();
        const recipientsCountByNo = new Map();
        let attendanceAnnouncements = [];

        const MEMBER_GROUPS = [
            { id: "leaders", label: "正副議長" },
            { id: "giun", label: "議会運営委員会" },
            { id: "soumu", label: "総務委員会" },
            { id: "sangyo", label: "産業建設委員会" },
            { id: "kyoiku", label: "教育民生委員会" },
            { id: "editorial", label: "編集委員会" }
        ];

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

            function isAnnouncementRecipientsTableMissing(error) {
                const message = String(error?.message || "").toLowerCase();
                const details = String(error?.details || "").toLowerCase();
                const hint = String(error?.hint || "").toLowerCase();
                return (
                    message.includes("could not find the table 'public.announcement_recipients'") ||
                    message.includes('relation "public.announcement_recipients" does not exist') ||
                    details.includes("public.announcement_recipients") ||
                    hint.includes("public.announcement_recipients")
                );
            }

            function buildAnnouncementRecipientsMissingMessage() {
                return "配信対象テーブル(public.announcement_recipients)が未反映です。Supabase SQL Editor で supabase_setup.sql を実行後、NOTIFY pgrst, 'reload schema'; を実行してください。";
            }

            function normalizeEmail(value) {
                return String(value || "").trim().toLowerCase();
            }

        function formatDate(dateValue) {
            if (!dateValue) return "";
            const parts = String(dateValue).split("-");
            if (parts.length !== 3) return String(dateValue);
            return `${parts[0]}/${parts[1]}/${parts[2]}`;
        }

        function formatTimeRange(startTime, endTime) {
            const start = startTime ? String(startTime).slice(0, 5) : "--:--";
            const end = endTime ? String(endTime).slice(0, 5) : "--:--";
            return `${start} - ${end}`;
        }

        function resolveOwnerName(session, profile) {
            return (session && session.displayName)
                || (profile && profile.display_name)
                || (session && session.email)
                || "未設定";
        }

        function formatDateTime(dateTimeValue) {
            if (!dateTimeValue) return "未設定";
            const dt = new Date(dateTimeValue);
            if (Number.isNaN(dt.getTime())) return String(dateTimeValue);
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, "0");
            const d = String(dt.getDate()).padStart(2, "0");
            const hh = String(dt.getHours()).padStart(2, "0");
            const mm = String(dt.getMinutes()).padStart(2, "0");
            return `${y}/${m}/${d} ${hh}:${mm}`;
        }

        function attendanceStatusLabel(status) {
            if (status === "attend") return "出席";
            if (status === "absent") return "欠席";
            if (status === "pending") return "未定";
            return "未回答";
        }

        function attendanceStatusBadgeClass(status) {
            if (status === "attend") return "bg-emerald-100 text-emerald-700";
            if (status === "absent") return "bg-rose-100 text-rose-700";
            if (status === "pending") return "bg-amber-100 text-amber-700";
            return "bg-gray-100 text-gray-600";
        }

        function getMembersWithEmail() {
            const normalized = new Set();
            const result = [];
            allMembers.forEach((member) => {
                const email = normalizeEmail(member.email);
                if (!email || normalized.has(email)) {
                    return;
                }
                normalized.add(email);
                result.push({
                    email,
                    name: member.full_name || email
                });
            });
            return result;
        }

        function buildAttendanceSelectLabel(item) {
            const dateText = formatDate(item.notice_date);
            const timeText = formatTimeRange(item.start_time, item.end_time);
            return `${dateText} ${timeText} ${item.title || ""}`.trim();
        }

        async function loadUnansweredMembers(announcementNo) {
            const tbody = document.getElementById("attendance-unanswered-list");
            const summary = document.getElementById("attendance-summary");

            tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="2">読み込み中です...</td></tr>';
            summary.textContent = "";

            const item = announcementByNo.get(Number(announcementNo));
            if (!item || !item.attendance_required) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="2">対象のお知らせが見つかりません。</td></tr>';
                return;
            }

            let targets = [];
            if (item.visibility === "specific") {
                const { data: recipients, error: recipientsError } = await dbClient
                    .from("announcement_recipients")
                    .select("recipient_email,recipient_name")
                    .eq("announcement_no", item.no);

                if (recipientsError) {
                    tbody.innerHTML = `<tr><td class="p-2 border text-red-600" colspan="2">配信対象の取得に失敗しました: ${escapeHtml(recipientsError.message)}</td></tr>`;
                    return;
                }

                targets = (recipients || []).map((row) => ({
                    email: normalizeEmail(row.recipient_email),
                    name: row.recipient_name || row.recipient_email
                }));
            } else {
                targets = getMembersWithEmail();
            }

            const dedupMap = new Map();
            targets.forEach((target) => {
                if (!target.email || dedupMap.has(target.email)) {
                    return;
                }
                dedupMap.set(target.email, target);
            });
            const dedupTargets = Array.from(dedupMap.values());

            const { data: responses, error: responseError } = await dbClient
                .from("announcement_attendance_responses")
                .select("responder_email")
                .eq("announcement_no", item.no);

            if (responseError) {
                tbody.innerHTML = `<tr><td class="p-2 border text-red-600" colspan="2">回答の取得に失敗しました: ${escapeHtml(responseError.message)}</td></tr>`;
                return;
            }

            const answeredSet = new Set((responses || []).map((row) => normalizeEmail(row.responder_email)).filter(Boolean));
            const unanswered = dedupTargets.filter((target) => !answeredSet.has(target.email));

            const deadlineText = item.attendance_deadline ? ` / 回答期限: ${formatDateTime(item.attendance_deadline)}` : "";
            summary.textContent = `対象: ${dedupTargets.length}名 / 回答済み: ${answeredSet.size}名 / 未回答: ${unanswered.length}名${deadlineText}`;

            if (unanswered.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-emerald-700" colspan="2">未回答者はいません。</td></tr>';
                return;
            }

            tbody.innerHTML = unanswered.map((row) => `
                <tr>
                    <td class="p-2 border">${escapeHtml(row.name || "-")}</td>
                    <td class="p-2 border">${escapeHtml(row.email || "-")}</td>
                </tr>
            `).join("");
        }

        async function renderAttendanceAdminSection(rows) {
            const section = document.getElementById("attendance-admin-section");
            const select = document.getElementById("attendance-target-select");
            const tbody = document.getElementById("attendance-unanswered-list");
            const summary = document.getElementById("attendance-summary");

            if (currentRole !== "admin") {
                section.classList.add("hidden");
                return;
            }

            section.classList.remove("hidden");
            attendanceAnnouncements = (rows || []).filter((item) => Boolean(item.attendance_required));

            if (attendanceAnnouncements.length === 0) {
                select.innerHTML = '<option value="">出欠確認ありのお知らせはありません</option>';
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="2">出欠確認ありのお知らせを登録すると抽出できます。</td></tr>';
                summary.textContent = "";
                return;
            }

            const prevSelected = Number(select.value || "0");
            select.innerHTML = attendanceAnnouncements.map((item) => {
                return `<option value="${item.no}">${escapeHtml(buildAttendanceSelectLabel(item))}</option>`;
            }).join("");

            const target = attendanceAnnouncements.find((item) => Number(item.no) === prevSelected) || attendanceAnnouncements[0];
            select.value = String(target.no);
            await loadUnansweredMembers(target.no);
        }

        function normalizeText(value) {
            return String(value || "").replace(/\s+/g, "").trim();
        }

        function memberBelongsToGroup(member, groupId) {
            const positionName = String(member.position_name || "").trim();
            const committeeName = normalizeText(member.committee);

            if (groupId === "leaders") {
                return positionName === "議長" || positionName === "副議長";
            }
            if (groupId === "giun") {
                return Boolean(member.is_giun);
            }
            if (groupId === "soumu") {
                return committeeName.includes("総務委員会");
            }
            if (groupId === "sangyo") {
                return committeeName.includes("産業建設委員会");
            }
            if (groupId === "kyoiku") {
                return committeeName.includes("教育民生委員会");
            }
            if (groupId === "editorial") {
                return Boolean(member.is_editorial_committee);
            }

            return false;
        }

        function renderEditGroupList() {
            const container = document.getElementById("edit-member-group-list");
            container.innerHTML = MEMBER_GROUPS.map((group) => `
                <label class="inline-flex items-center gap-2 p-2 mr-3 mb-2 hover:bg-white rounded cursor-pointer">
                    <input type="checkbox" value="${group.id}" class="edit-member-group-checkbox w-4 h-4">
                    <span class="text-sm">${group.label}</span>
                </label>
            `).join("");

            container.querySelectorAll(".edit-member-group-checkbox").forEach((checkbox) => {
                checkbox.addEventListener("change", applyEditGroupSelectionToMembers);
            });
        }

        function applyEditGroupSelectionToMembers() {
            const selectedGroupIds = new Set(
                Array.from(document.querySelectorAll("#edit-member-group-list .edit-member-group-checkbox:checked")).map((checkbox) => checkbox.value)
            );

            document.querySelectorAll("#edit-members-list .member-checkbox").forEach((checkbox) => {
                const member = allMembers.find((item) => item.email === checkbox.value);
                if (!member) {
                    return;
                }
                const shouldSelect = Array.from(selectedGroupIds).some((groupId) => memberBelongsToGroup(member, groupId));
                checkbox.checked = shouldSelect;
            });
        }

        function closeEditModal() {
            document.getElementById("announcement-edit-modal").classList.add("hidden");
            document.getElementById("announcement-edit-message").textContent = "";
        }

        function openEditModal(item) {
            currentEditingAnnouncementNo = Number(item.no || "");
            document.getElementById("edit_notice_no").value = String(item.no || "");
            document.getElementById("edit_notice_date").value = item.notice_date || "";
            document.getElementById("edit_start_time").value = String(item.start_time || "").slice(0, 5);
            document.getElementById("edit_end_time").value = String(item.end_time || "").slice(0, 5);
            document.getElementById("edit_notice_title").value = item.title || "";
            document.getElementById("edit_notice_content").value = item.content || "";
            document.getElementById("edit_owner_name").value = currentOwnerName || "未設定";
            document.getElementById("edit_contact_phone").value = item.contact_phone || "";
            document.getElementById("edit_contact_email").value = item.contact_email || "";
            document.getElementById("edit_remarks").value = item.remarks || "";
            document.getElementById("edit_attendance_required").checked = Boolean(item.attendance_required);
            document.getElementById("edit_attendance_deadline").value = item.attendance_deadline
                ? new Date(item.attendance_deadline).toISOString().slice(0, 16)
                : "";
            document.getElementById("edit_attendance_deadline").disabled = !item.attendance_required;
            
            // 配信対象を設定
            const visibility = item.visibility || 'all';
            document.getElementById("edit_visibility_all").checked = (visibility === 'all');
            document.getElementById("edit_visibility_specific").checked = (visibility === 'specific');
            
            if (visibility === 'specific') {
                document.getElementById("edit-specific-members-section").classList.remove("hidden");
                document.querySelectorAll("#edit-member-group-list .edit-member-group-checkbox").forEach((checkbox) => {
                    checkbox.checked = false;
                });
                loadEditMembersList(item.no);
            } else {
                document.getElementById("edit-specific-members-section").classList.add("hidden");
            }
            
            document.getElementById("announcement-edit-message").textContent = "";
            document.getElementById("announcement-edit-modal").classList.remove("hidden");
        }

        async function saveAnnouncementEdit(event) {
            event.preventDefault();

            const noValue = Number(document.getElementById("edit_notice_no").value);
            const visibility = document.querySelector('input[name="edit_visibility"]:checked').value;
            let selectedMembers = [];
            
            if (visibility === "specific") {
                const checkboxes = document.querySelectorAll("#edit-members-list .member-checkbox:checked");
                if (checkboxes.length === 0) {
                    document.getElementById("announcement-edit-message").textContent = "配信対象メンバーを選択してください。";
                    return;
                }
                selectedMembers = Array.from(checkboxes).map(cb => cb.value);
            }

            const payload = {
                notice_date: document.getElementById("edit_notice_date").value,
                start_time: document.getElementById("edit_start_time").value,
                end_time: document.getElementById("edit_end_time").value,
                title: document.getElementById("edit_notice_title").value.trim(),
                content: document.getElementById("edit_notice_content").value.trim(),
                owner_name: currentOwnerName || "未設定",
                contact_phone: document.getElementById("edit_contact_phone").value.trim() || null,
                contact_email: document.getElementById("edit_contact_email").value.trim() || null,
                remarks: document.getElementById("edit_remarks").value.trim() || null,
                attendance_required: document.getElementById("edit_attendance_required").checked,
                attendance_deadline: null,
                visibility: visibility,
                updated_at: new Date().toISOString()
            };

            const editMessage = document.getElementById("announcement-edit-message");
            if (!noValue || !payload.notice_date || !payload.start_time || !payload.end_time || !payload.title || !payload.content) {
                editMessage.textContent = "必須項目を入力してください。";
                return;
            }

            if (payload.start_time > payload.end_time) {
                editMessage.textContent = "時間の入力を確認してください（開始時間 <= 終了時間）。";
                return;
            }

            if (payload.attendance_required) {
                const deadlineInput = document.getElementById("edit_attendance_deadline").value;
                if (!deadlineInput) {
                    editMessage.textContent = "出欠確認を行う場合は回答期限を入力してください。";
                    return;
                }
                payload.attendance_deadline = new Date(deadlineInput).toISOString();
            }

            if (!payload.attendance_required) {
                payload.attendance_deadline = null;
            }

            const { error } = await dbClient
                .from("announcements")
                .update(payload)
                .eq("no", noValue);

            if (error) {
                editMessage.textContent = "更新失敗: " + error.message;
                return;
            }

            // 配信対象を更新
            if (visibility === "specific") {
                // 既存の配信対象を削除
                const { error: deleteRecipientError } = await dbClient
                    .from("announcement_recipients")
                    .delete()
                    .eq("announcement_no", noValue);

                if (deleteRecipientError) {
                    editMessage.textContent = isAnnouncementRecipientsTableMissing(deleteRecipientError)
                        ? buildAnnouncementRecipientsMissingMessage()
                        : "配信対象の更新準備に失敗しました: " + deleteRecipientError.message;
                    return;
                }

                // 新しい配信対象を挿入
                const recipients = selectedMembers.map(email => {
                    const member = allMembers.find(m => m.email === email);
                    return {
                        announcement_no: noValue,
                        recipient_email: email,
                        recipient_name: member?.full_name || email
                    };
                });

                const { error: recipientError } = await dbClient
                    .from("announcement_recipients")
                    .insert(recipients);

                if (recipientError) {
                    editMessage.textContent = isAnnouncementRecipientsTableMissing(recipientError)
                        ? buildAnnouncementRecipientsMissingMessage()
                        : "配信対象の保存に失敗しました: " + recipientError.message;
                    return;
                }
            } else {
                // 'all' の場合は配信対象を削除
                const { error: deleteRecipientError } = await dbClient
                    .from("announcement_recipients")
                    .delete()
                    .eq("announcement_no", noValue);

                if (deleteRecipientError) {
                    editMessage.textContent = isAnnouncementRecipientsTableMissing(deleteRecipientError)
                        ? buildAnnouncementRecipientsMissingMessage()
                        : "配信対象の削除に失敗しました: " + deleteRecipientError.message;
                    return;
                }
            }

            closeEditModal();
            document.getElementById("announcement-message").textContent = "修正しました。";
            await loadAnnouncements();
        }

        async function loadEditMembersList(announcementNo) {
            const container = document.getElementById("edit-members-list");
            container.innerHTML = '<p class="text-sm text-gray-500">メンバー読み込み中...</p>';

            // 既存の配信対象メンバーを取得
            const { data: recipients, error: recipientError } = await dbClient
                .from("announcement_recipients")
                .select("recipient_email")
                .eq("announcement_no", announcementNo);

            if (recipientError) {
                console.error("配信対象読み込みエラー:", recipientError);
            }

            const selectedEmails = new Set((recipients || []).map(r => r.recipient_email));

            if (allMembers.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500">メンバーがいません。</p>';
                return;
            }

            container.innerHTML = allMembers.map((member, idx) => `
                <label class="flex items-center gap-2 p-2 hover:bg-white rounded cursor-pointer">
                    <input type="checkbox" value="${member.email}" class="member-checkbox w-4 h-4" ${selectedEmails.has(member.email) ? 'checked' : ''}>
                    <span class="text-sm">${member.full_name} (${member.email})</span>
                </label>
            `).join("");
        }

        async function loadAnnouncements() {
            const tbody = document.getElementById("announcement-list");
            const message = document.getElementById("announcement-message");
            tbody.innerHTML = "";
            message.textContent = "";
            announcementByNo.clear();
            myAttendanceByNo.clear();
            attendanceStatsByNo.clear();
            recipientsCountByNo.clear();

            const baseSelect = "notice_date,start_time,end_time,title,content,owner_name,contact_phone,contact_email,remarks,no,visibility,attendance_required,attendance_deadline";
            const { data, error } = await dbClient
                .from("announcements")
                .select(baseSelect)
                .order("notice_date", { ascending: false })
                .order("start_time", { ascending: false })
                .order("no", { ascending: false });

            if (error) {
                message.textContent = "一覧読込失敗: " + error.message;
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="7">データを表示できませんでした。</td></tr>';
                return;
            }

            const rows = data || [];

            if (rows.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="7">お知らせはありません。</td></tr>';
                message.textContent = `表示対象が0件です（role: ${currentRole}, email: ${currentUserEmail || "未取得"}）。`;
                return;
            }

            const announcementNos = rows.map((item) => Number(item.no)).filter((value) => Number.isFinite(value));

            if (announcementNos.length > 0) {
                const { data: myResponses } = await dbClient
                    .from("announcement_attendance_responses")
                    .select("announcement_no,status,responded_at")
                    .in("announcement_no", announcementNos)
                    .eq("responder_email", currentUserEmail);

                (myResponses || []).forEach((item) => {
                    myAttendanceByNo.set(Number(item.announcement_no), item);
                });

                if (currentRole === "admin") {
                    const { data: allResponses } = await dbClient
                        .from("announcement_attendance_responses")
                        .select("announcement_no,status")
                        .in("announcement_no", announcementNos);

                    (allResponses || []).forEach((item) => {
                        const noValue = Number(item.announcement_no);
                        if (!attendanceStatsByNo.has(noValue)) {
                            attendanceStatsByNo.set(noValue, { attend: 0, absent: 0, pending: 0 });
                        }
                        const bucket = attendanceStatsByNo.get(noValue);
                        if (item.status === "attend") bucket.attend += 1;
                        if (item.status === "absent") bucket.absent += 1;
                        if (item.status === "pending") bucket.pending += 1;
                    });

                    const { data: recipients } = await dbClient
                        .from("announcement_recipients")
                        .select("announcement_no")
                        .in("announcement_no", announcementNos);

                    (recipients || []).forEach((item) => {
                        const noValue = Number(item.announcement_no);
                        recipientsCountByNo.set(noValue, (recipientsCountByNo.get(noValue) || 0) + 1);
                    });
                }
            }

            rows.forEach((item) => {
                announcementByNo.set(Number(item.no), item);
                const tr = document.createElement("tr");
                const canEdit = currentRole === "admin";
                const noValue = Number(item.no);
                const myResponse = myAttendanceByNo.get(noValue);
                const currentStatus = myResponse ? myResponse.status : "unanswered";
                const required = Boolean(item.attendance_required);
                const deadlineText = required
                    ? `期限: ${formatDateTime(item.attendance_deadline)}`
                    : "出欠確認なし";
                let adminSummaryText = "";
                if (required && currentRole === "admin") {
                    const stats = attendanceStatsByNo.get(noValue) || { attend: 0, absent: 0, pending: 0 };
                    const targetCount = item.visibility === "specific"
                        ? (recipientsCountByNo.get(noValue) || 0)
                        : allMembers.length;
                    const answeredCount = stats.attend + stats.absent + stats.pending;
                    const unansweredCount = Math.max(targetCount - answeredCount, 0);
                    adminSummaryText = `集計: 出席 ${stats.attend} / 欠席 ${stats.absent} / 未定 ${stats.pending} / 未回答 ${unansweredCount}`;
                }
                tr.innerHTML = `
                    <td class="p-2 border">${formatDate(item.notice_date)}</td>
                    <td class="p-2 border">${formatTimeRange(item.start_time, item.end_time)}</td>
                    <td class="p-2 border">${escapeHtml(item.title || "")}</td>
                    <td class="p-2 border">${escapeHtml(item.content || "")}</td>
                    <td class="p-2 border">${escapeHtml(item.owner_name || "未設定")}</td>
                    <td class="p-2 border">
                        ${required
                            ? `<div class="space-y-2">
                                <p class="text-xs text-gray-600">${escapeHtml(deadlineText)}</p>
                                <p><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${attendanceStatusBadgeClass(currentStatus)}">${attendanceStatusLabel(currentStatus)}</span></p>
                                ${adminSummaryText ? `<p class="text-xs text-gray-600">${escapeHtml(adminSummaryText)}</p>` : ""}
                                <div class="flex flex-wrap gap-1">
                                    <button class="attendance-btn text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-700 hover:bg-emerald-200" data-attendance-no="${item.no}" data-attendance-status="attend">出席</button>
                                    <button class="attendance-btn text-xs px-2 py-1 rounded bg-rose-100 text-rose-700 hover:bg-rose-200" data-attendance-no="${item.no}" data-attendance-status="absent">欠席</button>
                                    <button class="attendance-btn text-xs px-2 py-1 rounded bg-amber-100 text-amber-700 hover:bg-amber-200" data-attendance-no="${item.no}" data-attendance-status="pending">未定</button>
                                </div>
                            </div>`
                            : `<span class="text-gray-400">-</span>`}
                    </td>
                    <td class="p-2 border">
                        ${canEdit
                            ? `<button class="text-rose-700 hover:text-rose-900 font-semibold" data-edit-no="${item.no}">修正</button>`
                            : `<span class="text-gray-400">-</span>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            await renderAttendanceAdminSection(rows);

            tbody.querySelectorAll("button[data-edit-no]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const noValue = Number(btn.getAttribute("data-edit-no"));
                    const target = announcementByNo.get(noValue);
                    if (!target) {
                        return;
                    }
                    openEditModal(target);
                });
            });

            tbody.querySelectorAll("button.attendance-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const announcementNo = Number(btn.getAttribute("data-attendance-no"));
                    const status = btn.getAttribute("data-attendance-status");
                    if (!announcementNo || !status || !currentUserEmail) {
                        return;
                    }

                    const payload = {
                        announcement_no: announcementNo,
                        responder_email: currentUserEmail,
                        responder_name: currentOwnerName || currentUserEmail,
                        status,
                        responded_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    };

                    const { error: upsertError } = await dbClient
                        .from("announcement_attendance_responses")
                        .upsert(payload, { onConflict: "announcement_no,responder_email" });

                    if (upsertError) {
                        message.textContent = "出欠回答の保存に失敗しました: " + upsertError.message;
                        return;
                    }

                    message.textContent = `出欠回答を保存しました（${attendanceStatusLabel(status)}）。`;
                    await loadAnnouncements();
                });
            });
        }

        document.getElementById("announcement-edit-form").addEventListener("submit", saveAnnouncementEdit);
        document.getElementById("announcement-edit-cancel").addEventListener("click", closeEditModal);
        document.getElementById("announcement-edit-modal").addEventListener("click", (event) => {
            if (event.target && event.target.id === "announcement-edit-modal") {
                closeEditModal();
            }
        });

        // 編集画面の配信対象の表示・非表示切り替え
        document.querySelectorAll('input[name="edit_visibility"]').forEach(radio => {
            radio.addEventListener("change", async () => {
                const section = document.getElementById("edit-specific-members-section");
                if (radio.value === "specific" && radio.checked) {
                    section.classList.remove("hidden");
                    document.querySelectorAll("#edit-member-group-list .edit-member-group-checkbox").forEach((checkbox) => {
                        checkbox.checked = false;
                    });
                    if (currentEditingAnnouncementNo) {
                        await loadEditMembersList(currentEditingAnnouncementNo);
                    }
                } else {
                    section.classList.add("hidden");
                }
            });
        });

        document.getElementById("edit_attendance_required").addEventListener("change", (event) => {
            const deadlineInput = document.getElementById("edit_attendance_deadline");
            const isRequired = Boolean(event.target.checked);
            deadlineInput.disabled = !isRequired;
            if (!isRequired) {
                deadlineInput.value = "";
            }
        });

        document.getElementById("attendance-target-select").addEventListener("change", async (event) => {
            const noValue = Number(event.target.value || "0");
            if (!noValue) {
                return;
            }
            await loadUnansweredMembers(noValue);
        });

        document.getElementById("attendance-refresh-btn").addEventListener("click", async () => {
            const select = document.getElementById("attendance-target-select");
            const noValue = Number(select.value || "0");
            if (!noValue) {
                await loadAnnouncements();
                return;
            }
            await loadUnansweredMembers(noValue);
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            hideDisplayName: true,
            returnTo: "announcements.html",
            onReady: async ({ client, role, session, profile }) => {
                dbClient = client;
                currentRole = role || "viewer";
                currentUserEmail = session?.email || profile?.email || "";
                currentOwnerName = resolveOwnerName(session, profile);
                if (currentRole === "admin") {
                    document.getElementById("announcement-edit-note").classList.remove("hidden");
                }
                
                // メンバーを読み込む
                const { data: members } = await dbClient
                    .from("member_directory")
                    .select("email, full_name, seat_number, position_name, committee, is_giun, is_editorial_committee")
                    .eq("is_current", true)
                    .order("seat_number", { ascending: true, nullsFirst: false })
                    .order("full_name", { ascending: true });
                
                if (members) {
                    allMembers = members;
                }

                renderEditGroupList();
                
                await loadAnnouncements();
            }
        });
    </script>
</body>
</html>
