    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;
        let currentRole = "viewer";
        let currentUserEmail = "";
        let allMembers = [];
        let currentEditingAnnouncementNo = null;
        let currentOwnerName = "未設定";
        const announcementByNo = new Map();
        const myAttendanceByNo = new Map();
        const googleAttendanceByNo = new Map();
        const attendanceStatsByNo = new Map();
        const recipientsCountByNo = new Map();
        const inviteTargetCountByNo = new Map();
        let attendanceAnnouncements = [];

        const MEMBER_GROUPS = [
            { id: "leaders", label: "正副議長" },
            { id: "giun", label: "議会運営委員会" },
            { id: "soumu", label: "総務委員会" },
            { id: "sangyo", label: "産業建設委員会" },
            { id: "kyoiku", label: "教育民生委員会" },
            { id: "editorial", label: "編集委員会" }
        ];

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

            function isAnnouncementRecipientsTableMissing(error) {
                const message = String(error?.message || "").toLowerCase();
                const details = String(error?.details || "").toLowerCase();
                const hint = String(error?.hint || "").toLowerCase();
                return (
                    message.includes("could not find the table 'public.announcement_recipients'") ||
                    message.includes('relation "public.announcement_recipients" does not exist') ||
                    details.includes("public.announcement_recipients") ||
                    hint.includes("public.announcement_recipients")
                );
            }

            function buildAnnouncementRecipientsMissingMessage() {
                return "配信対象テーブル(public.announcement_recipients)が未反映です。Supabase SQL Editor で supabase_setup.sql を実行後、NOTIFY pgrst, 'reload schema'; を実行してください。";
            }

            function normalizeEmail(value) {
                return String(value || "").trim().toLowerCase();
            }

        function formatDate(dateValue) {
            if (!dateValue) return "";
            const parts = String(dateValue).split("-");
            if (parts.length !== 3) return String(dateValue);
            return `${parts[0]}/${parts[1]}/${parts[2]}`;
        }

        function formatTimeRange(startTime, endTime) {
            const start = startTime ? String(startTime).slice(0, 5) : "--:--";
            const end = endTime ? String(endTime).slice(0, 5) : "--:--";
            return `${start} - ${end}`;
        }

        function resolveOwnerName(session, profile) {
            return (session && session.displayName)
                || (profile && profile.display_name)
                || (session && session.email)
                || "未設定";
        }

        function formatDateTime(dateTimeValue) {
            if (!dateTimeValue) return "未設定";
            const dt = new Date(dateTimeValue);
            if (Number.isNaN(dt.getTime())) return String(dateTimeValue);
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, "0");
            const d = String(dt.getDate()).padStart(2, "0");
            const hh = String(dt.getHours()).padStart(2, "0");
            const mm = String(dt.getMinutes()).padStart(2, "0");
            return `${y}/${m}/${d} ${hh}:${mm}`;
        }

        function attendanceStatusLabel(status) {
            if (status === "attend") return "出席";
            if (status === "absent") return "欠席";
            if (status === "pending") return "未定";
            return "未回答";
        }

        function attendanceStatusBadgeClass(status) {
            if (status === "attend") return "bg-emerald-100 text-emerald-700";
            if (status === "absent") return "bg-rose-100 text-rose-700";
            if (status === "pending") return "bg-amber-100 text-amber-700";
            return "bg-gray-100 text-gray-600";
        }

        function mapGoogleResponseStatus(responseStatus) {
            if (responseStatus === "accepted") return "attend";
            if (responseStatus === "declined") return "absent";
            if (responseStatus === "tentative") return "pending";
            return "unanswered";
        }

        async function fetchGoogleAttendanceStatus(client, eventId, userEmail) {
            const providerToken = await getGoogleProviderToken(client);
            if (!providerToken || !eventId || !userEmail) {
                return null;
            }

            const response = await fetch(
                `https://www.googleapis.com/calendar/v3/calendars/primary/events/${encodeURIComponent(eventId)}?maxAttendees=2000`,
                {
                    method: "GET",
                    headers: {
                        Authorization: `Bearer ${providerToken}`
                    }
                }
            );

            if (!response.ok) {
                return null;
            }

            const eventData = await response.json();
            const attendees = Array.isArray(eventData.attendees) ? eventData.attendees : [];
            const normalizedEmail = normalizeEmail(userEmail);
            const mine = attendees.find((attendee) => normalizeEmail(attendee.email) === normalizedEmail);
            if (!mine) {
                return "unanswered";
            }

            return mapGoogleResponseStatus(mine.responseStatus || "needsAction");
        }

        function buildCalendarDateTime(dateValue, timeValue) {
            const time = String(timeValue || "00:00").slice(0, 5);
            return `${dateValue}T${time}:00+09:00`;
        }

        async function getGoogleProviderToken(client) {
            const { data, error } = await client.auth.getSession();
            if (!error && data && data.session && data.session.provider_token) {
                localStorage.setItem("portal_google_provider_token", data.session.provider_token);
                return data.session.provider_token;
            }

            const { data: refreshedData, error: refreshError } = await client.auth.refreshSession();
            if (!refreshError && refreshedData && refreshedData.session && refreshedData.session.provider_token) {
                localStorage.setItem("portal_google_provider_token", refreshedData.session.provider_token);
                return refreshedData.session.provider_token;
            }

            return localStorage.getItem("portal_google_provider_token") || null;
        }
        function buildFriendlyGoogleError(detailText) {
            const raw = String(detailText || "").trim();
            let parsed = null;
            try {
                parsed = JSON.parse(raw);
            } catch (_error) {
                parsed = null;
            }

            const err = parsed && parsed.error ? parsed.error : null;
            const reason = (err && err.errors && err.errors[0] && err.errors[0].reason) || "";
            const status = (err && err.status) || "";
            const message = (err && err.message) || raw;

            if (status === "PERMISSION_DENIED" || reason === "accessNotConfigured") {
                return "Google Calendar API が未有効です。管理者が Google Cloud で1回有効化すれば、一般ユーザーの追加設定は不要です。反映まで数分待って再実行してください。";
            }

            if (reason === "insufficientPermissions" || reason === "forbidden" || /insufficient.*scope/i.test(message)) {
                return "Google権限が不足しています。ログアウト後に再ログインして、Googleの権限同意を許可してください。";
            }

            if (reason === "authError" || /invalid credentials|unauthenticated/i.test(message)) {
                return "認証トークンが無効です。ログアウト後に再ログインして再実行してください。";
            }

            return message || "Google Calendar APIエラー";
        }

        function getRecipientEmailsByVisibility(visibility, selectedMembers) {
            if (visibility === "specific") {
                return Array.from(new Set(selectedMembers.map((email) => normalizeEmail(email)).filter(Boolean)));
            }

            return Array.from(
                new Set(
                    allMembers
                        .map((member) => normalizeEmail(member.email))
                        .filter(Boolean)
                )
            );
        }

        async function syncGoogleCalendarInvite(client, payload, recipientEmails, existingEventId) {
            const providerToken = await getGoogleProviderToken(client);
            if (!providerToken) {
                return { ok: false, reason: "Google再ログイン後に再実行してください（Calendar権限不足の可能性があります）。" };
            }

            const descriptionLines = [
                payload.content || "",
                payload.contact_phone ? `連絡先電話: ${payload.contact_phone}` : "",
                payload.contact_email ? `連絡先メール: ${payload.contact_email}` : "",
                payload.remarks ? `備考: ${payload.remarks}` : "",
                payload.attendance_required ? "出欠確認あり" : ""
            ].filter(Boolean);

            const eventPayload = {
                summary: payload.title,
                description: descriptionLines.join("\n"),
                start: {
                    dateTime: buildCalendarDateTime(payload.notice_date, payload.start_time),
                    timeZone: "Asia/Tokyo"
                },
                end: {
                    dateTime: buildCalendarDateTime(payload.notice_date, payload.end_time),
                    timeZone: "Asia/Tokyo"
                },
                attendees: recipientEmails.map((email) => ({ email }))
            };

            const endpoint = existingEventId
                ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${encodeURIComponent(existingEventId)}?sendUpdates=all`
                : "https://www.googleapis.com/calendar/v3/calendars/primary/events?sendUpdates=all";
            const method = existingEventId ? "PATCH" : "POST";

            const response = await fetch(endpoint, {
                method,
                headers: {
                    Authorization: `Bearer ${providerToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(eventPayload)
            });

            if (!response.ok) {
                const detail = await response.text();
                return { ok: false, reason: buildFriendlyGoogleError(detail) };
            }

            const eventData = await response.json();
            return {
                ok: true,
                eventId: eventData.id || existingEventId || null,
                htmlLink: eventData.htmlLink || null
            };
        }

        async function deleteGoogleCalendarEvent(client, eventId) {
            if (!eventId) {
                return { ok: true };
            }

            const providerToken = await getGoogleProviderToken(client);
            if (!providerToken) {
                return { ok: false, reason: "Google再ログイン後に再実行してください（Calendar権限不足の可能性があります）。" };
            }

            const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${encodeURIComponent(eventId)}?sendUpdates=all`, {
                method: "DELETE",
                headers: {
                    Authorization: `Bearer ${providerToken}`
                }
            });

            if (response.status === 204 || response.status === 200 || response.status === 404) {
                return { ok: true };
            }

            const detail = await response.text();
                return { ok: false, reason: buildFriendlyGoogleError(detail) };
        }

        async function writeAuditLog(client, { actionType, targetEmail = "", beforeValue = "", afterValue = "", note = "" }) {
            try {
                await client.from("audit_log").insert({
                    actor_email: currentUserEmail || "不明",
                    target_email: targetEmail,
                    action_type: actionType,
                    before_value: beforeValue,
                    after_value: afterValue,
                    note
                });
            } catch (_err) {
                // 監査ログ失敗は画面操作を止めない
            }
        }

        async function deleteAnnouncement(announcementNo) {
            const message = document.getElementById("announcement-message");
            const target = announcementByNo.get(Number(announcementNo));
            if (!target) {
                message.textContent = "削除対象のお知らせが見つかりません。";
                return;
            }

            const confirmed = window.confirm("このお知らせを削除します。Googleカレンダー連携済みの場合は、カレンダー予定も削除します。よろしいですか？");
            if (!confirmed) {
                return;
            }

            if (target.google_calendar_event_id) {
                const calendarDeleteResult = await deleteGoogleCalendarEvent(dbClient, target.google_calendar_event_id);
                if (!calendarDeleteResult.ok) {
                    message.textContent = `Googleカレンダー予定の削除に失敗したため、お知らせ削除を中止しました: ${calendarDeleteResult.reason}`;
                    return;
                }
            }

            const { error } = await dbClient
                .from("announcements")
                .delete()
                .eq("no", Number(announcementNo));

            if (error) {
                message.textContent = "お知らせの削除に失敗しました: " + error.message;
                return;
            }

            const beforeSummary = `no=${target.no}, title=${target.title || ""}, date=${target.notice_date || ""}, visibility=${target.visibility || ""}`;
            const calendarState = target.google_calendar_event_id ? "calendar_deleted" : "calendar_not_linked";
            await writeAuditLog(dbClient, {
                actionType: "お知らせ削除",
                targetEmail: currentUserEmail || "",
                beforeValue: beforeSummary,
                afterValue: "deleted",
                note: `announcement_no=${target.no}; ${calendarState}`
            });

            message.textContent = "お知らせを削除しました。";
            await loadAnnouncements();
        }

        async function getRecipientEmailsForAnnouncement(item) {
            if (!item) return [];

            if (item.visibility === "specific") {
                const { data: recipients, error } = await dbClient
                    .from("announcement_recipients")
                    .select("recipient_email")
                    .eq("announcement_no", item.no);

                if (error) {
                    throw new Error("配信対象の取得に失敗しました: " + error.message);
                }

                return Array.from(
                    new Set(
                        (recipients || [])
                            .map((row) => normalizeEmail(row.recipient_email))
                            .filter(Boolean)
                    )
                );
            }

            return getRecipientEmailsByVisibility("all", []);
        }

        async function syncGoogleInviteForAnnouncement(announcementNo) {
            const message = document.getElementById("announcement-message");
            const target = announcementByNo.get(Number(announcementNo));
            if (!target) {
                message.textContent = "対象のお知らせが見つかりません。";
                return;
            }

            try {
                const recipientEmails = await getRecipientEmailsForAnnouncement(target);
                if (recipientEmails.length === 0) {
                    message.textContent = "招待対象メールが0件のため、Google招待を実行しませんでした。";
                    return;
                }

                const payload = buildCalendarPayloadFromAnnouncement(target);
                const beforeEventId = target.google_calendar_event_id || "";
                const actionMode = beforeEventId ? "resync" : "create";
                const inviteResult = await syncGoogleCalendarInvite(
                    dbClient,
                    payload,
                    recipientEmails,
                    beforeEventId || null
                );

                if (!inviteResult.ok) {
                    await writeAuditLog(dbClient, {
                        actionType: "Google招待同期失敗",
                        targetEmail: currentUserEmail || "",
                        beforeValue: `announcement_no=${target.no}; mode=${actionMode}; event_id=${beforeEventId || "none"}`,
                        afterValue: "failed",
                        note: inviteResult.reason || "unknown"
                    });
                    message.textContent = `Google招待の更新に失敗しました: ${inviteResult.reason}`;
                    return;
                }

                const { error: saveError } = await dbClient
                    .from("announcements")
                    .update({
                        google_calendar_event_id: inviteResult.eventId || null,
                        google_calendar_event_link: inviteResult.htmlLink || null,
                        google_calendar_synced_at: new Date().toISOString()
                    })
                    .eq("no", Number(announcementNo));

                if (saveError) {
                    await writeAuditLog(dbClient, {
                        actionType: "Google招待同期失敗",
                        targetEmail: currentUserEmail || "",
                        beforeValue: `announcement_no=${target.no}; mode=${actionMode}; event_id=${beforeEventId || "none"}`,
                        afterValue: "calendar_synced_but_db_save_failed",
                        note: saveError.message || "db save failed"
                    });
                    message.textContent = "Google招待は成功しましたが、連携情報の保存に失敗しました: " + saveError.message;
                    return;
                }

                await writeAuditLog(dbClient, {
                    actionType: "Google招待同期",
                    targetEmail: currentUserEmail || "",
                    beforeValue: `announcement_no=${target.no}; mode=${actionMode}; event_id=${beforeEventId || "none"}`,
                    afterValue: `event_id=${inviteResult.eventId || "none"}`,
                    note: `recipient_count=${recipientEmails.length}`
                });

                message.textContent = `Google招待を更新しました（${recipientEmails.length}名）。`;
                await loadAnnouncements();
            } catch (error) {
                await writeAuditLog(dbClient, {
                    actionType: "Google招待同期失敗",
                    targetEmail: currentUserEmail || "",
                    beforeValue: `announcement_no=${target.no}`,
                    afterValue: "exception",
                    note: (error && error.message) ? error.message : "unknown"
                });
                message.textContent = error && error.message ? error.message : "Google招待更新中にエラーが発生しました。";
            }
        }

        function getMembersWithEmail() {
            const normalized = new Set();
            const result = [];
            allMembers.forEach((member) => {

                    return;
                }
                normalized.add(email);
                result.push({
                    email,
                    name: member.full_name || email
                });
            });
            return result;
        }

        async function loadUnansweredMembers(announcementNo) {
            const tbody = document.getElementById("attendance-unanswered-list");
            const summary = document.getElementById("attendance-summary");

            tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="2">読み込み中です...</td></tr>';
            summary.textContent = "";

            const item = announcementByNo.get(Number(announcementNo));
            if (!item || !item.attendance_required) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="2">対象のお知らせが見つかりません。</td></tr>';
                return;
            }

            let targets = [];
            if (item.visibility === "specific") {
                const { data: recipients, error: recipientsError } = await dbClient
                    .from("announcement_recipients")
                    .select("recipient_email,recipient_name")
                    .eq("announcement_no", item.no);

                if (recipientsError) {
                    tbody.innerHTML = `<tr><td class="p-2 border text-red-600" colspan="2">配信対象の取得に失敗しました: ${escapeHtml(recipientsError.message)}</td></tr>`;
                    return;
                }

                targets = (recipients || []).map((row) => ({
                    email: normalizeEmail(row.recipient_email),
                    name: row.recipient_name || row.recipient_email
                }));
            } else {
                targets = getMembersWithEmail();
            }

            const dedupMap = new Map();
            targets.forEach((target) => {
                if (!target.email || dedupMap.has(target.email)) {
                    return;
                }
                dedupMap.set(target.email, target);
            });
            const dedupTargets = Array.from(dedupMap.values());

            const { data: responses, error: responseError } = await dbClient
                .from("announcement_attendance_responses")
                .select("responder_email")
                .eq("announcement_no", item.no);

            if (responseError) {
                tbody.innerHTML = `<tr><td class="p-2 border text-red-600" colspan="2">回答の取得に失敗しました: ${escapeHtml(responseError.message)}</td></tr>`;
                return;
            }

            const answeredSet = new Set((responses || []).map((row) => normalizeEmail(row.responder_email)).filter(Boolean));
            const unanswered = dedupTargets.filter((target) => !answeredSet.has(target.email));
            const inviteTargetCount = item.visibility === "specific"
                ? (inviteTargetCountByNo.get(Number(item.no)) || dedupTargets.length)
                : dedupTargets.length;

            const deadlineText = item.attendance_deadline ? ` / 回答期限: ${formatDateTime(item.attendance_deadline)}` : "";
            summary.textContent = `出欠対象: ${dedupTargets.length}名 / Google招待対象: ${inviteTargetCount}名 / 回答済み: ${answeredSet.size}名 / 未回答: ${unanswered.length}名${deadlineText}`;

            if (unanswered.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-emerald-700" colspan="2">未回答者はいません。</td></tr>';
                return;
            }

            tbody.innerHTML = unanswered.map((row) => `
                <tr>
                    <td class="p-2 border">${escapeHtml(row.name || "-")}</td>
                    <td class="p-2 border">${escapeHtml(row.email || "-")}</td>
                </tr>
            `).join("");
        }

        function normalizeText(value) {
            return String(value || "").replace(/\s+/g, "").trim();
        }

        function normalizeSeatNumber(value) {
            if (value === null || value === undefined || value === "") {
                return null;
            }
            const n = Number(value);
            if (!Number.isInteger(n) || n <= 0) {
                return null;
            }
            return n;
        }

        function categorySortValue(member) {
            const category = String((member && member.category) || "").trim();
            if (category === "議員") return 1;
            if (category === "職員") return 2;
            return 3;
        }

        function compareMembersForDisplay(a, b) {
            const categoryDiff = categorySortValue(a) - categorySortValue(b);
            if (categoryDiff !== 0) return categoryDiff;

            const seatA = normalizeSeatNumber(a && a.seat_number);
            const seatB = normalizeSeatNumber(b && b.seat_number);
            const seatValueA = seatA === null ? Number.MAX_SAFE_INTEGER : seatA;
            const seatValueB = seatB === null ? Number.MAX_SAFE_INTEGER : seatB;
            const seatDiff = seatValueA - seatValueB;
            if (seatDiff !== 0) return seatDiff;

            return String(a && a.full_name ? a.full_name : "").localeCompare(String(b && b.full_name ? b.full_name : ""), "ja");
        }

        function memberBelongsToGroup(member, groupId) {
            const positionName = String(member.position_name || "").trim();
            const committeeName = normalizeText(member.committee);

            if (groupId === "leaders") {
                return positionName === "議長" || positionName === "副議長";
            }
            if (groupId === "giun") {
                return Boolean(member.is_giun);
            }
            if (groupId === "soumu") {
                return committeeName.includes("総務委員会");
            }
            if (groupId === "sangyo") {
                return committeeName.includes("産業建設委員会");
            }
            if (groupId === "kyoiku") {
                return committeeName.includes("教育民生委員会");
            }
            if (groupId === "editorial") {
                return Boolean(member.is_editorial_committee);
            }

            return false;
        }

        async function saveAnnouncementEdit(event) {
            event.preventDefault();

            const noValue = Number(document.getElementById("edit_notice_no").value);
            const visibility = document.querySelector('input[name="edit_visibility"]:checked').value;
            let selectedMembers = [];
            const updateGoogleInvite = document.getElementById("edit_google_calendar_invite").checked;
            
            if (visibility === "specific") {
                const checkboxes = document.querySelectorAll("#edit-members-list .member-checkbox:checked");
                if (checkboxes.length === 0) {
                    document.getElementById("announcement-edit-message").textContent = "配信対象メンバーを選択してください。";
                    return;
                }
                selectedMembers = Array.from(checkboxes).map(cb => cb.value);
            }

            const payload = {
                notice_date: document.getElementById("edit_notice_date").value,
                start_time: document.getElementById("edit_start_time").value,
                end_time: document.getElementById("edit_end_time").value,
                title: document.getElementById("edit_notice_title").value.trim(),
                content: document.getElementById("edit_notice_content").value.trim(),
                owner_name: currentOwnerName || "未設定",
                contact_phone: document.getElementById("edit_contact_phone").value.trim() || null,
                contact_email: document.getElementById("edit_contact_email").value.trim() || null,
                remarks: document.getElementById("edit_remarks").value.trim() || null,
                attendance_required: document.getElementById("edit_attendance_required").checked,
                attendance_deadline: null,
                visibility: visibility,
                updated_at: new Date().toISOString()
            };

            const editMessage = document.getElementById("announcement-edit-message");
            if (!noValue || !payload.notice_date || !payload.start_time || !payload.end_time || !payload.title || !payload.content) {
                editMessage.textContent = "必須項目を入力してください。";
                return;
            }

            if (payload.start_time > payload.end_time) {
                editMessage.textContent = "時間の入力を確認してください（開始時間 <= 終了時間）。";
                return;
            }

            if (payload.attendance_required) {
                const deadlineInput = document.getElementById("edit_attendance_deadline").value;
                if (!deadlineInput) {
                    editMessage.textContent = "出欠確認を行う場合は回答期限を入力してください。";
                    return;
                }
                payload.attendance_deadline = new Date(deadlineInput).toISOString();
            }

            if (!payload.attendance_required) {
                payload.attendance_deadline = null;
            }

            const recipientEmails = getRecipientEmailsByVisibility(visibility, selectedMembers);

            const { error } = await dbClient
                .from("announcements")
                .update(payload)
                .eq("no", noValue);

            if (error) {
                editMessage.textContent = "更新失敗: " + error.message;
                return;
            }

            // 配信対象を更新
            if (visibility === "specific") {
                // 既存の配信対象を削除
                const { error: deleteRecipientError } = await dbClient
                    .from("announcement_recipients")
                    .delete()
                    .eq("announcement_no", noValue);

                if (deleteRecipientError) {
                    editMessage.textContent = isAnnouncementRecipientsTableMissing(deleteRecipientError)
                        ? buildAnnouncementRecipientsMissingMessage()
                        : "配信対象の更新準備に失敗しました: " + deleteRecipientError.message;
                    return;
                }

                // 新しい配信対象を挿入
                const recipients = selectedMembers.map(email => {
                    const member = allMembers.find(m => m.email === email);
                    return {
                        announcement_no: noValue,
                        recipient_email: email,
                        recipient_name: member?.full_name || email
                    };
                });

                const { error: recipientError } = await dbClient
                    .from("announcement_recipients")
                    .insert(recipients);

                if (recipientError) {
                    editMessage.textContent = isAnnouncementRecipientsTableMissing(recipientError)
                        ? buildAnnouncementRecipientsMissingMessage()
                        : "配信対象の保存に失敗しました: " + recipientError.message;
                    return;
                }
            } else {
                // 'all' の場合は配信対象を削除
                const { error: deleteRecipientError } = await dbClient
                    .from("announcement_recipients")
                    .delete()
                    .eq("announcement_no", noValue);

                if (deleteRecipientError) {
                    editMessage.textContent = isAnnouncementRecipientsTableMissing(deleteRecipientError)
                        ? buildAnnouncementRecipientsMissingMessage()
                        : "配信対象の削除に失敗しました: " + deleteRecipientError.message;
                    return;
                }
            }

            if (updateGoogleInvite) {
                if (recipientEmails.length === 0) {
                    editMessage.textContent = "更新は完了しましたが、Google招待対象メールが0件のためカレンダー更新は行っていません。";
                    await loadAnnouncements();
                    return;
                }

                const current = announcementByNo.get(noValue) || {};
                const beforeEventId = current.google_calendar_event_id || "";
                const actionMode = beforeEventId ? "resync" : "create";
                const inviteResult = await syncGoogleCalendarInvite(
                    dbClient,
                    payload,
                    recipientEmails,
                    beforeEventId || null
                );

                if (!inviteResult.ok) {
                    await writeAuditLog(dbClient, {
                        actionType: "Google招待同期失敗",
                        targetEmail: currentUserEmail || "",
                        beforeValue: `announcement_no=${noValue}; mode=${actionMode}; event_id=${beforeEventId || "none"}`,
                        afterValue: "failed",
                        note: inviteResult.reason || "unknown"
                    });
                    editMessage.textContent = `更新は完了しましたが、Google招待の更新に失敗しました: ${inviteResult.reason}`;
                    await loadAnnouncements();
                    return;
                }

                const { error: calendarSaveError } = await dbClient
                    .from("announcements")
                    .update({
                        google_calendar_event_id: inviteResult.eventId || null,
                        google_calendar_event_link: inviteResult.htmlLink || null,
                        google_calendar_synced_at: new Date().toISOString()
                    })
                    .eq("no", noValue);

                if (calendarSaveError) {
                    await writeAuditLog(dbClient, {
                        actionType: "Google招待同期失敗",
                        targetEmail: currentUserEmail || "",
                        beforeValue: `announcement_no=${noValue}; mode=${actionMode}; event_id=${beforeEventId || "none"}`,
                        afterValue: "calendar_synced_but_db_save_failed",
                        note: calendarSaveError.message || "db save failed"
                    });
                    editMessage.textContent = `更新とGoogle招待は完了しましたが、連携情報の保存に失敗しました: ${calendarSaveError.message}`;
                    await loadAnnouncements();
                    return;
                }

                await writeAuditLog(dbClient, {
                    actionType: "Google招待同期",
                    targetEmail: currentUserEmail || "",
                    beforeValue: `announcement_no=${noValue}; mode=${actionMode}; event_id=${beforeEventId || "none"}`,
                    afterValue: `event_id=${inviteResult.eventId || "none"}`,
                    note: `recipient_count=${recipientEmails.length}`
                });
            }

            closeEditModal();
            document.getElementById("announcement-message").textContent = "修正しました。";
            await loadAnnouncements();
        }

        async function loadAnnouncements() {
            const tbody = document.getElementById("announcement-list");
            const message = document.getElementById("announcement-message");
            tbody.innerHTML = "";
            message.textContent = "";
            announcementByNo.clear();
            myAttendanceByNo.clear();
            googleAttendanceByNo.clear();
            attendanceStatsByNo.clear();
            recipientsCountByNo.clear();
            inviteTargetCountByNo.clear();

            const baseSelect = "notice_date,start_time,end_time,title,content,owner_name,contact_phone,contact_email,remarks,no,visibility,attendance_required,attendance_deadline,google_calendar_event_id,google_calendar_event_link,google_calendar_synced_at";
            const { data, error } = await dbClient
                .from("announcements")
                .select(baseSelect)
                .order("notice_date", { ascending: false })
                .order("start_time", { ascending: false })
                .order("no", { ascending: false });

            if (error) {
                message.textContent = "一覧読込失敗: " + error.message;
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="8">データを表示できませんでした。</td></tr>';
                return;
            }

            const rows = data || [];
            const unlinkedOnly = currentRole === "admin" && document.getElementById("google-unlinked-only")?.checked;
            const visibleRows = unlinkedOnly
                ? rows.filter((item) => !item.google_calendar_event_id)
                : rows;

            if (rows.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="8">お知らせはありません。</td></tr>';
                message.textContent = `表示対象が0件です（role: ${currentRole}, email: ${currentUserEmail || "未取得"}）。`;
                return;
            }

            if (visibleRows.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="8">条件に一致するお知らせはありません。</td></tr>';
                await renderAttendanceAdminSection(rows);
                return;
            }

            const announcementNos = rows.map((item) => Number(item.no)).filter((value) => Number.isFinite(value));

            if (announcementNos.length > 0) {
                const { data: myResponses } = await dbClient
                    .from("announcement_attendance_responses")
                    .select("announcement_no,status,responded_at")
                    .in("announcement_no", announcementNos)
                    .eq("responder_email", currentUserEmail);

                (myResponses || []).forEach((item) => {
                    myAttendanceByNo.set(Number(item.announcement_no), item);
                });

                const googleLinkedRows = rows.filter((item) => {
                    return Boolean(item.attendance_required) && Boolean(item.google_calendar_event_id);
                });

                for (const item of googleLinkedRows) {
                    const noValue = Number(item.no);
                    const googleStatus = await fetchGoogleAttendanceStatus(dbClient, item.google_calendar_event_id, currentUserEmail);
                    if (!googleStatus) {
                        continue;
                    }

                    googleAttendanceByNo.set(noValue, googleStatus);

                    if (googleStatus === "unanswered") {
                        continue;
                    }

                    const current = myAttendanceByNo.get(noValue);
                    const currentStatus = current ? current.status : "unanswered";
                    if (currentStatus === googleStatus) {
                        continue;
                    }

                    const nowIso = new Date().toISOString();
                    const payload = {
                        announcement_no: noValue,
                        responder_email: currentUserEmail,
                        responder_name: currentOwnerName || currentUserEmail,
                        status: googleStatus,
                        responded_at: nowIso,
                        updated_at: nowIso
                    };

                    const { error: upsertError } = await dbClient
                        .from("announcement_attendance_responses")
                        .upsert(payload, { onConflict: "announcement_no,responder_email" });

                    if (!upsertError) {
                        myAttendanceByNo.set(noValue, { announcement_no: noValue, status: googleStatus, responded_at: nowIso });
                    }
                }

                if (currentRole === "admin") {
                    const { data: allResponses } = await dbClient
                        .from("announcement_attendance_responses")
                        .select("announcement_no,status")
                        .in("announcement_no", announcementNos);

                    (allResponses || []).forEach((item) => {
                        const noValue = Number(item.announcement_no);
                        if (!attendanceStatsByNo.has(noValue)) {
                            attendanceStatsByNo.set(noValue, { attend: 0, absent: 0, pending: 0 });
                        }
                        const bucket = attendanceStatsByNo.get(noValue);
                        if (item.status === "attend") bucket.attend += 1;
                        if (item.status === "absent") bucket.absent += 1;
                        if (item.status === "pending") bucket.pending += 1;
                    });

                    const { data: recipients } = await dbClient
                        .from("announcement_recipients")
                        .select("announcement_no")
                        .in("announcement_no", announcementNos);

                    (recipients || []).forEach((item) => {
                        const noValue = Number(item.announcement_no);
                        recipientsCountByNo.set(noValue, (recipientsCountByNo.get(noValue) || 0) + 1);
                        inviteTargetCountByNo.set(noValue, (inviteTargetCountByNo.get(noValue) || 0) + 1);
                    });
                }
            }

            visibleRows.forEach((item) => {
                announcementByNo.set(Number(item.no), item);
                const tr = document.createElement("tr");
                const canEdit = currentRole === "admin";
                const noValue = Number(item.no);
                const myResponse = myAttendanceByNo.get(noValue);
                const googleSyncedStatus = googleAttendanceByNo.get(noValue);
                const currentStatus = googleSyncedStatus || (myResponse ? myResponse.status : "unanswered");
                const required = Boolean(item.attendance_required);
                const useGoogleAttendance = required && Boolean(item.google_calendar_event_id);
                const deadlineText = required
                    ? `期限: ${formatDateTime(item.attendance_deadline)}`
                    : "出欠確認なし";
                const syncedAtText = item.google_calendar_synced_at
                    ? `最終同期: ${formatDateTime(item.google_calendar_synced_at)}`
                    : "最終同期: -";
                const inviteTargetCount = item.visibility === "specific"
                    ? (inviteTargetCountByNo.get(noValue) || 0)
                    : allMembers.length;
                const googleSyncActionHtml = canEdit
                    ? `<p><button type="button" class="google-sync-btn text-xs px-2 py-1 rounded bg-indigo-100 text-indigo-700 hover:bg-indigo-200" data-google-sync-no="${item.no}">${item.google_calendar_event_id ? "再同期" : "招待送信"}</button></p>`
                    : "";
                const googleStatusHtml = item.google_calendar_event_id
                    ? `<div class="space-y-1">
                        <p><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700">連携済み</span></p>
                        <p class="text-xs text-gray-600">招待対象: ${inviteTargetCount}名</p>
                        <p class="text-xs text-gray-600">${escapeHtml(syncedAtText)}</p>
                        ${item.google_calendar_event_link
                            ? `<p><a href="${escapeHtml(item.google_calendar_event_link)}" target="_blank" rel="noopener noreferrer" class="text-xs text-indigo-700 hover:text-indigo-900 underline">イベントを開く</a></p>`
                            : ""}
                        ${googleSyncActionHtml}
                    </div>`
                    : `<div class="space-y-1"><p><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-600">未連携</span></p><p class="text-xs text-gray-600">招待対象: ${inviteTargetCount}名</p>${googleSyncActionHtml}</div>`;
                let adminSummaryText = "";
                if (required && currentRole === "admin") {
                    const stats = attendanceStatsByNo.get(noValue) || { attend: 0, absent: 0, pending: 0 };
                    const targetCount = item.visibility === "specific"
                        ? (recipientsCountByNo.get(noValue) || 0)
                        : allMembers.length;
                    const answeredCount = stats.attend + stats.absent + stats.pending;
                    const unansweredCount = Math.max(targetCount - answeredCount, 0);
                    adminSummaryText = `集計: 出席 ${stats.attend} / 欠席 ${stats.absent} / 未定 ${stats.pending} / 未回答 ${unansweredCount}`;
                }
                tr.innerHTML = `
                    <td class="p-2 border">${formatDate(item.notice_date)}</td>
                    <td class="p-2 border">${formatTimeRange(item.start_time, item.end_time)}</td>
                    <td class="p-2 border">${escapeHtml(item.title || "")}</td>
                    <td class="p-2 border">${escapeHtml(item.content || "")}</td>
                    <td class="p-2 border">${escapeHtml(item.owner_name || "未設定")}</td>
                    <td class="p-2 border">${googleStatusHtml}</td>
                    <td class="p-2 border">
                        ${required
                            ? `<div class="space-y-2">
                                <p class="text-xs text-gray-600">${escapeHtml(deadlineText)}</p>
                                <p><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${attendanceStatusBadgeClass(currentStatus)}">${attendanceStatusLabel(currentStatus)}</span></p>
                                ${adminSummaryText ? `<p class="text-xs text-gray-600">${escapeHtml(adminSummaryText)}</p>` : ""}
                                ${useGoogleAttendance
                                    ? `<p class="text-xs text-indigo-700">Googleカレンダーの回答と同期しています（回答はGoogle側で実施）。</p>`
                                    : `<div class="flex flex-wrap gap-1">
                                        <button class="attendance-btn text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-700 hover:bg-emerald-200" data-attendance-no="${item.no}" data-attendance-status="attend">出席</button>
                                        <button class="attendance-btn text-xs px-2 py-1 rounded bg-rose-100 text-rose-700 hover:bg-rose-200" data-attendance-no="${item.no}" data-attendance-status="absent">欠席</button>
                                        <button class="attendance-btn text-xs px-2 py-1 rounded bg-amber-100 text-amber-700 hover:bg-amber-200" data-attendance-no="${item.no}" data-attendance-status="pending">未定</button>
                                    </div>`}
                            </div>`
                            : `<span class="text-gray-400">-</span>`}
                    </td>
                    <td class="p-2 border">
                        ${canEdit
                            ? `<div class="flex items-center gap-2">
                                <button class="text-rose-700 hover:text-rose-900 font-semibold" data-edit-no="${item.no}">修正</button>
                                <button class="text-gray-700 hover:text-gray-900 font-semibold" data-delete-no="${item.no}">削除</button>
                            </div>`
                            : `<span class="text-gray-400">-</span>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            await renderAttendanceAdminSection(rows);

            tbody.querySelectorAll("button[data-edit-no]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const noValue = Number(btn.getAttribute("data-edit-no"));
                    const target = announcementByNo.get(noValue);
                    if (!target) {
                        return;
                    }
                    openEditModal(target);
                });
            });

            tbody.querySelectorAll("button[data-delete-no]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const noValue = Number(btn.getAttribute("data-delete-no"));
                    if (!noValue) return;
                    await deleteAnnouncement(noValue);
                });
            });

            tbody.querySelectorAll("button.google-sync-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const noValue = Number(btn.getAttribute("data-google-sync-no"));
                    if (!noValue) return;
                    await syncGoogleInviteForAnnouncement(noValue);
                });
            });

            tbody.querySelectorAll("button.attendance-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const announcementNo = Number(btn.getAttribute("data-attendance-no"));
                    const status = btn.getAttribute("data-attendance-status");
                    if (!announcementNo || !status || !currentUserEmail) {
                        return;
                    }

                    const payload = {
                        announcement_no: announcementNo,
                        responder_email: currentUserEmail,
                        responder_name: currentOwnerName || currentUserEmail,
                        status,
                        responded_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    };

                    const { error: upsertError } = await dbClient
                        .from("announcement_attendance_responses")
                        .upsert(payload, { onConflict: "announcement_no,responder_email" });

                    if (upsertError) {
                        message.textContent = "出欠回答の保存に失敗しました: " + upsertError.message;
                        return;
                    }

                    message.textContent = `出欠回答を保存しました（${attendanceStatusLabel(status)}）。`;
                    await loadAnnouncements();
                });
            });
        }

        document.getElementById("announcement-edit-form").addEventListener("submit", saveAnnouncementEdit);
        document.getElementById("announcement-edit-cancel").addEventListener("click", closeEditModal);
        document.getElementById("announcement-edit-modal").addEventListener("click", (event) => {
            if (event.target && event.target.id === "announcement-edit-modal") {
                closeEditModal();
            }
        });

        // 編集画面の配信対象の表示・非表示切り替え
        document.querySelectorAll('input[name="edit_visibility"]').forEach(radio => {
            radio.addEventListener("change", async () => {
                const section = document.getElementById("edit-specific-members-section");
                if (radio.value === "specific" && radio.checked) {
                    section.classList.remove("hidden");
                    document.querySelectorAll("#edit-member-group-list .edit-member-group-checkbox").forEach((checkbox) => {
                        checkbox.checked = false;
                    });
                    if (currentEditingAnnouncementNo) {
                        await loadEditMembersList(currentEditingAnnouncementNo);
                    }
                } else {
                    section.classList.add("hidden");
                }
            });
        });

        document.getElementById("edit_attendance_required").addEventListener("change", (event) => {
            const deadlineInput = document.getElementById("edit_attendance_deadline");
            const isRequired = Boolean(event.target.checked);
            deadlineInput.disabled = !isRequired;
            if (!isRequired) {
                deadlineInput.value = "";
            }
        });

        document.getElementById("attendance-target-select").addEventListener("change", async (event) => {
            const noValue = Number(event.target.value || "0");
            if (!noValue) {
                return;
            }
            await loadUnansweredMembers(noValue);
        });

        document.getElementById("attendance-refresh-btn").addEventListener("click", async () => {
            const select = document.getElementById("attendance-target-select");
            const noValue = Number(select.value || "0");
            if (!noValue) {
                await loadAnnouncements();
                return;
            }
            await loadUnansweredMembers(noValue);
        });

        document.getElementById("google-unlinked-only").addEventListener("change", async () => {
            await loadAnnouncements();
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            hideDisplayName: true,
            returnTo: "announcements.html",
            onReady: async ({ client, role, session, profile }) => {
                dbClient = client;
                currentRole = role || "viewer";
                currentUserEmail = session?.email || profile?.email || "";
                currentOwnerName = resolveOwnerName(session, profile);
                if (currentRole === "admin") {
                    document.getElementById("announcement-edit-note").classList.remove("hidden");
                    document.getElementById("google-unlinked-only-wrap").classList.remove("hidden");
                }
                
                // メンバーを読み込む
                const { data: members } = await dbClient
                    .from("member_directory")
                    .select("email, full_name, seat_number, category, position_name, committee, is_giun, is_editorial_committee")
                    .eq("is_current", true)
                    .order("seat_number", { ascending: true, nullsFirst: false })
                    .order("full_name", { ascending: true });
                
                if (members) {
                    allMembers = members.slice().sort(compareMembersForDisplay);
                }

                renderEditGroupList();
                
                await loadAnnouncements();
            }
        });
    </script>
</body>
</html>
