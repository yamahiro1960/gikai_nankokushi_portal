<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議案書アーカイブ | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                    <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
                </a>
            </div>
            <span class="text-sm">議案書アーカイブ</span>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6">
            <a href="archive.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>アーカイブに戻る
            </a>
        </div>

        <section class="rounded-2xl p-6 md:p-8 bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg mb-8">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
                <div>
                    <h1 id="session-title" class="text-3xl md:text-4xl font-bold mb-2">第446回議会</h1>
                    <p id="session-description" class="text-blue-50">ローカル原本から公開用にアップロードされた議案・報告・提案理由・施政方針などのPDFを表示できます。</p>
                </div>
                <div class="text-sm bg-white/20 px-3 py-2 rounded-lg">モード: 議案書閲覧</div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h2 class="text-lg font-bold mb-4">資料を選択</h2>
            <div id="bill-buttons" class="space-y-5"></div>
        </section>

        <!-- 前後ナビゲーションバー -->
        <div id="nav-bar" class="hidden flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm px-5 py-3 mb-3">
            <button id="btn-prev"
                onclick="navigatePdf(-1)"
                class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition">
                <i class="fas fa-chevron-left"></i>前の資料
            </button>
            <span id="nav-counter" class="text-xs text-gray-500 font-medium"></span>
            <button id="btn-next"
                onclick="navigatePdf(1)"
                class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition">
                次の資料<i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <section class="bg-white p-6 rounded-xl shadow-sm">
            <div class="flex items-center justify-between gap-4 flex-wrap mb-4">
                <h2 id="viewer-title" class="text-lg font-bold">資料を選択してください</h2>
                <a id="pdf-open-link" href="#" target="_blank" rel="noopener noreferrer" class="text-sm bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg font-semibold hover:bg-indigo-200">
                    <i class="fas fa-external-link-alt mr-1"></i>別タブで開く
                </a>
            </div>
            <div id="pdf-stage" class="relative">
                <iframe id="pdf-viewer" title="議案書PDF" class="relative z-0 w-full h-[70vh] border border-gray-200 rounded-lg bg-gray-50" src="about:blank"></iframe>
                <canvas id="pdf-ink-canvas" class="absolute inset-0 z-10 hidden rounded-lg" style="touch-action: none;"></canvas>
            </div>
            <div id="ink-toolbar" class="mt-3 flex items-center gap-2 flex-wrap text-xs">
                <button id="ink-visibility-btn" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold">
                    手書きを隠す
                </button>
                <label class="flex items-center gap-1 text-gray-600">
                    色
                    <input id="ink-color" type="color" value="#ff2d55" class="w-8 h-8 p-0 border border-gray-300 rounded">
                </label>
                <label class="flex items-center gap-1 text-gray-600">
                    太さ
                    <input id="ink-size" type="range" min="1" max="12" value="3" class="w-24">
                </label>
                <button id="ink-undo-btn" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">元に戻す</button>
                <button id="ink-clear-btn" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">全消去</button>
                <button id="ink-save-btn" type="button" class="px-3 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-700 text-white font-semibold">
                    <i class="fas fa-save mr-1"></i>手書き保存
                </button>
                <span id="ink-status" class="text-gray-500"></span>
            </div>
            <p id="pdf-path-label" class="mt-3 text-xs text-gray-500"></p>
        </section>

        <!-- メモパネル -->
        <section id="memo-panel" class="hidden bg-white p-6 rounded-xl shadow-sm mt-4">
            <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fas fa-sticky-note text-yellow-500"></i>
                    <span>メモ</span>
                    <span id="memo-doc-label" class="text-sm font-normal text-gray-500"></span>
                </h2>
                <span id="memo-status" class="text-xs text-gray-400"></span>
            </div>
            <textarea id="memo-textarea"
                class="w-full border border-gray-200 rounded-lg p-3 text-sm h-36 resize-y focus:outline-none focus:ring-2 focus:ring-yellow-300"
                placeholder="この資料に関するメモを入力してください..."></textarea>
            <div class="flex gap-3 mt-3 justify-between items-center">
                <a href="document-notes.html" class="text-xs text-indigo-600 hover:text-indigo-800 font-semibold">
                    <i class="fas fa-search mr-1"></i>メモを検索・一覧
                </a>
                <div class="flex gap-3">
                    <button id="memo-clear-btn" type="button"
                        class="px-4 py-2 text-sm rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition">
                        クリア
                    </button>
                    <button id="memo-save-btn" type="button"
                        class="px-4 py-2 text-sm rounded-lg bg-yellow-500 hover:bg-yellow-600 text-white font-semibold transition">
                        <i class="fas fa-save mr-1"></i>保存
                    </button>
                </div>
            </div>
        </section>

        <div id="ink-clear-confirm-dialog" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-4">
            <div class="w-full max-w-md rounded-xl bg-white shadow-xl border border-gray-200 p-5">
                <h3 class="text-base font-bold text-gray-800 mb-2">手書きの全消去</h3>
                <p class="text-sm text-gray-600 leading-relaxed mb-4">この議案に書いた手書きがすべて消去され、復活できません。消去しますか？</p>
                <div class="flex justify-end gap-2">
                    <button id="ink-clear-cancel-btn" type="button" class="px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold">キャンセル</button>
                    <button id="ink-clear-confirm-btn" type="button" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white font-semibold">実行</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        const SESSION_DOCUMENTS = {};

        // メモ機能用変数
        let currentNoteDocName = null;
        let currentNoteSessionId = null;
        let _noteClient = null;
        let _noteMemberId = null;
        let activePdfObjectUrl = null;
        let inkVisible = true;
        let inkStrokes = [];
        let currentInkStroke = null;

        const DOCUMENT_TYPE_META = {
            summary: { title: "一覧表",     buttonClass: "bg-slate-100 hover:bg-slate-200 text-slate-800 border border-slate-300" },
            bill:    { title: "議案",       buttonClass: "bg-indigo-50 hover:bg-indigo-100 text-indigo-800 border border-indigo-200" },
            report:  { title: "報告",       buttonClass: "bg-emerald-50 hover:bg-emerald-100 text-emerald-800 border border-emerald-200" },
            reason:  { title: "提案理由・施政方針",   buttonClass: "bg-amber-50 hover:bg-amber-100 text-amber-800 border border-amber-200" },
            policy:  { title: "施政方針",   buttonClass: "bg-rose-50 hover:bg-rose-100 text-rose-800 border border-rose-200" },
            study:   { title: "勉強会資料", buttonClass: "bg-cyan-50 hover:bg-cyan-100 text-cyan-800 border border-cyan-200" },
            doc:     { title: "Word文書（DL）", buttonClass: "bg-violet-50 hover:bg-violet-100 text-violet-800 border border-violet-200" }
        };

        const DOCUMENT_TYPE_ORDER = ["summary", "bill", "report", "reason", "study", "doc"];

        function getSessionNumber() {
            const params = new URLSearchParams(window.location.search);
            const session = (params.get("session") || "").trim();
            return /^\d+$/.test(session) ? session : "";
        }

        function getDocuments(session) {
            return SESSION_DOCUMENTS[session] || [];
        }

        function mergeDocumentsPreferUploaded(existingDocuments, uploadedDocuments) {
            const merged = new Map();

            for (const documentInfo of existingDocuments || []) {
                merged.set(documentInfo.fileName, documentInfo);
            }

            for (const documentInfo of uploadedDocuments || []) {
                merged.set(documentInfo.fileName, documentInfo);
            }

            return Array.from(merged.values());
        }

        function buildPdfPath(session, documentInfo) {
            // Supabase Storageからのファイル（storageFolderNameを持つ）
            if (documentInfo.storageFolderName) {
                const path = documentInfo.storagePath
                    || documentInfo.resolvedStoragePath
                    || documentInfo.relativeStoragePath;

                if (path) {
                    return `${window.AUTH_CONFIG.supabaseUrl}/storage/v1/object/public/gian/${encodeURIComponent(path).replace(/%2F/g, "/")}`;
                }

                return "about:blank";
            }
            
            // 従来のGitHub Pagesから取得（gian/XXX形式）
            const segments = ["gian", session];
            if (documentInfo.subFolder) {
                segments.push(documentInfo.subFolder);
            }
            segments.push(documentInfo.fileName);
            return segments.map((segment) => encodeURIComponent(segment)).join("/");
        }

        function buildViewerUrl(session, documentInfo) {
            const pdfPath = buildPdfPath(session, documentInfo);
            const returnTo = `assembly-documents.html?session=${encodeURIComponent(session)}`;
            const url = new URL("assembly-document-viewer.html", window.location.href);
            url.searchParams.set("session", session);
            url.searchParams.set("fileName", documentInfo.fileName || "");
            url.searchParams.set("label", documentInfo.label || documentInfo.fileName || "資料");
            url.searchParams.set("pdf", pdfPath);
            url.searchParams.set("returnTo", returnTo);
            return url.toString();
        }

        function openPdfViewer(session, documentInfo) {
            const viewerUrl = buildViewerUrl(session, documentInfo);
            const popup = window.open(viewerUrl, "_blank");

            if (!popup) {
                window.location.href = viewerUrl;
                return;
            }

            document.getElementById("viewer-title").textContent = "資料を別画面で開きました";
            document.getElementById("pdf-path-label").textContent = `別画面: ${documentInfo.label || documentInfo.fileName}`;
        }

        function getButtonClass(type) {
            return (DOCUMENT_TYPE_META[type] || DOCUMENT_TYPE_META.bill).buttonClass;
        }

        function isPreviewableDocument(documentInfo) {
            return /\.pdf$/i.test(documentInfo.fileName || "");
        }

        function getDocumentsByType(documents, type) {
            if (type === "reason") {
                return documents.filter((documentInfo) => documentInfo.type === "reason" || documentInfo.type === "policy");
            }
            return documents.filter((documentInfo) => documentInfo.type === type);
        }

        // ナビゲーション用ステート（PDF表示可能な資料のみ対象）
        let navDocuments = [];
        let navIndex = -1;

        function updateNavBar() {
            const bar = document.getElementById("nav-bar");
            const counter = document.getElementById("nav-counter");
            const btnPrev = document.getElementById("btn-prev");
            const btnNext = document.getElementById("btn-next");

            if (navDocuments.length === 0) {
                bar.classList.add("hidden");
                return;
            }
            bar.classList.remove("hidden");
            counter.textContent = `${navIndex + 1} / ${navDocuments.length}`;
            btnPrev.disabled = navIndex <= 0;
            btnNext.disabled = navIndex >= navDocuments.length - 1;
        }

        function navigatePdf(delta) {
            const newIndex = navIndex + delta;
            if (newIndex < 0 || newIndex >= navDocuments.length) return;
            const session = getSessionNumber();
            showPdfByIndex(session, newIndex);
        }

        function releasePdfObjectUrl() {
            if (!activePdfObjectUrl) {
                return;
            }
            URL.revokeObjectURL(activePdfObjectUrl);
            activePdfObjectUrl = null;
        }

        function getInkCanvas() {
            return document.getElementById("pdf-ink-canvas");
        }

        function getInkContext() {
            const canvas = getInkCanvas();
            return canvas.getContext("2d");
        }

        function setInkStatus(message) {
            document.getElementById("ink-status").textContent = message;
        }

        function resizeInkCanvas() {
            const stage = document.getElementById("pdf-stage");
            const viewer = document.getElementById("pdf-viewer");
            const canvas = getInkCanvas();
            const ratio = window.devicePixelRatio || 1;
            const width = stage.clientWidth || viewer.clientWidth;
            const height = stage.clientHeight || viewer.clientHeight;

            canvas.width = Math.max(1, Math.floor(width * ratio));
            canvas.height = Math.max(1, Math.floor(height * ratio));
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;

            const ctx = getInkContext();
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            redrawInkCanvas();
        }

        function redrawInkCanvas() {
            const canvas = getInkCanvas();
            const ctx = getInkContext();
            const ratio = window.devicePixelRatio || 1;
            const width = canvas.width / ratio;
            const height = canvas.height / ratio;

            if (width <= 0 || height <= 0) return;

            ctx.clearRect(0, 0, width, height);

            for (const stroke of inkStrokes) {
                if (!stroke.points || stroke.points.length === 0) continue;
                ctx.strokeStyle = stroke.color || "#ff2d55";
                ctx.lineWidth = Number(stroke.size || 3);
                ctx.lineCap = "round";
                ctx.lineJoin = "round";

                ctx.beginPath();
                stroke.points.forEach((point, idx) => {
                    const x = point.x * width;
                    const y = point.y * height;
                    if (idx === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }
        }

        function resetInkData() {
            inkStrokes = [];
            currentInkStroke = null;
            updateInkCanvasVisibility();  // 先に表示状態を確定させてからclientWidthを取得
            redrawInkCanvas();
        }

        function updateInkCanvasVisibility() {
            const canvas = getInkCanvas();
            const toolbar = document.getElementById("ink-toolbar");
            const visibilityBtn = document.getElementById("ink-visibility-btn");
            const hasActiveDocument = !!currentNoteDocName;
            const hasInk = inkStrokes.length > 0;

            const toolbarControls = toolbar.querySelectorAll("button, input");
            toolbarControls.forEach((control) => {
                control.disabled = !hasActiveDocument;
            });

            canvas.classList.toggle("hidden", !(hasActiveDocument && inkVisible));
            canvas.style.pointerEvents = (hasActiveDocument && inkVisible) ? "auto" : "none";

            visibilityBtn.disabled = !hasActiveDocument || !hasInk;
            visibilityBtn.textContent = inkVisible ? "手書きを隠す" : "手書きを表示する";
            visibilityBtn.className = visibilityBtn.disabled
                ? "px-3 py-2 rounded-lg border border-gray-200 bg-gray-100 text-gray-400 font-semibold cursor-not-allowed"
                : "px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold";
        }

        function toggleInkVisibility() {
            if (inkStrokes.length === 0) {
                return;
            }
            inkVisible = !inkVisible;
            updateInkCanvasVisibility();
            redrawInkCanvas();
        }

        function appendInkPointFromPointer(event) {
            if (!currentInkStroke) return;
            const canvas = getInkCanvas();
            const rect = canvas.getBoundingClientRect();
            const x = (event.clientX - rect.left) / Math.max(1, rect.width);
            const y = (event.clientY - rect.top) / Math.max(1, rect.height);
            currentInkStroke.points.push({
                x: Math.min(1, Math.max(0, x)),
                y: Math.min(1, Math.max(0, y))
            });
        }

        function setupInkCanvasEvents() {
            const canvas = getInkCanvas();
            const viewer = document.getElementById("pdf-viewer");

            viewer.addEventListener("load", () => {
                // PDF iframeの再レイアウト後に手書きを再描画
                requestAnimationFrame(() => requestAnimationFrame(() => resizeInkCanvas()));
            });

            canvas.addEventListener("pointerdown", (event) => {
                if (!currentNoteDocName || !currentNoteSessionId) {
                    return;
                }
                event.preventDefault();
                canvas.setPointerCapture(event.pointerId);

                currentInkStroke = {
                    color: document.getElementById("ink-color").value,
                    size: Number(document.getElementById("ink-size").value),
                    points: []
                };

                appendInkPointFromPointer(event);
                inkStrokes.push(currentInkStroke);
                redrawInkCanvas();
            });

            canvas.addEventListener("pointermove", (event) => {
                if (!currentInkStroke) {
                    return;
                }
                event.preventDefault();
                appendInkPointFromPointer(event);
                redrawInkCanvas();
            });

            const finishStroke = (event) => {
                if (!currentInkStroke) return;
                event.preventDefault();
                appendInkPointFromPointer(event);
                currentInkStroke = null;
                redrawInkCanvas();
                setInkStatus(`未保存（${inkStrokes.length}件）`);
            };

            canvas.addEventListener("pointerup", finishStroke);
            canvas.addEventListener("pointercancel", finishStroke);
            window.addEventListener("resize", resizeInkCanvas);
        }

        async function loadInkNote(sessionId, documentInfo) {
            resetInkData();
            setInkStatus("手書き読込中...");
            inkVisible = true;
            updateInkCanvasVisibility();

            const memberId = getNoteMemberId();
            if (!memberId) {
                setInkStatus("(ログイン情報なし)");
                return;
            }

            try {
                const supabase = getNoteClient();
                console.log("[inkNote] 読込: memberId=", memberId, "sessionId=", sessionId, "docName=", documentInfo.fileName);
                const { data, error } = await supabase
                    .from("document_ink_notes")
                    .select("ink_payload, updated_at")
                    .eq("member_id", memberId)
                    .eq("session_id", sessionId)
                    .eq("document_name", documentInfo.fileName)
                    .maybeSingle();

                if (error) throw error;

                console.log("[inkNote] DB結果:", data);
                inkStrokes = data && Array.isArray(data.ink_payload) ? data.ink_payload : [];
                console.log("[inkNote] ストローク数:", inkStrokes.length);
                inkVisible = true;
                updateInkCanvasVisibility();
                // 2フレーム待機してレイアウト確定後に描画
                requestAnimationFrame(() => requestAnimationFrame(() => resizeInkCanvas()));

                if (data && data.updated_at) {
                    const dt = new Date(data.updated_at).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
                    setInkStatus(`最終保存: ${dt}（${inkStrokes.length}件）`);
                } else {
                    setInkStatus(inkStrokes.length > 0 ? `未保存（${inkStrokes.length}件）` : "未保存");
                }
            } catch (error) {
                console.warn("手書きメモ読込エラー:", error);
                setInkStatus("手書き読込エラー");
            }
        }

        async function saveInkNote() {
            const memberId = getNoteMemberId();
            if (!memberId || !currentNoteDocName || !currentNoteSessionId) {
                return;
            }

            const validStrokes = inkStrokes.filter((stroke) => Array.isArray(stroke.points) && stroke.points.length >= 2);
            if (validStrokes.length === 0) {
                setInkStatus("保存対象なし（1本以上描いてから保存してください）");
                return;
            }

            const saveBtn = document.getElementById("ink-save-btn");
            saveBtn.disabled = true;
            setInkStatus("手書き保存中...");

            try {
                const supabase = getNoteClient();
                const now = new Date().toISOString();
                const { error } = await supabase
                    .from("document_ink_notes")
                    .upsert({
                        member_id: memberId,
                        session_id: currentNoteSessionId,
                        document_name: currentNoteDocName,
                        ink_payload: validStrokes,
                        updated_at: now
                    }, { onConflict: "member_id,session_id,document_name" });

                if (error) throw error;

                inkStrokes = validStrokes;
                const dt = new Date(now).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
                setInkStatus(`最終保存: ${dt}（${inkStrokes.length}件）`);
            } catch (error) {
                console.warn("手書きメモ保存エラー:", error);
                setInkStatus("手書き保存エラー");
            } finally {
                saveBtn.disabled = false;
            }
        }

        async function clearInkNote() {
            const memberId = getNoteMemberId();
            const clearBtn = document.getElementById("ink-clear-btn");

            resetInkData();
            inkVisible = true;
            updateInkCanvasVisibility();

            if (!memberId || !currentNoteDocName || !currentNoteSessionId) {
                setInkStatus("未保存");
                return;
            }

            clearBtn.disabled = true;
            setInkStatus("手書き削除中...");

            try {
                const supabase = getNoteClient();
                const { error } = await supabase
                    .from("document_ink_notes")
                    .delete()
                    .eq("member_id", memberId)
                    .eq("session_id", currentNoteSessionId)
                    .eq("document_name", currentNoteDocName);

                if (error) throw error;

                setInkStatus("手書きを削除しました");
            } catch (error) {
                console.warn("手書きメモ削除エラー:", error);
                setInkStatus("手書き削除エラー");
            } finally {
                clearBtn.disabled = false;
            }
        }

        function openInkClearConfirmDialog() {
            const dialog = document.getElementById("ink-clear-confirm-dialog");
            dialog.classList.remove("hidden");
            dialog.classList.add("flex");
        }

        function closeInkClearConfirmDialog() {
            const dialog = document.getElementById("ink-clear-confirm-dialog");
            dialog.classList.add("hidden");
            dialog.classList.remove("flex");
        }

        function undoInkStroke() {
            if (inkStrokes.length === 0) return;
            inkStrokes.pop();
            inkVisible = true;
            updateInkCanvasVisibility();
            redrawInkCanvas();
            setInkStatus("未保存");
        }

        async function loadPdfIntoViewer(documentInfo, pdfPath) {
            const viewer = document.getElementById("pdf-viewer");

            viewer.src = "about:blank";
            releasePdfObjectUrl();

            try {
                let pdfBlob;

                if (documentInfo.storageFolderName && documentInfo.storagePath) {
                    const supabase = window.portalAuth && typeof window.portalAuth.ensureClient === "function"
                        ? window.portalAuth.ensureClient()
                        : window.supabase.createClient(window.AUTH_CONFIG.supabaseUrl, window.AUTH_CONFIG.supabaseAnonKey);
                    const { data, error } = await supabase.storage
                        .from("gian")
                        .download(documentInfo.storagePath);

                    if (error || !data) {
                        throw error || new Error("Storage download failed");
                    }

                    pdfBlob = data;
                } else {
                    const response = await fetch(pdfPath);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    pdfBlob = await response.blob();
                }

                activePdfObjectUrl = URL.createObjectURL(new Blob([pdfBlob], { type: "application/pdf" }));
                viewer.src = activePdfObjectUrl;
            } catch (error) {
                console.warn("PDF表示用の読み込みに失敗しました。直接URLを使用します:", error);
                viewer.src = pdfPath;
            }
        }

        async function showPdfByIndex(session, index) {
            navIndex = index;
            const documentInfo = navDocuments[index];
            updateNavBar();
            openPdfViewer(session, documentInfo);
        }

        async function showPdf(session, documentInfo) {
            const index = navDocuments.indexOf(documentInfo);
            if (index !== -1) {
                navIndex = index;
                updateNavBar();
            }
            openPdfViewer(session, documentInfo);
        }

        function renderBillButtons(session) {
            const container = document.getElementById("bill-buttons");
            const documents = getDocuments(session);

            container.innerHTML = "";

            if (documents.length === 0) {
                const message = document.createElement("p");
                message.className = "text-sm text-gray-600";
                message.textContent = "この回次のPDFはまだ登録されていません。";
                container.appendChild(message);
                return;
            }

            for (const type of DOCUMENT_TYPE_ORDER) {
                const groupedDocuments = getDocumentsByType(documents, type);

                if (groupedDocuments.length === 0) {
                    continue;
                }

                const section = document.createElement("section");
                const heading = document.createElement("h3");
                const grid = document.createElement("div");

                section.className = "border border-gray-200 rounded-xl p-4 bg-gray-50";
                heading.className = "text-sm font-bold text-gray-700 mb-3";
                heading.textContent = DOCUMENT_TYPE_META[type].title;
                grid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3";

                const sortedDocuments = sortDocumentsByNumber(groupedDocuments);
                for (const documentInfo of sortedDocuments) {
                    if (!isPreviewableDocument(documentInfo)) {
                        const a = document.createElement("a");
                        a.href = buildPdfPath(session, documentInfo);
                        a.download = documentInfo.fileName;
                        a.className = `${getButtonClass(documentInfo.type)} px-3 py-2 rounded-lg text-sm font-semibold transition text-left flex items-center gap-2`;
                        a.innerHTML = `<i class="fas fa-download text-xs"></i>${documentInfo.label}`;
                        grid.appendChild(a);
                    } else {
                        const button = document.createElement("button");
                        button.type = "button";
                        button.className = `${getButtonClass(documentInfo.type)} px-3 py-2 rounded-lg text-sm font-semibold transition text-left`;
                        button.textContent = documentInfo.label;
                        button.addEventListener("click", () => showPdf(session, documentInfo));
                        grid.appendChild(button);
                    }
                }

                section.appendChild(heading);
                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        function initAssemblyPage() {
            const session = getSessionNumber();
            if (!session) {
                document.getElementById("session-title").textContent = "議会回次を選択してください";
                document.getElementById("session-description").textContent = "アーカイブページに戻り、回次ボタンから開いてください。";
                document.getElementById("bill-buttons").innerHTML = "<p class=\"text-sm text-gray-600\">回次が指定されていません。</p>";
                document.getElementById("viewer-title").textContent = "資料を選択してください";
                document.getElementById("pdf-open-link").href = "#";
                releasePdfObjectUrl();
                document.getElementById("pdf-viewer").src = "about:blank";
                document.getElementById("pdf-path-label").textContent = "";
                currentNoteDocName = null;
                currentNoteSessionId = null;
                inkVisible = true;
                resetInkData();
                setInkStatus("");
                navDocuments = [];
                navIndex = -1;
                updateNavBar();
                return;
            }
            const documents = getDocuments(session);

            // PDFは別画面で開くため、この画面では前後ナビゲーションを表示しない
            navDocuments = [];
            navIndex = -1;

            document.getElementById("session-title").textContent = `第${session}回議会`;
            document.getElementById("session-description").textContent = documents.length > 0
                ? "議案・報告・提案理由・施政方針などのPDFを表示できます。"
                : "この回次のPDFはまだ登録されていません。";
            renderBillButtons(session);

            document.getElementById("viewer-title").textContent = "資料を選択すると別画面で開きます";
            document.getElementById("pdf-open-link").href = "#";
            releasePdfObjectUrl();
            document.getElementById("pdf-viewer").src = "about:blank";
            document.getElementById("pdf-path-label").textContent = "この画面内ではPDFを表示しません。資料ボタンから別画面を開いてください。";
            currentNoteDocName = null;
            currentNoteSessionId = null;
            inkVisible = true;
            resetInkData();
            setInkStatus("");
            updateNavBar();
        }

        function extractStorageIndex(path) {
            const match = /file_\d+_(\d+)\.[^.]+$/.exec(path || "");
            return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
        }

        function extractNumberFromLabel(label) {
            // 全角数字を半角に変換してから抽出
            const normalized = (label || "").replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
            const match = /(\d+)/.exec(normalized);
            return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
        }

        function sortDocumentsByNumber(documents) {
            return documents.slice().sort((a, b) => {
                const numA = extractNumberFromLabel(a.label);
                const numB = extractNumberFromLabel(b.label);
                return numA - numB;
            });
        }

        async function resolveUploadedStoragePaths(supabase, folderName, documents) {
            const docs = documents.map((documentInfo) => ({ ...documentInfo }));
            if (docs.every((documentInfo) => documentInfo.storagePath)) {
                return docs;
            }

            const groups = new Map();
            for (const documentInfo of docs) {
                const groupKey = documentInfo.subFolder || "";
                if (!groups.has(groupKey)) {
                    groups.set(groupKey, []);
                }
                groups.get(groupKey).push(documentInfo);
            }

            for (const [subFolder, groupDocs] of groups.entries()) {
                const storageFolder = subFolder ? `${folderName}/${subFolder}` : folderName;

                try {
                    const { data, error } = await supabase.storage
                        .from("gian")
                        .list(storageFolder, { limit: 200, sortBy: { column: "name", order: "asc" } });

                    if (error || !data) {
                        continue;
                    }

                    const storagePaths = data
                        .filter((item) => item && item.name)
                        .map((item) => `${storageFolder}/${item.name}`)
                        .sort((left, right) => extractStorageIndex(left) - extractStorageIndex(right));

                    groupDocs.forEach((documentInfo, index) => {
                        if (!documentInfo.storagePath && storagePaths[index]) {
                            documentInfo.resolvedStoragePath = storagePaths[index];
                        }
                    });
                } catch (error) {
                    console.warn("Storage path の補完に失敗しました:", error);
                }
            }

            return docs;
        }

        async function initAssemblyPageWithUploadedDocs() {
            const session = getSessionNumber();
            if (!session) {
                initAssemblyPage();
                return;
            }
            const supabase = window.portalAuth && typeof window.portalAuth.ensureClient === "function"
                ? window.portalAuth.ensureClient()
                : window.supabase.createClient(window.AUTH_CONFIG.supabaseUrl, window.AUTH_CONFIG.supabaseAnonKey);

            // Supabaseからアップロード済みドキュメントメタデータを取得
            try {
                const { data, error } = await supabase
                    .from("meeting_settings")
                    .select("setting_payload")
                    .like("setting_key", `uploaded_documents_${session}_%`);

                if (error) {
                    console.warn("Could not load uploaded documents (policy error):", error);
                    initAssemblyPage();
                    return;
                }

                if (data && data.length > 0) {
                    for (const record of data) {
                        const payload = record.setting_payload;
                        if (payload && payload.documents && payload.folderName) {
                            const folderName = payload.folderName; // e.g., "446_2026_03"
                            const resolvedDocuments = await resolveUploadedStoragePaths(supabase, folderName, payload.documents);
                            const newDocs = resolvedDocuments.map(doc => ({
                                ...doc,
                                storageFolderName: folderName,
                                label: doc.label || doc.fileName.replace(".pdf", "")
                            }));

                            SESSION_DOCUMENTS[session] = mergeDocumentsPreferUploaded(
                                SESSION_DOCUMENTS[session] || [],
                                newDocs
                            );
                        }
                    }
                }
            } catch (err) {
                console.warn("Could not load uploaded documents (exception):", err);
            }

            initAssemblyPage();
        }

        // ---- メモ機能 ----
        function getNoteClient() {
            if (_noteClient) return _noteClient;
            _noteClient = window.portalAuth && typeof window.portalAuth.ensureClient === "function"
                ? window.portalAuth.ensureClient()
                : window.supabase.createClient(window.AUTH_CONFIG.supabaseUrl, window.AUTH_CONFIG.supabaseAnonKey);
            return _noteClient;
        }

        function getNoteMemberId() {
            if (_noteMemberId) return _noteMemberId;
            const sess = window.portalAuth.getSession();
            _noteMemberId = sess && sess.memberId ? sess.memberId : null;
            return _noteMemberId;
        }

        async function loadNote(sessionId, documentInfo) {
            const panel = document.getElementById("memo-panel");
            const labelEl = document.getElementById("memo-doc-label");
            const textarea = document.getElementById("memo-textarea");
            const statusEl = document.getElementById("memo-status");

            currentNoteSessionId = sessionId;
            currentNoteDocName = documentInfo.fileName;

            panel.classList.remove("hidden");
            labelEl.textContent = `— ${documentInfo.label}`;
            textarea.value = "";
            statusEl.textContent = "読み込み中...";

            const memberId = getNoteMemberId();
            if (!memberId) {
                statusEl.textContent = "(ログイン情報なし)";
                return;
            }

            try {
                const supabase = getNoteClient();
                const { data, error } = await supabase
                    .from("document_notes")
                    .select("note_text, updated_at")
                    .eq("member_id", memberId)
                    .eq("session_id", sessionId)
                    .eq("document_name", documentInfo.fileName)
                    .maybeSingle();

                if (error) throw error;

                if (data && data.note_text) {
                    textarea.value = data.note_text;
                    const dt = new Date(data.updated_at).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
                    statusEl.textContent = `最終保存: ${dt}`;
                } else {
                    statusEl.textContent = "未保存";
                }
            } catch (e) {
                statusEl.textContent = "読み込みエラー";
                console.warn("メモ読み込みエラー:", e);
            }
        }

        async function saveNote() {
            const textarea = document.getElementById("memo-textarea");
            const statusEl = document.getElementById("memo-status");
            const saveBtn = document.getElementById("memo-save-btn");

            const memberId = getNoteMemberId();
            if (!memberId || !currentNoteDocName || !currentNoteSessionId) return;

            saveBtn.disabled = true;
            statusEl.textContent = "保存中...";

            try {
                const supabase = getNoteClient();
                const now = new Date().toISOString();
                const { error } = await supabase
                    .from("document_notes")
                    .upsert({
                        member_id: memberId,
                        session_id: currentNoteSessionId,
                        document_name: currentNoteDocName,
                        note_text: textarea.value,
                        updated_at: now
                    }, { onConflict: "member_id,session_id,document_name" });

                if (error) throw error;

                const dt = new Date(now).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
                statusEl.textContent = `最終保存: ${dt}`;
            } catch (e) {
                statusEl.textContent = "保存エラー";
                console.warn("メモ保存エラー:", e);
            } finally {
                saveBtn.disabled = false;
            }
        }

        function clearMemoText() {
            document.getElementById("memo-textarea").value = "";
            document.getElementById("memo-status").textContent = "";
        }

        document.getElementById("ink-visibility-btn").addEventListener("click", toggleInkVisibility);
        document.getElementById("ink-save-btn").addEventListener("click", saveInkNote);
        document.getElementById("ink-clear-btn").addEventListener("click", openInkClearConfirmDialog);
        document.getElementById("ink-undo-btn").addEventListener("click", undoInkStroke);
        document.getElementById("ink-clear-cancel-btn").addEventListener("click", closeInkClearConfirmDialog);
        document.getElementById("ink-clear-confirm-btn").addEventListener("click", async () => {
            closeInkClearConfirmDialog();
            await clearInkNote();
        });
        document.getElementById("ink-clear-confirm-dialog").addEventListener("click", (event) => {
            if (event.target.id === "ink-clear-confirm-dialog") {
                closeInkClearConfirmDialog();
            }
        });
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeInkClearConfirmDialog();
            }
        });

        document.getElementById("memo-save-btn").addEventListener("click", saveNote);
        document.getElementById("memo-clear-btn").addEventListener("click", clearMemoText);
        setupInkCanvasEvents();
        // ---- メモ機能ここまで ----

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "assembly-documents.html",
            onReady: initAssemblyPageWithUploadedDocs
        });
    </script>
</body>
