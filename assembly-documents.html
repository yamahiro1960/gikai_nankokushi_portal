<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議案書アーカイブ | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                    <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
                </a>
            </div>
            <span class="text-sm">議案書アーカイブ</span>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6">
            <a href="archive.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>アーカイブに戻る
            </a>
        </div>

        <section class="rounded-2xl p-6 md:p-8 bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg mb-8">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
                <div>
                    <h1 id="session-title" class="text-3xl md:text-4xl font-bold mb-2">第446回議会</h1>
                    <p id="session-description" class="text-blue-50">議案・報告・提案理由・施政方針などのPDFを表示できます。</p>
                </div>
                <div class="text-sm bg-white/20 px-3 py-2 rounded-lg">モード: 議案書閲覧</div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <h2 class="text-lg font-bold mb-4">資料を選択</h2>
            <div id="bill-buttons" class="space-y-5"></div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm">
            <div class="flex items-center justify-between gap-4 flex-wrap mb-4">
                <h2 id="viewer-title" class="text-lg font-bold">資料を選択してください</h2>
                <a id="pdf-open-link" href="#" target="_blank" rel="noopener noreferrer" class="text-sm bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg font-semibold hover:bg-indigo-200">
                    <i class="fas fa-external-link-alt mr-1"></i>別タブで開く
                </a>
            </div>
            <iframe id="pdf-viewer" title="議案書PDF" class="w-full h-[70vh] border border-gray-200 rounded-lg bg-gray-50" src="about:blank"></iframe>
            <p id="pdf-path-label" class="mt-3 text-xs text-gray-500"></p>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        const SESSION_DOCUMENTS = {
            "446": [
                { label: "議案一覧表（446回）", fileName: "議案一覧表（446回）.pdf", type: "summary" },
                { label: "議案第1号：令和7年度一般会計補正予算", fileName: "議案第１号：令和７年度一般会計補正予算.pdf", type: "bill" },
                { label: "議案第2号：令和7年度土地取得事業特別会計補正予算", fileName: "議案第２号：令和７年度土地取得事業特別会計補正予算.pdf", type: "bill" },
                { label: "議案第3号：令和7年度国民健康保険特別会計補正予算", fileName: "議案第３号：令和７年度国民健康保険特別会計補正予算.pdf", type: "bill" },
                { label: "議案第4号：令和7年度介護保険特別会計補正予算", fileName: "議案第４号：令和７年度介護保険特別会計補正予算.pdf", type: "bill" },
                { label: "議案第5号：令和7年度後期高齢者医療保険特別会計補正予算", fileName: "議案第５号：令和７年度後期高齢者医療保険特別会計補正予算.pdf", type: "bill" },
                { label: "議案第6号：令和7年度下水道事業会計補正予算（第3号）", fileName: "議案第６号：令和７年度下水道事業会計補正予算（第３号）.pdf", type: "bill" },
                { label: "議案第7号：令和8年度一般会計予算", fileName: "議案第７号：令和８年度一般会計予算.pdf", type: "bill" },
                { label: "議案第8号：令和8年度土地取得事業特別会計予算", fileName: "議案第８号：令和８年度土地取得事業特別会計予算.pdf", type: "bill" },
                { label: "議案第9号：令和8年度国民健康保険特別会計予算", fileName: "議案第９号：令和８年度国民健康保険特別会計予算.pdf", type: "bill" },
                { label: "議案第10号：令和8年度介護保険特別会計予算", fileName: "議案第１０号：令和８年度介護保険特別会計予算.pdf", type: "bill" },
                { label: "議案第11号：令和8年度企業団地造成事業特別会計予算", fileName: "議案第１１号：令和８年度企業団地造成事業特別会計予算.pdf", type: "bill" },
                { label: "議案第12号：令和8年度後期高齢者医療保険特別会計予算", fileName: "議案第１２号：令和８年度後期高齢者医療保険特別会計予算.pdf", type: "bill" },
                { label: "議案第13号：令和8年度水道事業会計予算", fileName: "議案第１３号：令和８年度水道事業会計予算.pdf", type: "bill" },
                { label: "議案第14号：令和8年度下水道事業会計予算", fileName: "議案第１４号：令和８年度下水道事業会計予算.pdf", type: "bill" },
                { label: "議案第15号：市税条例 改正", fileName: "議案第１５号：市税条例　改正.pdf", type: "bill" },
                { label: "議案第16号：国保事業財政調整基金条例 改正", fileName: "議案第１６号：国保事業財政調整基金条例　改正.pdf", type: "bill" },
                { label: "議案第17号：乳児等通園支援事業に関する基準条例 改正", fileName: "議案第１７号：乳児等通園支援事業に関する基準条例　改正.pdf", type: "bill" },
                { label: "議案第18号：災害弔慰金支給条例 改正", fileName: "議案第１８号：災害弔慰金支給条例　改正.pdf", type: "bill" },
                { label: "議案第19号：介護保険条例の一部を改正する条例", fileName: "議案第１９号：介護保険条例の一部を改正する条例.pdf", type: "bill" },
                { label: "議案第20号：火災予防条例改正", fileName: "議案第２０号：火災予防条例改正.pdf", type: "bill" },
                { label: "議案第21号：ふるさと寄附条例 改正", fileName: "議案第２１号：ふるさと寄附条例　改正.pdf", type: "bill" },
                { label: "議案第22号：給与条例改正", fileName: "議案第２２号：給与条例改正.pdf", type: "bill" },
                { label: "議案第23号：職員の旅費に関する条例 改正", fileName: "議案第２３号：職員の旅費に関する条例　改正.pdf", type: "bill" },
                { label: "議案第24号：特別職非常勤職員の報酬等条例 改正", fileName: "議案第２４号：特別職非常勤職員の報酬等条例　改正.pdf", type: "bill" },
                { label: "議案第25号：辺地総合整備計画変更", fileName: "議案第２５号：辺地総合整備計画変更.pdf", type: "bill" },
                { label: "報告第1号：一般会計補正予算", fileName: "報告第１号：一般会計補正予算.pdf", type: "report" },
                { label: "報告第2号：損害賠償専決（財政・建設・物損）", fileName: "報告第２号：損害賠償専決（財政・建設・物損）.pdf", type: "report" },
                { label: "提案理由（446回）", fileName: "提案理由（446回）.pdf", type: "reason" },
                { label: "施政方針（446回）", fileName: "施政方針（446回）.pdf", type: "policy" },
                { label: "勉強会資料：R8.2.24議員勉強会資料（当初予算）", fileName: "R8.2.24議員勉強会資料（当初予算）.pdf", type: "study", subFolder: "benkyoukai" },
                { label: "勉強会資料：R8.2.24議員勉強会資料（３月補正）", fileName: "R8.2.24議員勉強会資料（３月補正）.pdf", type: "study", subFolder: "benkyoukai" }
            ]
        };

        const DOCUMENT_TYPE_META = {
            summary: { title: "一覧表", buttonClass: "bg-slate-700 hover:bg-slate-800" },
            bill: { title: "議案", buttonClass: "bg-indigo-700 hover:bg-indigo-800" },
            report: { title: "報告", buttonClass: "bg-emerald-700 hover:bg-emerald-800" },
            reason: { title: "提案理由", buttonClass: "bg-amber-600 hover:bg-amber-700" },
            policy: { title: "施政方針", buttonClass: "bg-rose-700 hover:bg-rose-800" },
            study: { title: "勉強会資料", buttonClass: "bg-cyan-700 hover:bg-cyan-800" }
        };

        const DOCUMENT_TYPE_ORDER = ["summary", "bill", "report", "reason", "policy", "study"];

        function getSessionNumber() {
            const params = new URLSearchParams(window.location.search);
            const session = params.get("session") || "446";
            const valid = ["446", "445", "444", "443", "442", "441", "440"];
            return valid.includes(session) ? session : "446";
        }

        function getDocuments(session) {
            return SESSION_DOCUMENTS[session] || [];
        }

        function buildPdfPath(session, documentInfo) {
            const segments = ["gian", session];

            if (documentInfo.subFolder) {
                segments.push(documentInfo.subFolder);
            }

            segments.push(documentInfo.fileName);
            return segments.map((segment) => encodeURIComponent(segment)).join("/");
        }

        function getButtonClass(type) {
            return (DOCUMENT_TYPE_META[type] || DOCUMENT_TYPE_META.bill).buttonClass;
        }

        function showPdf(session, documentInfo) {
            const pdfPath = buildPdfPath(session, documentInfo);
            const viewer = document.getElementById("pdf-viewer");
            const title = document.getElementById("viewer-title");
            const link = document.getElementById("pdf-open-link");
            const pathLabel = document.getElementById("pdf-path-label");

            title.textContent = documentInfo.label;
            viewer.src = pdfPath;
            link.href = pdfPath;
            pathLabel.textContent = `表示中: ${pdfPath}`;
        }

        function renderBillButtons(session) {
            const container = document.getElementById("bill-buttons");
            const documents = getDocuments(session);

            container.innerHTML = "";

            if (documents.length === 0) {
                const message = document.createElement("p");
                message.className = "text-sm text-gray-600";
                message.textContent = "この回次のPDFはまだ登録されていません。";
                container.appendChild(message);
                return;
            }

            for (const type of DOCUMENT_TYPE_ORDER) {
                const groupedDocuments = documents.filter((documentInfo) => documentInfo.type === type);

                if (groupedDocuments.length === 0) {
                    continue;
                }

                const section = document.createElement("section");
                const heading = document.createElement("h3");
                const grid = document.createElement("div");

                section.className = "border border-gray-200 rounded-xl p-4 bg-gray-50";
                heading.className = "text-sm font-bold text-gray-700 mb-3";
                heading.textContent = DOCUMENT_TYPE_META[type].title;
                grid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3";

                for (const documentInfo of groupedDocuments) {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = `${getButtonClass(documentInfo.type)} text-white px-3 py-2 rounded-lg text-sm font-semibold transition text-left`;
                    button.textContent = documentInfo.label;
                    button.addEventListener("click", () => showPdf(session, documentInfo));
                    grid.appendChild(button);
                }

                section.appendChild(heading);
                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        function initAssemblyPage() {
            const session = getSessionNumber();
            const documents = getDocuments(session);

            document.getElementById("session-title").textContent = `第${session}回議会`;
            document.getElementById("session-description").textContent = documents.length > 0
                ? "議案・報告・提案理由・施政方針などのPDFを表示できます。"
                : "この回次のPDFはまだ登録されていません。";
            renderBillButtons(session);

            if (documents.length > 0) {
                showPdf(session, documents[0]);
                return;
            }

            document.getElementById("viewer-title").textContent = "資料を選択してください";
            document.getElementById("pdf-open-link").href = "#";
            document.getElementById("pdf-viewer").src = "about:blank";
            document.getElementById("pdf-path-label").textContent = "";
        }

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "assembly-documents.html",
            onReady: initAssemblyPage
        });
    </script>
</body>
</html>
