<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繝ｦ繝ｼ繧ｶ繝ｼ邂｡逅・| 蜊怜嵜蟶りｭｰ莨咼X繝昴・繧ｿ繝ｫ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <header class="bg-indigo-700 text-white p-4 shadow">
        <div class="container mx-auto flex justify-between items-center">
            <a href="system-settings.html" class="font-bold hover:text-indigo-100">繧ｷ繧ｹ繝・Β險ｭ螳・/a>
            <div id="authArea"></div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6">
            <a href="system-settings.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">繧ｷ繧ｹ繝・Β險ｭ螳壹∈謌ｻ繧・/a>
        </div>

        <h1 class="text-3xl font-bold mb-2">繝ｭ繧ｰ繧､繝ｳ繝ｦ繝ｼ繧ｶ繝ｼ邂｡逅・/h1>
        <p class="text-sm text-slate-600 mb-6">逋ｻ骭ｲ貂医∩繝ｦ繝ｼ繧ｶ繝ｼ縺ｮ讓ｩ髯舌ｒ螟画峩縺ｧ縺阪∪縺呻ｼ・dmin縺ｮ縺ｿ・峨・/p>

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="text-left p-3 border-b">繝｡繝ｼ繝ｫ</th>
                        <th class="text-left p-3 border-b">陦ｨ遉ｺ蜷・/th>
                        <th class="text-left p-3 border-b">迴ｾ蝨ｨ縺ｮ讓ｩ髯・/th>
                        <th class="text-left p-3 border-b">螟画峩</th>
                    </tr>
                </thead>
                <tbody id="userRows"></tbody>
            </table>
        </div>

        <p id="message" class="mt-4 text-sm text-slate-700"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        const userRows = document.getElementById("userRows");
        const message = document.getElementById("message");

        function renderRows(items, client) {
            userRows.innerHTML = "";
            items.forEach((item) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="p-3 border-b">${item.email || ""}</td>
                    <td class="p-3 border-b">${item.display_name || ""}</td>
                    <td class="p-3 border-b">${item.role || "viewer"}</td>
                    <td class="p-3 border-b">
                        <select data-id="${item.user_id}" class="roleSelect border border-slate-300 rounded px-2 py-1 mr-2">
                            <option value="viewer" ${item.role === "viewer" ? "selected" : ""}>viewer</option>
                            <option value="editor" ${item.role === "editor" ? "selected" : ""}>editor</option>
                            <option value="admin" ${item.role === "admin" ? "selected" : ""}>admin</option>
                        </select>
                        <button data-id="${item.user_id}" class="saveRole bg-indigo-600 text-white px-3 py-1 rounded">菫晏ｭ・/button>
                    </td>
                `;
                userRows.appendChild(tr);
            });

            document.querySelectorAll(".saveRole").forEach((button) => {
                button.addEventListener("click", async () => {
                    const userId = button.getAttribute("data-id");
                    const select = document.querySelector(`.roleSelect[data-id='${userId}']`);
                    const role = select.value;

                    const { error } = await client
                        .from("profiles")
                        .update({ role })
                        .eq("user_id", userId);

                    if (error) {
                        message.textContent = `譖ｴ譁ｰ螟ｱ謨・ ${error.message}`;
                        return;
                    }

                    message.textContent = "讓ｩ髯舌ｒ譖ｴ譁ｰ縺励∪縺励◆縲・;
                    await loadUsers(client);
                });
            });
        }

        async function loadUsers(client) {
            const { data, error } = await client
                .from("profiles")
                .select("user_id,email,display_name,role")
                .order("email", { ascending: true });

            if (error) {
                message.textContent = `隱ｭ霎ｼ螟ｱ謨・ ${error.message}`;
                return;
            }

            renderRows(data || [], client);
        }

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            returnTo: "user-management.html",
            onReady: async ({ client }) => {
                await loadUsers(client);
            }
        });
    </script>
</body>
</html>
