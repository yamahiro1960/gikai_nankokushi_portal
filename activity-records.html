<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動記録 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        .activity-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 6.5rem;
            padding: 0.2rem 0.65rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            line-height: 1.4;
            white-space: nowrap;
        }

        .activity-status-empty {
            background: #f3f4f6;
            color: #6b7280;
            border: 1px dashed #d1d5db;
        }

        .activity-status-recorded {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .activity-status-pending {
            background: #fef3c7;
            color: #b45309;
        }

        .activity-status-progress {
            background: #d1fae5;
            color: #047857;
        }

        .activity-status-hold {
            background: #fee2e2;
            color: #b91c1c;
        }

        .activity-status-done {
            background: #e0e7ff;
            color: #4338ca;
        }

        .activity-content-preview {
            padding: 0;
            min-height: 0;
            line-height: 1.6;
            max-height: calc(1.6em * 6);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .activity-content-preview p,
        .activity-content-preview ol,
        .activity-content-preview ul,
        .activity-content-preview blockquote,
        .activity-content-preview pre,
        .activity-content-preview h1,
        .activity-content-preview h2,
        .activity-content-preview h3,
        .activity-content-preview h4,
        .activity-content-preview h5,
        .activity-content-preview h6 {
            margin: 0 0 0.3em;
        }

        .activity-content-preview > *:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
            </a>
            <div class="text-right">
                <span class="text-sm">活動記録</span>
                <div id="authArea"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4 space-y-6">
        <div class="mb-2">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルに戻る
            </a>
        </div>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-emerald-500">
            <h1 class="text-2xl font-bold mb-2 text-gray-700">活動記録</h1>
            <p class="text-sm text-gray-600">活動記録一覧（最新10件）を確認できます。</p>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-sky-500">
            <h2 class="text-xl font-bold mb-4 text-gray-700">活動記録一覧（最新10件）</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="text-left p-2 border">活動日</th>
                            <th class="text-left p-2 border">状況区分</th>
                            <th class="text-left p-2 border">活動タイトル</th>
                            <th class="text-left p-2 border">作成者</th>
                            <th class="text-left p-2 border">活動内容</th>
                            <th class="text-left p-2 border">添付資料</th>
                            <th class="text-left p-2 border w-40">操作</th>
                        </tr>
                    </thead>
                    <tbody id="activity-list">
                        <tr>
                            <td class="p-2 border text-gray-500" colspan="6">読み込み中です...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-3 flex items-center gap-2">
                <button id="activity-page-latest" type="button" class="bg-sky-500 hover:bg-sky-600 text-white px-3 py-1 rounded text-xs font-semibold">最新10件</button>
                <button id="activity-page-next10" type="button" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-xs font-semibold">11件目から表示</button>
                <span id="activity-page-status" class="text-xs text-gray-500"></span>
            </div>
            <p id="activity-message" class="mt-3 text-sm text-gray-600"></p>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-amber-500">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                <h2 class="text-xl font-bold text-gray-700">活動の記録</h2>
                <button id="open-activity-form" type="button" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">活動の記録</button>
            </div>

            <form id="activity-form" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                <div>
                    <label class="text-sm font-semibold text-gray-700">活動日</label>
                    <input id="record_date" type="date" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">活動タイトル</label>
                    <input id="record_title" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="例: 総務委員会の現地確認">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">状況区分</label>
                    <select id="record_status" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">未設定</option>
                        <option value="記録済">記録済</option>
                        <option value="未実施">未実施</option>
                        <option value="継続中">継続中</option>
                        <option value="保留中">保留中</option>
                        <option value="完了">完了</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">活動内容</label>
                    <div id="record_content" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white" style="min-height: 150px; font-size: 14px;"></div>
                </div>
                <div class="md:col-span-2 flex gap-3">
                    <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-lg text-sm font-semibold">保存</button>
                    <button id="cancel-activity-form" type="button" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-lg text-sm font-semibold">閉じる</button>
                </div>
            </form>
            <p id="record-message" class="mt-3 text-sm text-gray-600"></p>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <div id="attachment-preview-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-0">
        <div class="bg-white w-screen h-screen overflow-hidden flex flex-col">
            <div class="flex items-center justify-between px-4 py-3 border-b">
                <h3 class="text-base font-bold text-gray-800">添付資料プレビュー</h3>
                <button id="close-attachment-preview" type="button" class="text-gray-600 hover:text-gray-900 text-sm font-semibold">閉じる</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-0 flex-1 min-h-0">
                <div class="border-r overflow-y-auto">
                    <ul id="attachment-preview-list" class="divide-y"></ul>
                </div>
                <div class="md:col-span-3 min-h-0 flex flex-col">
                    <div id="pdf-preview-toolbar" class="hidden items-center gap-2 px-3 py-2 border-b bg-gray-50 text-xs">
                        <button id="pdf-prev-page" type="button" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-2 py-1 rounded font-semibold">前へ</button>
                        <span id="pdf-page-indicator" class="text-gray-700">- / -</span>
                        <button id="pdf-next-page" type="button" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-2 py-1 rounded font-semibold">次へ</button>
                        <a id="pdf-open-new-tab" href="#" target="_blank" rel="noopener noreferrer" class="ml-auto text-sky-700 hover:text-sky-900 font-semibold">別タブで開く</a>
                    </div>
                    <div id="pdf-preview-canvas-wrap" class="hidden flex-1 overflow-auto bg-gray-100">
                        <canvas id="pdf-preview-canvas" class="block mx-auto my-2 bg-white shadow"></canvas>
                    </div>
                    <iframe id="attachment-preview-frame" title="添付資料プレビュー" class="w-full h-full"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;
        let quillEditor = null;
        let currentUserId = null;
        let currentUserEmail = "";
        let currentUserName = "";
        let editingRecordId = null;
        let activityPageIndex = 0;
        let pdfDoc = null;
        let pdfPageNumber = 1;
        let pdfPageCount = 0;
        let pdfRenderInProgress = false;
        let pdfPendingPage = null;
        let pdfCurrentUrl = "";
        const ACTIVITY_STATUS_META = {
            "": { label: "未設定", className: "activity-status-empty" },
            "記録済": { label: "記録済", className: "activity-status-recorded" },
            "未実施": { label: "未実施", className: "activity-status-pending" },
            "継続中": { label: "継続中", className: "activity-status-progress" },
            "保留中": { label: "保留中", className: "activity-status-hold" },
            "完了": { label: "完了", className: "activity-status-done" }
        };

        if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }

        function initQuillEditor() {
            if (quillEditor) return;
            const container = document.getElementById("record_content");
            if (!container) return;

            quillEditor = new Quill(container, {
                theme: "snow",
                placeholder: "活動内容を入力",
                modules: {
                    history: {
                        delay: 1000,
                        maxStack: 100,
                        userOnly: true
                    },
                    toolbar: [
                        ["bold", "italic", "underline", "strike"],
                        ["blockquote"],
                        [{ "header": 1 }, { "header": 2 }],
                        [{ "list": "ordered"}, { "list": "bullet" }],
                        [{ "script": "sub"}, { "script": "super" }],
                        [{ "indent": "-1"}, { "indent": "+1" }],
                        [{ "direction": "rtl" }],
                        [{ "size": ["small", false, "large", "huge"] }],
                        [{ "header": [1, 2, 3, 4, 5, 6, false] }],
                        [{ "color": [] }, { "background": [] }],
                        [{ "font": [] }],
                        [{ "align": [] }],
                        ["clean"]
                    ]
                }
            });

            const toolbar = document.querySelector(".ql-toolbar");
            if (toolbar) {
                toolbar.id = "record-content-toolbar";
                toolbar.className = "ql-toolbar ql-snow mb-2 bg-gray-100 rounded-t-lg border border-b-0 border-gray-300 p-2 flex gap-1 flex-wrap text-sm";

                const runHistoryAction = (action) => {
                    const scrollX = window.scrollX;
                    const scrollY = window.scrollY;
                    action();
                    requestAnimationFrame(() => {
                        window.scrollTo(scrollX, scrollY);
                    });
                };

                const historyGroup = document.createElement("span");
                historyGroup.className = "ql-formats";

                const undoButton = document.createElement("button");
                undoButton.type = "button";
                undoButton.setAttribute("aria-label", "元に戻す");
                undoButton.title = "元に戻す (Ctrl+Z)";
                undoButton.innerHTML = "↶";
                undoButton.addEventListener("mousedown", (event) => {
                    event.preventDefault();
                });
                undoButton.addEventListener("click", () => {
                    runHistoryAction(() => {
                        quillEditor.history.undo();
                    });
                });

                const redoButton = document.createElement("button");
                redoButton.type = "button";
                redoButton.setAttribute("aria-label", "やり直す");
                redoButton.title = "やり直す (Ctrl+Y)";
                redoButton.innerHTML = "↷";
                redoButton.addEventListener("mousedown", (event) => {
                    event.preventDefault();
                });
                redoButton.addEventListener("click", () => {
                    runHistoryAction(() => {
                        quillEditor.history.redo();
                    });
                });

                historyGroup.appendChild(undoButton);
                historyGroup.appendChild(redoButton);
                toolbar.insertBefore(historyGroup, toolbar.firstChild);
            }

            const editor = document.querySelector(".ql-container");
            if (editor) {
                editor.className = "ql-container ql-snow w-full border border-gray-300 rounded-b-lg text-sm bg-white";
                editor.style.height = "auto";
                editor.style.fontSize = "14px";
            }

            const editorRoot = document.querySelector(".ql-editor");
            if (editorRoot) {
                editorRoot.classList.add("px-3", "py-2");
                editorRoot.style.minHeight = "150px";
                editorRoot.style.fontSize = "14px";
                editorRoot.style.lineHeight = "1.6";
                editorRoot.style.overflowY = "visible";
            }
        }
        
        if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }
        function isPdfUrl(url) {
            const value = String(url || "").toLowerCase().split("?")[0].split("#")[0];
            return value.endsWith(".pdf");
        }

        function setPdfToolbarState() {
            const indicator = document.getElementById("pdf-page-indicator");
            const prevButton = document.getElementById("pdf-prev-page");
            const nextButton = document.getElementById("pdf-next-page");

            indicator.textContent = `${pdfPageNumber} / ${pdfPageCount}`;
            prevButton.disabled = pdfPageNumber <= 1 || pdfRenderInProgress;
            nextButton.disabled = pdfPageNumber >= pdfPageCount || pdfRenderInProgress;
            prevButton.className = prevButton.disabled
                ? "bg-gray-100 text-gray-400 px-2 py-1 rounded font-semibold cursor-not-allowed"
                : "bg-gray-200 hover:bg-gray-300 text-gray-800 px-2 py-1 rounded font-semibold";
            nextButton.className = nextButton.disabled
                ? "bg-gray-100 text-gray-400 px-2 py-1 rounded font-semibold cursor-not-allowed"
                : "bg-gray-200 hover:bg-gray-300 text-gray-800 px-2 py-1 rounded font-semibold";
        }

        async function renderPdfPage(pageNumber) {
            if (!pdfDoc) return;
            if (pdfRenderInProgress) {
                pdfPendingPage = pageNumber;
                return;
            }

            pdfRenderInProgress = true;
            setPdfToolbarState();

            try {
                const page = await pdfDoc.getPage(pageNumber);
                const canvas = document.getElementById("pdf-preview-canvas");
                const ctx = canvas.getContext("2d");
                const container = document.getElementById("pdf-preview-canvas-wrap");
                const deviceRatio = window.devicePixelRatio || 1;
                const baseViewport = page.getViewport({ scale: 1 });
                const targetWidth = Math.max(320, (container.clientWidth || 800) - 24);
                const scale = targetWidth / baseViewport.width;
                const viewport = page.getViewport({ scale });

                canvas.width = Math.floor(viewport.width * deviceRatio);
                canvas.height = Math.floor(viewport.height * deviceRatio);
                canvas.style.width = `${Math.floor(viewport.width)}px`;
                canvas.style.height = `${Math.floor(viewport.height)}px`;
                ctx.setTransform(deviceRatio, 0, 0, deviceRatio, 0, 0);

                await page.render({ canvasContext: ctx, viewport }).promise;

                pdfPageNumber = pageNumber;
                setPdfToolbarState();
                container.scrollTop = 0;
                container.scrollLeft = 0;
            } catch (error) {
                const indicator = document.getElementById("pdf-page-indicator");
                indicator.textContent = "PDFの表示に失敗しました";
            } finally {
                pdfRenderInProgress = false;
                if (pdfPendingPage && pdfPendingPage !== pdfPageNumber) {
                    const nextPage = pdfPendingPage;
                    pdfPendingPage = null;
                    await renderPdfPage(nextPage);
                } else {
                    pdfPendingPage = null;
                    setPdfToolbarState();
                }
            }
        }

        async function showAttachmentUrl(url) {
            const iframe = document.getElementById("attachment-preview-frame");
            const pdfToolbar = document.getElementById("pdf-preview-toolbar");
            const pdfCanvasWrap = document.getElementById("pdf-preview-canvas-wrap");
            const pdfOpenNewTab = document.getElementById("pdf-open-new-tab");

            pdfOpenNewTab.href = url || "#";
            pdfCurrentUrl = url || "";

            if (isPdfUrl(url) && window.pdfjsLib) {
                iframe.classList.add("hidden");
                iframe.src = "about:blank";
                pdfToolbar.classList.remove("hidden");
                pdfToolbar.classList.add("flex");
                pdfCanvasWrap.classList.remove("hidden");

                try {
                    const loadingTask = window.pdfjsLib.getDocument({ url, withCredentials: false });
                    pdfDoc = await loadingTask.promise;
                    pdfPageCount = pdfDoc.numPages || 1;
                    pdfPageNumber = 1;
                    await renderPdfPage(1);
                } catch (error) {
                    const indicator = document.getElementById("pdf-page-indicator");
                    indicator.textContent = "PDFの表示に失敗しました";
                }
                return;
            }

            pdfDoc = null;
            pdfPageNumber = 1;
            pdfPageCount = 0;
            pdfPendingPage = null;
            pdfRenderInProgress = false;
            pdfToolbar.classList.add("hidden");
            pdfToolbar.classList.remove("flex");
            pdfCanvasWrap.classList.add("hidden");
            iframe.classList.remove("hidden");
            iframe.src = url || "about:blank";
        }

        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        function formatDate(value) {
            if (!value) return "";
            const parts = String(value).split("-");
            if (parts.length !== 3) return String(value);
            return `${parts[0]}/${parts[1]}/${parts[2]}`;
        }

        function getActivityStatusMeta(status) {
            const normalized = String(status || "").trim();
            return ACTIVITY_STATUS_META[normalized] || ACTIVITY_STATUS_META[""];
        }

        function setActivityFormMode(isEdit) {
            const openButton = document.getElementById("open-activity-form");
            const submitButton = document.querySelector("#activity-form button[type='submit']");
            if (isEdit) {
                openButton.textContent = "活動の記録（新規）";
                submitButton.textContent = "更新";
            } else {
                openButton.textContent = "活動の記録";
                submitButton.textContent = "保存";
            }
        }

        function setActivityPageButtons() {
            const latestButton = document.getElementById("activity-page-latest");
            const next10Button = document.getElementById("activity-page-next10");

            if (activityPageIndex === 0) {
                latestButton.className = "bg-sky-500 hover:bg-sky-600 text-white px-3 py-1 rounded text-xs font-semibold";
                next10Button.className = "bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-xs font-semibold";
            } else {
                latestButton.className = "bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded text-xs font-semibold";
                next10Button.className = "bg-sky-500 hover:bg-sky-600 text-white px-3 py-1 rounded text-xs font-semibold";
            }
        }

        function openAttachmentPreviewModal(attachments) {
            const modal = document.getElementById("attachment-preview-modal");
            const list = document.getElementById("attachment-preview-list");
            const frame = document.getElementById("attachment-preview-frame");
            list.innerHTML = "";

            const normalized = Array.isArray(attachments) ? attachments.filter((item) => item && item.url) : [];
            if (normalized.length === 0) {
                const li = document.createElement("li");
                li.className = "p-3 text-sm text-gray-500";
                li.textContent = "添付資料はありません。";
                list.appendChild(li);
                showAttachmentUrl("about:blank");
            } else {
                normalized.forEach((item, index) => {
                    const li = document.createElement("li");
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = "w-full text-left p-3 text-sm hover:bg-sky-50";
                    button.textContent = item.name || `添付ファイル ${index + 1}`;
                    button.addEventListener("click", () => {
                        showAttachmentUrl(item.url);
                    });
                    li.appendChild(button);
                    list.appendChild(li);
                });
                showAttachmentUrl(normalized[0].url);
            }

            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function closeAttachmentPreviewModal() {
            const modal = document.getElementById("attachment-preview-modal");
            const frame = document.getElementById("attachment-preview-frame");
            pdfDoc = null;
            pdfPageNumber = 1;
            pdfPageCount = 0;
            pdfPendingPage = null;
            pdfRenderInProgress = false;
            pdfCurrentUrl = "";
            frame.src = "about:blank";
            modal.classList.add("hidden");
            modal.classList.remove("flex");
            document.getElementById("pdf-preview-toolbar").classList.add("hidden");
            document.getElementById("pdf-preview-toolbar").classList.remove("flex");
            document.getElementById("pdf-preview-canvas-wrap").classList.add("hidden");
            frame.classList.remove("hidden");
        }

        function resetActivityFormState() {
            editingRecordId = null;
            document.getElementById("activity-form").reset();
            if (quillEditor) {
                quillEditor.root.innerHTML = "";
            }
            setActivityFormMode(false);
        }

        async function createOwnRecordFromFeedItem(item) {
            const message = document.getElementById("record-message");
            const payload = {
                user_email: currentUserEmail,
                user_name: currentUserName || "未設定",
                activity_date: item.activity_date,
                activity_title: item.raw_title || item.activity_title || "",
                activity_status: null,
                activity_content: item.activity_content || ""
            };

            const { error } = await dbClient
                .from("activity_records")
                .insert(payload);

            if (error) {
                message.textContent = "自分の活動記録への作成に失敗しました: " + error.message;
                return;
            }

            message.textContent = "活動記録を作成しました。必要に応じて修正してください。";
            await loadActivityRecords();
        }

        function openEditForm(item) {
            editingRecordId = item.id;
            document.getElementById("record_date").value = item.activity_date || "";
            document.getElementById("record_title").value = item.raw_title || item.activity_title || "";
            document.getElementById("record_status").value = item.activity_status || "";
            if (quillEditor) {
                quillEditor.root.innerHTML = item.activity_content || "";
            }
            document.getElementById("record-message").textContent = "修正モードです。更新を押すと保存します。";
            setActivityFormMode(true);
            document.getElementById("activity-form").classList.remove("hidden");
        }

        async function loadActivityRecords() {
            const tbody = document.getElementById("activity-list");
            const message = document.getElementById("activity-message");
            tbody.innerHTML = "";
            message.textContent = "";

            const { data: ownRecords, error: ownError } = await dbClient
                .from("activity_records")
                .select("id,user_name,activity_date,activity_title,activity_status,activity_content,created_at")
                .order("activity_date", { ascending: false })
                .order("created_at", { ascending: false })
                .limit(20);

            if (ownError) {
                message.textContent = "活動記録の読込に失敗しました: " + ownError.message;
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="7">データを表示できませんでした。</td></tr>';
                return;
            }

            const { data: visibleCommitteePosts, error: postError } = await dbClient
                .from("committee_activity_posts")
                .select("id,activity_date,title,activity_content,committee_name,created_by_name,created_by_email,attachments,created_at")
                .order("activity_date", { ascending: false })
                .order("created_at", { ascending: false })
                .limit(200);

            if (postError) {
                message.textContent = "活動記録の一部読込に失敗しました: " + postError.message;
            }

            const visiblePostIds = Array.from(new Set((visibleCommitteePosts || []).map((row) => row.id).filter(Boolean)));

            let recipientRows = [];
            if (visiblePostIds.length > 0) {
                const { data: recipientData, error: recipientError } = await dbClient
                    .from("committee_activity_recipients")
                    .select("post_id,recipient_email")
                    .in("post_id", visiblePostIds);

                if (recipientError) {
                    message.textContent = "活動記録の一部読込に失敗しました: " + recipientError.message;
                } else {
                    recipientRows = recipientData || [];
                }
            }

            const recipientPostIdSet = new Set(
                recipientRows
                    .filter((row) => normalizeEmail(row.recipient_email) === currentUserEmail)
                    .map((row) => row.post_id)
                    .filter(Boolean)
            );

            const relatedCommitteePosts = (visibleCommitteePosts || []).filter((item) => {
                const isCreator = normalizeEmail(item.created_by_email) === currentUserEmail;
                const isRecipient = recipientPostIdSet.has(item.id);
                return isCreator || isRecipient;
            });

            const mergedRows = [];
            (ownRecords || []).forEach((item) => {
                mergedRows.push({
                    id: item.id,
                    activity_date: item.activity_date,
                    activity_title: item.activity_title || "",
                    raw_title: item.activity_title || "",
                    activity_status: item.activity_status || "",
                    activity_content: item.activity_content || "",
                    creator_name: item.user_name || currentUserName || "自分",
                    attachments: [],
                    created_at: item.created_at || null,
                    source: "activity"
                });
            });

            (relatedCommitteePosts || []).forEach((item) => {
                mergedRows.push({
                    id: item.id,
                    activity_date: item.activity_date,
                    activity_title: `[委員会活動] ${item.title || ""}`,
                    raw_title: item.title || "",
                    activity_status: "",
                    activity_content: item.activity_content || "",
                    creator_name: item.created_by_name || item.created_by_email || "不明",
                    attachments: Array.isArray(item.attachments) ? item.attachments : [],
                    created_at: item.created_at || null,
                    source: "committee"
                });
            });

            const sortedRows = mergedRows
                .sort((a, b) => {
                    const dateA = Date.parse(`${a.activity_date || "1970-01-01"}T00:00:00`);
                    const dateB = Date.parse(`${b.activity_date || "1970-01-01"}T00:00:00`);
                    if (dateA !== dateB) {
                        return dateB - dateA;
                    }
                    const createdA = a.created_at ? Date.parse(a.created_at) : 0;
                    const createdB = b.created_at ? Date.parse(b.created_at) : 0;
                    return createdB - createdA;
                });

            const pageSize = 10;
            const offset = activityPageIndex * pageSize;
            const rows = sortedRows.slice(offset, offset + pageSize);
            const startNo = sortedRows.length === 0 ? 0 : offset + 1;
            const endNo = offset + rows.length;
            document.getElementById("activity-page-status").textContent = sortedRows.length === 0
                ? "0件"
                : `${startNo}件目〜${endNo}件目 / 全${sortedRows.length}件`;

            setActivityPageButtons();

            if (rows.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="7">記録はありません。</td></tr>';
                return;
            }

            rows.forEach((item) => {
                const tr = document.createElement("tr");

                const dateTd = document.createElement("td");
                dateTd.className = "p-2 border";
                dateTd.textContent = formatDate(item.activity_date);

                const statusTd = document.createElement("td");
                statusTd.className = "p-2 border";
                const statusMeta = getActivityStatusMeta(item.activity_status);
                const statusBadge = document.createElement("span");
                statusBadge.className = `activity-status-badge ${statusMeta.className}`;
                statusBadge.textContent = statusMeta.label;
                statusTd.appendChild(statusBadge);

                const titleTd = document.createElement("td");
                titleTd.className = "p-2 border";
                titleTd.textContent = item.activity_title || "";

                const creatorTd = document.createElement("td");
                creatorTd.className = "p-2 border";
                creatorTd.textContent = item.creator_name || "";

                const contentTd = document.createElement("td");
                contentTd.className = "p-2 border";
                const contentPreview = document.createElement("div");
                contentPreview.className = "activity-content-preview ql-editor";
                contentPreview.innerHTML = item.activity_content || "";
                contentTd.appendChild(contentPreview);

                const attachmentTd = document.createElement("td");
                attachmentTd.className = "p-2 border";
                if (item.attachments && item.attachments.length > 0) {
                    const previewButton = document.createElement("button");
                    previewButton.type = "button";
                    previewButton.className = "bg-violet-500 hover:bg-violet-600 text-white px-3 py-1 rounded text-xs font-semibold";
                    previewButton.textContent = `プレビュー (${item.attachments.length})`;
                    previewButton.addEventListener("click", () => openAttachmentPreviewModal(item.attachments));
                    attachmentTd.appendChild(previewButton);
                } else {
                    attachmentTd.textContent = "-";
                    attachmentTd.classList.add("text-gray-500");
                }

                const actionTd = document.createElement("td");
                actionTd.className = "p-2 border";
                if (item.source === "activity") {
                    const editButton = document.createElement("button");
                    editButton.type = "button";
                    editButton.className = "bg-sky-500 hover:bg-sky-600 text-white px-3 py-1 rounded text-xs font-semibold";
                    editButton.textContent = "修正";
                    editButton.addEventListener("click", () => openEditForm(item));
                    actionTd.appendChild(editButton);
                } else {
                    const createButton = document.createElement("button");
                    createButton.type = "button";
                    createButton.className = "bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded text-xs font-semibold";
                    createButton.textContent = "自分の記録を作成";
                    createButton.addEventListener("click", () => createOwnRecordFromFeedItem(item));
                    actionTd.appendChild(createButton);
                }

                tr.appendChild(dateTd);
                tr.appendChild(statusTd);
                tr.appendChild(titleTd);
                tr.appendChild(creatorTd);
                tr.appendChild(contentTd);
                tr.appendChild(attachmentTd);
                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

        async function saveActivityRecord(event) {
            event.preventDefault();

            const activityContent = quillEditor ? quillEditor.root.innerHTML.trim() : "";

            const payload = {
                user_email: currentUserEmail,
                user_name: currentUserName || "未設定",
                activity_date: document.getElementById("record_date").value,
                activity_title: document.getElementById("record_title").value.trim(),
                activity_status: document.getElementById("record_status").value || null,
                activity_content: activityContent
            };

            const message = document.getElementById("record-message");
            if (!payload.activity_date || !payload.activity_title || !payload.activity_content) {
                message.textContent = "活動日、活動タイトル、活動内容を入力してください。";
                return;
            }

            let error = null;
            if (editingRecordId) {
                const result = await dbClient
                    .from("activity_records")
                    .update(payload)
                    .eq("id", editingRecordId);
                error = result.error;
            } else {
                const result = await dbClient
                    .from("activity_records")
                    .insert(payload);
                error = result.error;
            }

            if (error) {
                message.textContent = "保存に失敗しました: " + error.message;
                return;
            }

            message.textContent = editingRecordId ? "活動記録を更新しました。" : "活動記録を保存しました。";
            resetActivityFormState();
            document.getElementById("activity-form").classList.add("hidden");
            await loadActivityRecords();
        }

        document.getElementById("open-activity-form").addEventListener("click", () => {
            initQuillEditor();
            document.getElementById("activity-form").classList.remove("hidden");
            document.getElementById("record-message").textContent = "";
        });

        document.getElementById("cancel-activity-form").addEventListener("click", () => {
            resetActivityFormState();
            document.getElementById("activity-form").classList.add("hidden");
        });

        document.getElementById("activity-form").addEventListener("submit", saveActivityRecord);
        document.getElementById("activity-page-latest").addEventListener("click", async () => {
            activityPageIndex = 0;
            await loadActivityRecords();
        });
        document.getElementById("activity-page-next10").addEventListener("click", async () => {
            activityPageIndex = 1;
            await loadActivityRecords();
        });
        document.getElementById("close-attachment-preview").addEventListener("click", closeAttachmentPreviewModal);
        document.getElementById("pdf-prev-page").addEventListener("click", async () => {
            if (!pdfDoc || pdfPageNumber <= 1) return;
            await renderPdfPage(pdfPageNumber - 1);
        });
        document.getElementById("pdf-next-page").addEventListener("click", async () => {
            if (!pdfDoc || pdfPageNumber >= pdfPageCount) return;
            await renderPdfPage(pdfPageNumber + 1);
        });
        window.addEventListener("resize", async () => {
            if (pdfDoc && pdfCurrentUrl && isPdfUrl(pdfCurrentUrl)) {
                await renderPdfPage(pdfPageNumber);
            }
        });
        document.getElementById("attachment-preview-modal").addEventListener("click", (event) => {
            if (event.target && event.target.id === "attachment-preview-modal") {
                closeAttachmentPreviewModal();
            }
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            hideDisplayName: true,
            returnTo: "activity-records.html",
            onReady: async ({ client, session, profile }) => {
                dbClient = client;
                const sessionUser = session && session.user ? session.user : null;
                currentUserId = sessionUser && sessionUser.id ? sessionUser.id : null;
                currentUserEmail = normalizeEmail((sessionUser && sessionUser.email) || (session && session.email) || (profile && profile.email) || "");
                currentUserName = (session && session.displayName) || (profile && profile.display_name) || currentUserEmail || "未設定";

                initQuillEditor();
                await loadActivityRecords();
            }
        });
    </script>
</body>
</html>
