<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議案メモ管理 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                    <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
                </a>
            </div>
            <span class="text-sm">議案メモ管理</span>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4 max-w-3xl">
        <div class="mb-6">
            <a href="archive.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>アーカイブに戻る
            </a>
        </div>

        <section class="rounded-2xl p-6 bg-gradient-to-r from-yellow-400 to-amber-500 text-white shadow-lg mb-8">
            <h1 class="text-2xl font-bold mb-1"><i class="fas fa-sticky-note mr-2"></i>議案メモ管理</h1>
            <p class="text-yellow-50 text-sm">自分だけが見えるメモを検索・確認できます。</p>
        </section>

        <!-- 検索・フィルター -->
        <section class="bg-white p-5 rounded-xl shadow-sm mb-6">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input id="search-input" type="text" placeholder="メモ内容・資料名で検索..."
                        class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-300">
                </div>
                <select id="session-filter"
                    class="border border-gray-200 rounded-lg text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-300 bg-white">
                    <option value="">すべての回次</option>
                </select>
            </div>
            <p id="result-count" class="mt-3 text-xs text-gray-400"></p>
        </section>

        <!-- メモ一覧 -->
        <section id="notes-container">
            <p class="text-center text-gray-400 py-10">読み込み中...</p>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center px-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6">
            <h3 class="text-base font-bold text-gray-500 mb-0.5" id="modal-session"></h3>
            <p class="text-lg font-bold mb-3" id="modal-doc"></p>
            <textarea id="modal-textarea"
                class="w-full border border-gray-200 rounded-lg p-3 text-sm h-44 resize-y focus:outline-none focus:ring-2 focus:ring-yellow-300"></textarea>
            <div class="flex justify-between items-center mt-4">
                <button id="modal-delete-btn" type="button"
                    class="text-sm text-red-500 hover:text-red-700 font-semibold">
                    <i class="fas fa-trash mr-1"></i>削除
                </button>
                <div class="flex gap-3">
                    <button id="modal-cancel-btn" type="button"
                        class="px-4 py-2 text-sm rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition">
                        キャンセル
                    </button>
                    <button id="modal-save-btn" type="button"
                        class="px-4 py-2 text-sm rounded-lg bg-yellow-500 hover:bg-yellow-600 text-white font-semibold transition">
                        <i class="fas fa-save mr-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let allNotes = [];
        let editingNoteId = null;
        let supabaseClient = null;
        let memberId = null;

        function getClient() {
            if (supabaseClient) return supabaseClient;
            supabaseClient = window.portalAuth && typeof window.portalAuth.ensureClient === "function"
                ? window.portalAuth.ensureClient()
                : window.supabase.createClient(window.AUTH_CONFIG.supabaseUrl, window.AUTH_CONFIG.supabaseAnonKey);
            return supabaseClient;
        }

        function formatDate(isoStr) {
            return new Date(isoStr).toLocaleString("ja-JP", {
                year: "numeric", month: "numeric", day: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
        }

        function escapeHtml(str) {
            return (str || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function renderNotes(notes) {
            const container = document.getElementById("notes-container");
            const countEl = document.getElementById("result-count");
            countEl.textContent = `${notes.length} 件`;

            if (notes.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-10">該当するメモがありません。</p>`;
                return;
            }

            container.innerHTML = notes.map(note => `
                <div class="bg-white rounded-xl shadow-sm p-5 mb-3 hover:shadow-md transition cursor-pointer border border-transparent hover:border-yellow-200"
                    onclick="openEditModal(${note.id})">
                    <div class="flex items-start justify-between gap-3 mb-2 flex-wrap">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full">
                                第${escapeHtml(note.session_id)}回議会
                            </span>
                            <span class="text-sm font-semibold text-gray-800">${escapeHtml(note.document_name.replace(/\.pdf$/i, ""))}</span>
                        </div>
                        <span class="text-xs text-gray-400 shrink-0">${formatDate(note.updated_at)}</span>
                    </div>
                    <p class="text-sm text-gray-600 whitespace-pre-wrap line-clamp-3">${escapeHtml(note.note_text)}</p>
                    <p class="text-xs text-indigo-400 mt-2"><i class="fas fa-pencil-alt mr-1"></i>クリックして編集</p>
                </div>
            `).join("");
        }

        function populateSessionFilter(notes) {
            const sessions = [...new Set(notes.map(n => n.session_id))].sort((a, b) => Number(b) - Number(a));
            const select = document.getElementById("session-filter");
            const current = select.value;
            // 既存オプション（すべての回次）以降を削除して再構築
            while (select.options.length > 1) select.remove(1);
            sessions.forEach(s => {
                const opt = document.createElement("option");
                opt.value = s;
                opt.textContent = `第${s}回議会`;
                select.appendChild(opt);
            });
            if (current) select.value = current;
        }

        function filterNotes() {
            const keyword = document.getElementById("search-input").value.trim().toLowerCase();
            const sessionVal = document.getElementById("session-filter").value;
            let filtered = allNotes;
            if (sessionVal) {
                filtered = filtered.filter(n => n.session_id === sessionVal);
            }
            if (keyword) {
                filtered = filtered.filter(n =>
                    n.note_text.toLowerCase().includes(keyword) ||
                    n.document_name.toLowerCase().includes(keyword)
                );
            }
            renderNotes(filtered);
        }

        async function loadAllNotes() {
            const container = document.getElementById("notes-container");
            try {
                const supabase = getClient();
                const { data, error } = await supabase
                    .from("document_notes")
                    .select("id, session_id, document_name, note_text, updated_at")
                    .eq("member_id", memberId)
                    .neq("note_text", "")
                    .order("updated_at", { ascending: false });

                if (error) throw error;

                allNotes = data || [];
                populateSessionFilter(allNotes);
                renderNotes(allNotes);
            } catch (e) {
                container.innerHTML = `<p class="text-center text-red-400 py-10">読み込みエラーが発生しました。</p>`;
                console.error(e);
            }
        }

        function openEditModal(noteId) {
            const note = allNotes.find(n => n.id === noteId);
            if (!note) return;
            editingNoteId = noteId;
            document.getElementById("modal-session").textContent = `第${note.session_id}回議会`;
            document.getElementById("modal-doc").textContent = note.document_name.replace(/\.pdf$/i, "");
            document.getElementById("modal-textarea").value = note.note_text;
            document.getElementById("edit-modal").classList.remove("hidden");
        }

        function closeEditModal() {
            document.getElementById("edit-modal").classList.add("hidden");
            editingNoteId = null;
        }

        async function saveEditModal() {
            if (!editingNoteId) return;
            const note = allNotes.find(n => n.id === editingNoteId);
            if (!note) return;
            const saveBtn = document.getElementById("modal-save-btn");
            saveBtn.disabled = true;
            try {
                const supabase = getClient();
                const now = new Date().toISOString();
                const { error } = await supabase
                    .from("document_notes")
                    .update({ note_text: document.getElementById("modal-textarea").value, updated_at: now })
                    .eq("id", editingNoteId)
                    .eq("member_id", memberId);

                if (error) throw error;

                note.note_text = document.getElementById("modal-textarea").value;
                note.updated_at = now;
                closeEditModal();
                filterNotes();
            } catch (e) {
                alert("保存に失敗しました。");
                console.error(e);
            } finally {
                saveBtn.disabled = false;
            }
        }

        async function deleteNote() {
            if (!editingNoteId) return;
            if (!confirm("このメモを削除しますか？元に戻せません。")) return;
            try {
                const supabase = getClient();
                const { error } = await supabase
                    .from("document_notes")
                    .delete()
                    .eq("id", editingNoteId)
                    .eq("member_id", memberId);

                if (error) throw error;

                allNotes = allNotes.filter(n => n.id !== editingNoteId);
                closeEditModal();
                populateSessionFilter(allNotes);
                filterNotes();
            } catch (e) {
                alert("削除に失敗しました。");
                console.error(e);
            }
        }

        document.getElementById("search-input").addEventListener("input", filterNotes);
        document.getElementById("session-filter").addEventListener("change", filterNotes);
        document.getElementById("modal-cancel-btn").addEventListener("click", closeEditModal);
        document.getElementById("modal-save-btn").addEventListener("click", saveEditModal);
        document.getElementById("modal-delete-btn").addEventListener("click", deleteNote);
        document.getElementById("edit-modal").addEventListener("click", function(e) {
            if (e.target === this) closeEditModal();
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "document-notes.html",
            onReady: () => {
                const sess = window.portalAuth.getSession();
                memberId = sess && sess.memberId ? sess.memberId : null;
                if (!memberId) {
                    document.getElementById("notes-container").innerHTML =
                        `<p class="text-center text-gray-400 py-10">ログイン情報が取得できませんでした。</p>`;
                    return;
                }
                loadAllNotes();
            }
        });
    </script>
</body>
</html>
