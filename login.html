<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- ログインカード -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <!-- ロゴ/ヘッダー -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
                    <i class="fas fa-laptop-code text-indigo-700 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">南国市議会DXポータル</h1>
                <p class="text-sm text-gray-500 mt-2">議会DX推進プロジェクト</p>
            </div>

            <!-- ログインフォーム -->
            <form id="loginForm" class="space-y-5">
                <!-- メールアドレス入力 -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                        メールアドレス
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@nankoku.lg.jp"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                </div>

                <!-- エラーメッセージ -->
                <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-start gap-2">
                    <i class="fas fa-exclamation-circle mt-0.5 flex-shrink-0"></i>
                    <span id="errorText"></span>
                </div>

                <!-- 成功メッセージ -->
                <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm flex items-start gap-2">
                    <i class="fas fa-check-circle mt-0.5 flex-shrink-0"></i>
                    <span id="successText">ログインしました。リダイレクト中...</span>
                </div>

                <!-- ログインボタン -->
                <button
                    type="submit"
                    id="loginButton"
                    class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                    <i class="fas fa-sign-in-alt"></i>
                    <span>ログイン</span>
                </button>
            </form>

            <!-- 説明 -->
            <div class="mt-8 pt-6 border-t border-gray-100">
                <p class="text-xs text-gray-600 text-center">
                    <i class="fas fa-info-circle mr-1"></i>
                    メールアドレスを入力してログインしてください。<br>
                    パスワードは不要です。
                </p>
            </div>
        </div>

        <!-- フッター -->
        <div class="text-center mt-8">
            <p class="text-xs text-gray-500">
                &copy; 2026 南国市議会DX推進プロジェクト
            </p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 設定ファイル -->
    <script src="auth-config.js"></script>
    <!-- 認証ロジック -->
    <script src="auth.js"></script>

    <script>
        // ページロード時、既にセッションがあればリダイレクト
        window.addEventListener("DOMContentLoaded", () => {
            const session = window.portalAuth.getSession();
            if (session) {
                redirectToReturnPage();
            }
        });

        // リダイレクト先を取得
        function getReturnPage() {
            const params = new URLSearchParams(window.location.search);
            const returnTo = params.get("returnTo") || "index.html";
            return returnTo;
        }

        // リダイレクト処理
        function redirectToReturnPage() {
            const returnPage = getReturnPage();
            window.location.href = returnPage;
        }

        // エラーメッセージ表示
        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            const errorText = document.getElementById("errorText");
            errorText.textContent = message;
            errorDiv.classList.remove("hidden");
            document.getElementById("successMessage").classList.add("hidden");
        }

        // 成功メッセージ表示
        function showSuccess() {
            const successDiv = document.getElementById("successMessage");
            successDiv.classList.remove("hidden");
            document.getElementById("errorMessage").classList.add("hidden");
        }

        // フォーム送信処理
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const loginButton = document.getElementById("loginButton");
            const errorDiv = document.getElementById("errorMessage");

            // エラーメッセージをクリア
            errorDiv.classList.add("hidden");

            // ボタンをDisable
            loginButton.disabled = true;

            try {
                // メールアドレスでログイン
                await window.portalAuth.emailOnlyLogin(email);

                // 成功メッセージ表示
                showSuccess();

                // 2秒後にリダイレクト
                setTimeout(() => {
                    redirectToReturnPage();
                }, 2000);
            } catch (error) {
                // エラーメッセージ表示
                showError(error.message || "ログインに失敗しました。");
                loginButton.disabled = false;
            }
        });
    </script>

</body>
</html>
