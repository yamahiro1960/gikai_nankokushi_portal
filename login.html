<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- ログインカード -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <!-- ロゴ/ヘッダー -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-4">
                    <i class="fas fa-laptop-code text-indigo-700 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">南国市議会DXポータル</h1>
                <p class="text-sm text-gray-500 mt-2">議会DX推進プロジェクト</p>
            </div>

            <!-- ===== メインログイン: Google OAuth ===== -->
            <form id="googleLoginForm" class="space-y-5">
                <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 text-sm text-indigo-900">
                    Google アカウントでログインしてください。<br>
                    現職として登録された Gmail アドレスのみログインできます。<br>
                    認証は Supabase Auth で実施します。
                </div>

                <!-- エラーメッセージ（共通） -->
                <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-start gap-2">
                    <i class="fas fa-exclamation-circle mt-0.5 flex-shrink-0"></i>
                    <span id="errorText"></span>
                </div>

                <!-- 成功メッセージ（共通） -->
                <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm flex items-start gap-2">
                    <i class="fas fa-check-circle mt-0.5 flex-shrink-0"></i>
                    <span id="successText">ログインしました。リダイレクト中...</span>
                </div>

                <!-- Google ログインボタン -->
                <button
                    type="submit"
                    id="googleLoginButton"
                    class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-semibold py-3 rounded-lg hover:shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                    <i class="fab fa-google"></i>
                    <span>Googleでログイン</span>
                </button>
            </form>

            <!-- ===== 代替ログインは廃止 ===== -->
            <div class="mt-6">
                <button
                    type="button"
                    id="toggleAltLogin"
                    class="w-full text-xs text-gray-400 flex items-center justify-center gap-1 cursor-not-allowed"
                    onclick="toggleAltLogin()"
                    disabled
                >
                    <i class="fas fa-lock" id="toggleIcon"></i>
                    代替ログインは廃止しました（Googleログインのみ）
                </button>

                <div id="altLoginArea" class="hidden mt-4 border border-gray-200 rounded-lg p-4 bg-gray-50 space-y-4">
                    <p class="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-2">
                        <i class="fas fa-info-circle mr-1"></i>
                        セキュリティ方針変更により、利用者選択ログインは使用できません。
                    </p>
                </div>
            </div>

            <!-- 説明 -->
            <div class="mt-6 pt-4 border-t border-gray-100">
                <p class="text-xs text-gray-500 text-center">
                    <i class="fas fa-info-circle mr-1"></i>
                    Googleログイン後、現職利用者かどうかを照合します。
                </p>
            </div>
        </div>

        <!-- フッター -->
        <div class="text-center mt-8">
            <p class="text-xs text-gray-500">
                &copy; 2026 南国市議会DX推進プロジェクト
            </p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 設定ファイル -->
    <script src="auth-config.js"></script>
    <!-- 認証ロジック -->
    <script src="auth.js"></script>

    <script>
        // ページロード時、既にセッションがあればリダイレクト
        window.addEventListener("DOMContentLoaded", async () => {
            try {
                const session = await window.portalAuth.restoreSessionFromAuth();
                if (session) {
                    redirectToReturnPage();
                    return;
                }
            } catch (error) {
                console.warn("セッション復元に失敗しました。", error);
            }
        });

        // リダイレクト先を取得
        function getReturnPage() {
            const params = new URLSearchParams(window.location.search);
            const returnTo = (params.get("returnTo") || "").trim();
            return returnTo || "index.html";
        }

        function redirectToReturnPage() {
            window.location.href = getReturnPage();
        }

        // 代替ログインは廃止済み
        function toggleAltLogin() {
            const area = document.getElementById("altLoginArea");
            area.classList.toggle("hidden");
        }

        // エラーメッセージ表示
        function showError(message) {
            const errorDiv = document.getElementById("errorMessage");
            document.getElementById("errorText").textContent = message;
            errorDiv.classList.remove("hidden");
            document.getElementById("successMessage").classList.add("hidden");
        }

        // 成功メッセージ表示
        function showSuccess() {
            document.getElementById("successMessage").classList.remove("hidden");
            document.getElementById("errorMessage").classList.add("hidden");
        }

        // Google ログイン
        document.getElementById("googleLoginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("googleLoginButton");
            document.getElementById("errorMessage").classList.add("hidden");
            btn.disabled = true;
            try {
                await window.portalAuth.googleLogin({ returnTo: getReturnPage() });
            } catch (error) {
                showError(error.message || "Googleログインに失敗しました。");
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
