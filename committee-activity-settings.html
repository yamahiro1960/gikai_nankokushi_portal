<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>委員会活動登録 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
            </a>
            <div class="text-right">
                <span class="text-sm">委員会活動登録</span>
                <div id="authArea"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4 space-y-6">
        <div class="mb-2">
            <a href="system-settings.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>システム設定に戻る
            </a>
        </div>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-emerald-500">
            <h1 class="text-2xl font-bold mb-2 text-gray-700">委員会活動の登録</h1>
            <p class="text-sm text-gray-600">委員会ごとの活動情報を登録します。登録時点の委員会所属メンバーに配布され、所属変更後も過去履歴を参照できます。</p>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-emerald-500">
            <h2 class="text-xl font-bold mb-4 text-gray-700">委員会活動の入力</h2>
            <form id="committee-activity-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-sm font-semibold text-gray-700">委員会</label>
                    <select id="committee_name" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">選択してください</option>
                        <option value="総務委員会">総務委員会</option>
                        <option value="産業建設委員会">産業建設委員会</option>
                        <option value="教育民生委員会">教育民生委員会</option>
                        <option value="議会運営委員会">議会運営委員会</option>
                        <option value="編集委員会">編集委員会</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">活動日</label>
                    <input id="activity_date" type="date" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">修正対象（任意）</label>
                    <div class="mt-1 flex flex-col md:flex-row gap-2">
                        <select id="existing_post_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                            <option value="">新規登録モード</option>
                        </select>
                        <button type="button" id="switch-new-mode" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap">新規に戻す</button>
                    </div>
                    <p id="edit-mode-label" class="text-xs text-gray-500 mt-1">新規登録モードです。</p>
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">タイトル</label>
                    <input id="activity_title" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="例: 産業建設委員会 現地調査報告">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">活動内容</label>
                    <textarea id="activity_content" rows="5" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="活動内容を入力"></textarea>
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">添付ファイル（複数可）</label>
                    <input id="activity_files" type="file" multiple class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                    <p class="text-xs text-gray-500 mt-1">選択したファイルは Storage の gian バケットへ保存し、活動情報に紐づけます。</p>
                </div>
                <div class="md:col-span-2 border border-gray-200 rounded-lg p-3 bg-gray-50">
                    <div class="flex items-center justify-between gap-3">
                        <label class="text-sm font-semibold text-gray-700">配布先（チェックした人に公開）</label>
                        <div class="flex gap-2">
                            <button type="button" id="check-all-recipients" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs font-semibold">全選択</button>
                            <button type="button" id="uncheck-all-recipients" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs font-semibold">全解除</button>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">委員会選択時に現在所属者を自動表示します。修正時は配布済み/未配布を表示します。</p>
                    <div id="recipient-list" class="mt-3 space-y-2 text-sm"></div>
                </div>
                <div class="md:col-span-2 flex gap-3">
                    <button id="submit-button" type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-sm font-semibold">登録</button>
                    <button type="button" id="clear-form" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-lg text-sm font-semibold">クリア</button>
                </div>
            </form>
            <p id="form-message" class="mt-3 text-sm text-gray-600"></p>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-indigo-500">
            <div class="flex items-center justify-between gap-3">
                <h2 class="text-xl font-bold text-gray-700">登録済み委員会活動一覧</h2>
                <button id="refresh-post-list" type="button" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded text-sm font-semibold">再読込</button>
            </div>
            <div class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2">
                <div>
                    <label class="text-xs font-semibold text-gray-600">委員会で検索</label>
                    <select id="list_filter_committee" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                        <option value="">すべて</option>
                        <option value="総務委員会">総務委員会</option>
                        <option value="産業建設委員会">産業建設委員会</option>
                        <option value="教育民生委員会">教育民生委員会</option>
                        <option value="議会運営委員会">議会運営委員会</option>
                        <option value="編集委員会">編集委員会</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-semibold text-gray-600">キーワード検索（タイトル・内容）</label>
                    <input id="list_filter_keyword" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="例: 視察, 研修, 報告">
                </div>
            </div>
            <p id="post-list-summary" class="text-sm text-gray-600 mt-2">読み込み中...</p>
            <div id="activity-post-list" class="mt-3 space-y-2"></div>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;
        let currentUserEmail = "";
        let currentUserName = "";
        let currentUserId = null;
        let currentRecipients = [];
        let existingRecipientMap = new Map();
        let currentMode = "new";
        let currentPostId = null;
        let currentPostAttachments = [];
        let currentPostList = [];

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        function normalizeCommitteeName(value) {
            const raw = String(value || "").trim();
            if (raw === "総務") return "総務委員会";
            if (raw === "産業建設") return "産業建設委員会";
            if (raw === "教育民生") return "教育民生委員会";
            return raw;
        }

        function formatDateLabel(value) {
            if (!value) return "日付未設定";
            return String(value);
        }

        function getPostSortTime(item) {
            const activityTime = item && item.activity_date
                ? Date.parse(`${item.activity_date}T00:00:00`)
                : Number.NaN;
            if (!Number.isNaN(activityTime)) {
                return activityTime;
            }
            const createdTime = item && item.created_at ? Date.parse(item.created_at) : Number.NaN;
            if (!Number.isNaN(createdTime)) {
                return createdTime;
            }
            return 0;
        }

        function extractAttachmentPaths(attachments) {
            if (!Array.isArray(attachments)) {
                return [];
            }

            const paths = [];
            attachments.forEach((item) => {
                if (!item) return;
                if (typeof item === "object") {
                    const path = String(item.path || "").trim();
                    if (path) {
                        paths.push(path);
                    }
                    return;
                }

                if (typeof item === "string") {
                    const value = item.trim();
                    if (value && !/^https?:\/\//i.test(value)) {
                        paths.push(value);
                    }
                }
            });

            return Array.from(new Set(paths));
        }

        function canDeletePost(item) {
            if (!item) return false;
            if (currentUserId && item.created_by_user_id && String(item.created_by_user_id) === String(currentUserId)) {
                return true;
            }
            return normalizeEmail(item.created_by_email) === normalizeEmail(currentUserEmail);
        }

        function getFilteredPostList() {
            const committeeFilter = document.getElementById("list_filter_committee").value;
            const keyword = String(document.getElementById("list_filter_keyword").value || "").trim().toLowerCase();

            return currentPostList
                .filter((item) => {
                    if (committeeFilter && item.committee_name !== committeeFilter) {
                        return false;
                    }
                    if (!keyword) {
                        return true;
                    }
                    const haystack = `${item.title || ""} ${item.activity_content || ""}`.toLowerCase();
                    return haystack.includes(keyword);
                })
                .sort((a, b) => {
                    const timeDiff = getPostSortTime(b) - getPostSortTime(a);
                    if (timeDiff !== 0) {
                        return timeDiff;
                    }
                    return (b.id || 0) - (a.id || 0);
                });
        }

        function renderPostList() {
            const container = document.getElementById("activity-post-list");
            const summary = document.getElementById("post-list-summary");
            const filteredPosts = getFilteredPostList();

            if (!filteredPosts.length) {
                summary.textContent = "表示できる登録済みデータはありません。";
                container.innerHTML = '<p class="text-sm text-gray-500">該当データなし</p>';
                return;
            }

            summary.textContent = `${filteredPosts.length}件表示 / 全${currentPostList.length}件`;
            container.innerHTML = filteredPosts.map((item) => {
                const isEditing = currentPostId && Number(currentPostId) === Number(item.id);
                const attachmentCount = Array.isArray(item.attachments) ? item.attachments.length : 0;
                const canDelete = canDeletePost(item);
                const editingBadge = isEditing
                    ? '<span class="text-[11px] px-2 py-0.5 rounded bg-amber-100 text-amber-700">編集中</span>'
                    : "";
                const deleteButton = canDelete
                    ? `<button type="button" class="delete-post-from-list bg-red-50 hover:bg-red-100 text-red-700 px-3 py-1 rounded text-xs font-semibold" data-post-id="${item.id}">削除</button>`
                    : "";
                return `
                    <div class="border border-gray-200 rounded-lg px-3 py-3 bg-white">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <p class="text-sm font-semibold text-gray-800 truncate">${escapeHtml(item.title || "タイトル未設定")}</p>
                                <p class="text-xs text-gray-600 mt-1">${escapeHtml(item.committee_name || "") } | ${escapeHtml(formatDateLabel(item.activity_date))}</p>
                                <p class="text-xs text-gray-500 mt-1">作成者: ${escapeHtml(item.created_by_name || "未設定")} / 添付: ${attachmentCount}件</p>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                ${editingBadge}
                                <button type="button" class="open-post-from-list bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs font-semibold" data-post-id="${item.id}">編集</button>
                                ${deleteButton}
                            </div>
                        </div>
                    </div>
                `;
            }).join("");

            container.querySelectorAll(".open-post-from-list").forEach((button) => {
                button.addEventListener("click", async (event) => {
                    const id = Number(event.target.getAttribute("data-post-id"));
                    const message = document.getElementById("form-message");
                    message.textContent = "";
                    try {
                        await loadPostToForm(id);
                        renderPostList();
                    } catch (error) {
                        message.textContent = "修正データの読み込みに失敗しました: " + error.message;
                    }
                });
            });

            container.querySelectorAll(".delete-post-from-list").forEach((button) => {
                button.addEventListener("click", async (event) => {
                    const id = Number(event.target.getAttribute("data-post-id"));
                    const message = document.getElementById("form-message");
                    message.textContent = "";
                    const ok = window.confirm("この委員会活動を削除します。よろしいですか？");
                    if (!ok) {
                        return;
                    }

                    const target = currentPostList.find((item) => Number(item.id) === id);
                    if (!canDeletePost(target)) {
                        message.textContent = "削除できるのは作成者のみです。";
                        return;
                    }

                    const attachmentPaths = extractAttachmentPaths(target && target.attachments);
                    if (attachmentPaths.length > 0) {
                        const { error: fileDeleteError } = await dbClient.storage
                            .from("gian")
                            .remove(attachmentPaths);

                        if (fileDeleteError) {
                            message.textContent = "関連ファイルの削除に失敗しました: " + fileDeleteError.message;
                            return;
                        }
                    }

                    const { error } = await dbClient
                        .from("committee_activity_posts")
                        .delete()
                        .eq("id", id);

                    if (error) {
                        message.textContent = "削除に失敗しました: " + error.message;
                        return;
                    }

                    if (currentPostId && Number(currentPostId) === id) {
                        document.getElementById("committee-activity-form").reset();
                        await switchToNewMode();
                    }

                    const committeeName = document.getElementById("committee_name").value;
                    await loadPostsByCommittee(committeeName);
                    await loadActivityPostList(committeeName);
                    message.textContent = `削除しました（関連ファイル ${attachmentPaths.length} 件）。`;
                });
            });
        }

        async function loadActivityPostList(committeeName) {
            let query = dbClient
                .from("committee_activity_posts")
                .select("id,committee_name,activity_date,title,activity_content,attachments,created_by_user_id,created_by_email,created_by_name,created_at")
                .order("activity_date", { ascending: false })
                .order("id", { ascending: false })
                .limit(200);

            const { data, error } = await query;
            if (error) {
                throw error;
            }

            currentPostList = data || [];
            renderPostList();
        }

        async function resolveRecipients(committeeName) {
            const { data, error } = await dbClient
                .from("member_directory")
                .select("member_id,full_name,email,committee,is_giun,is_editorial_committee,is_current")
                .eq("is_current", true);

            if (error) {
                throw error;
            }

            const rows = data || [];
            const recipients = rows.filter((item) => {
                if (!item.email) return false;
                if (committeeName === "議会運営委員会") {
                    return item.is_giun === true;
                }
                if (committeeName === "編集委員会") {
                    return item.is_editorial_committee === true;
                }
                return normalizeCommitteeName(item.committee) === committeeName;
            });

            return recipients.map((item) => ({
                recipient_member_id: item.member_id || null,
                recipient_email: normalizeEmail(item.email),
                recipient_name: item.full_name || "",
                committee_name: committeeName,
                assigned_at: new Date().toISOString(),
                is_current_member: true,
                was_distributed: false
            }));
        }

        function setEditModeLabel() {
            const label = document.getElementById("edit-mode-label");
            const submitButton = document.getElementById("submit-button");
            if (currentMode === "edit") {
                label.textContent = "修正モードです。チェックを変更して公開先を更新できます。";
                submitButton.textContent = "更新";
            } else {
                label.textContent = "新規登録モードです。";
                submitButton.textContent = "登録";
            }
        }

        function renderRecipientList() {
            const container = document.getElementById("recipient-list");
            if (!currentRecipients.length) {
                container.innerHTML = '<p class="text-gray-500">委員会を選択すると配布先候補が表示されます。</p>';
                return;
            }

            container.innerHTML = currentRecipients.map((item, index) => {
                const status = item.was_distributed
                    ? '<span class="text-[11px] px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">配布済み</span>'
                    : '<span class="text-[11px] px-2 py-0.5 rounded bg-gray-200 text-gray-700">未配布</span>';
                const note = item.is_current_member ? "" : '<span class="text-[11px] text-amber-700">（現在は所属外）</span>';
                const checked = item.checked ? "checked" : "";
                return `
                    <label class="flex items-center justify-between gap-3 border border-gray-200 rounded px-3 py-2 bg-white">
                        <span class="flex items-center gap-2 min-w-0">
                            <input type="checkbox" class="recipient-checkbox" data-index="${index}" ${checked}>
                            <span class="truncate">${escapeHtml(item.recipient_name || "未設定")} <span class="text-xs text-gray-500">${escapeHtml(item.recipient_email || "")}</span> ${note}</span>
                        </span>
                        <span>${status}</span>
                    </label>
                `;
            }).join("");

            container.querySelectorAll(".recipient-checkbox").forEach((checkbox) => {
                checkbox.addEventListener("change", (event) => {
                    const idx = Number(event.target.getAttribute("data-index"));
                    currentRecipients[idx].checked = event.target.checked;
                });
            });
        }

        async function loadPostsByCommittee(committeeName) {
            const select = document.getElementById("existing_post_id");
            select.innerHTML = '<option value="">新規登録モード</option>';
            if (!committeeName) return;

            const { data, error } = await dbClient
                .from("committee_activity_posts")
                .select("id,activity_date,title")
                .eq("committee_name", committeeName)
                .order("activity_date", { ascending: false })
                .order("id", { ascending: false })
                .limit(100);

            if (error) {
                throw error;
            }

            (data || []).forEach((item) => {
                const option = document.createElement("option");
                option.value = String(item.id);
                option.textContent = `${item.activity_date || "日付未設定"} | ${item.title || "タイトル未設定"}`;
                select.appendChild(option);
            });
        }

        async function loadRecipientsForPost(postId) {
            const { data, error } = await dbClient
                .from("committee_activity_recipients")
                .select("recipient_member_id,recipient_email,recipient_name,committee_name")
                .eq("post_id", postId);

            if (error) {
                throw error;
            }

            return data || [];
        }

        function mergeRecipients(baseRecipients, deliveredRecipients, committeeName) {
            const byEmail = new Map();
            baseRecipients.forEach((item) => {
                byEmail.set(normalizeEmail(item.recipient_email), {
                    ...item,
                    committee_name: committeeName,
                    was_distributed: false,
                    checked: currentMode === "new"
                });
            });

            deliveredRecipients.forEach((item) => {
                const email = normalizeEmail(item.recipient_email);
                const current = byEmail.get(email);
                if (current) {
                    current.was_distributed = true;
                    current.checked = true;
                    current.recipient_member_id = current.recipient_member_id || item.recipient_member_id || null;
                    current.recipient_name = current.recipient_name || item.recipient_name || "";
                } else {
                    byEmail.set(email, {
                        recipient_member_id: item.recipient_member_id || null,
                        recipient_email: email,
                        recipient_name: item.recipient_name || "",
                        committee_name: committeeName,
                        assigned_at: new Date().toISOString(),
                        is_current_member: false,
                        was_distributed: true,
                        checked: true
                    });
                }
            });

            return Array.from(byEmail.values())
                .filter((item) => item.recipient_email)
                .sort((a, b) => a.recipient_name.localeCompare(b.recipient_name, "ja"));
        }

        async function refreshRecipientsByCommittee(committeeName) {
            if (!committeeName) {
                currentRecipients = [];
                existingRecipientMap = new Map();
                renderRecipientList();
                return;
            }

            const baseRecipients = await resolveRecipients(committeeName);
            let deliveredRecipients = [];
            if (currentMode === "edit" && currentPostId) {
                deliveredRecipients = await loadRecipientsForPost(currentPostId);
            }

            currentRecipients = mergeRecipients(baseRecipients, deliveredRecipients, committeeName);
            existingRecipientMap = new Map(
                deliveredRecipients.map((item) => [normalizeEmail(item.recipient_email), item])
            );
            renderRecipientList();
        }

        async function loadPostToForm(postId) {
            const { data, error } = await dbClient
                .from("committee_activity_posts")
                .select("id,committee_name,activity_date,title,activity_content,attachments")
                .eq("id", postId)
                .single();

            if (error) {
                throw error;
            }

            document.getElementById("committee_name").value = data.committee_name || "";
            document.getElementById("activity_date").value = data.activity_date || "";
            document.getElementById("activity_title").value = data.title || "";
            document.getElementById("activity_content").value = data.activity_content || "";
            currentPostAttachments = Array.isArray(data.attachments) ? data.attachments : [];
            currentPostId = data.id;
            currentMode = "edit";
            setEditModeLabel();
            await loadPostsByCommittee(data.committee_name || "");
            document.getElementById("existing_post_id").value = String(data.id);
            await refreshRecipientsByCommittee(data.committee_name || "");
        }

        async function switchToNewMode() {
            currentMode = "new";
            currentPostId = null;
            currentPostAttachments = [];
            document.getElementById("existing_post_id").value = "";
            setEditModeLabel();
            const committeeName = document.getElementById("committee_name").value;
            await refreshRecipientsByCommittee(committeeName);
        }

        async function uploadFiles(files) {
            const uploaded = [];
            for (let i = 0; i < files.length; i += 1) {
                const file = files[i];
                const safeName = String(file.name || `file_${i}`).replace(/[^a-zA-Z0-9._-]/g, "_");
                const path = `committee-materials/${Date.now()}_${i}_${safeName}`;

                const { error } = await dbClient.storage
                    .from("gian")
                    .upload(path, file);

                if (error) {
                    throw new Error(`ファイルアップロード失敗: ${file.name} (${error.message})`);
                }

                const { data } = dbClient.storage.from("gian").getPublicUrl(path);
                uploaded.push({
                    name: file.name,
                    path,
                    url: data && data.publicUrl ? data.publicUrl : ""
                });
            }
            return uploaded;
        }

        async function saveCommitteeActivity(event) {
            event.preventDefault();
            const message = document.getElementById("form-message");
            message.textContent = "";

            if (!currentUserEmail) {
                message.textContent = "ログインメールの取得に失敗しました。再ログイン後に再試行してください。";
                return;
            }

            const committeeName = document.getElementById("committee_name").value;
            const activityDate = document.getElementById("activity_date").value;
            const title = document.getElementById("activity_title").value.trim();
            const content = document.getElementById("activity_content").value.trim();
            const files = Array.from(document.getElementById("activity_files").files || []);

            if (!committeeName || !activityDate || !title || !content) {
                message.textContent = "委員会、活動日、タイトル、活動内容を入力してください。";
                return;
            }

            if (!currentRecipients.length) {
                message.textContent = "配布先候補がありません。委員会を選択してください。";
                return;
            }

            const recipients = currentRecipients.filter((item) => item.checked);
            if (recipients.length === 0) {
                message.textContent = "配布先を1人以上チェックしてください。";
                return;
            }

            try {
                await loadPostsByCommittee(committeeName);
            } catch (error) {
                message.textContent = "既存データの取得に失敗しました: " + error.message;
                return;
            }

            let uploadedAttachments = [];
            try {
                uploadedAttachments = await uploadFiles(files);
            } catch (error) {
                message.textContent = error.message;
                return;
            }

            const attachments = (currentMode === "edit")
                ? (currentPostAttachments || []).concat(uploadedAttachments)
                : uploadedAttachments;

            const postPayload = {
                committee_name: committeeName,
                activity_date: activityDate,
                title,
                activity_content: content,
                attachments,
                created_by_user_id: currentUserId,
                created_by_email: currentUserEmail,
                created_by_name: currentUserName || "未設定",
                updated_at: new Date().toISOString()
            };

            let targetPostId = currentPostId;
            let postError = null;

            if (currentMode === "edit" && targetPostId) {
                const { error } = await dbClient
                    .from("committee_activity_posts")
                    .update(postPayload)
                    .eq("id", targetPostId);
                postError = error;
            } else {
                const { data: postData, error } = await dbClient
                    .from("committee_activity_posts")
                    .insert(postPayload)
                    .select("id")
                    .single();
                postError = error;
                targetPostId = postData ? postData.id : null;
            }

            if (postError) {
                message.textContent = "活動情報の保存に失敗しました: " + postError.message;
                return;
            }

            if (!targetPostId) {
                message.textContent = "活動情報の保存後IDが取得できませんでした。";
                return;
            }

            if (currentMode === "edit") {
                const { error: deleteError } = await dbClient
                    .from("committee_activity_recipients")
                    .delete()
                    .eq("post_id", targetPostId);
                if (deleteError) {
                    message.textContent = "既存配布先の更新に失敗しました: " + deleteError.message;
                    return;
                }
            }

            const recipientRows = recipients.map((item) => ({
                post_id: targetPostId,
                recipient_member_id: item.recipient_member_id,
                recipient_email: item.recipient_email,
                recipient_name: item.recipient_name,
                committee_name: committeeName,
                assigned_at: new Date().toISOString()
            }));

            const { error: recipientError } = await dbClient
                .from("committee_activity_recipients")
                .insert(recipientRows);

            if (recipientError) {
                message.textContent = "配布先の保存に失敗しました: " + recipientError.message;
                return;
            }

            message.textContent = currentMode === "edit"
                ? `更新しました（公開対象 ${recipientRows.length} 人）。`
                : `登録しました（公開対象 ${recipientRows.length} 人）。`;

            if (currentMode === "new") {
                document.getElementById("committee-activity-form").reset();
                await switchToNewMode();
            } else {
                await loadPostToForm(targetPostId);
            }

            await loadActivityPostList(committeeName);
        }

        document.getElementById("committee-activity-form").addEventListener("submit", saveCommitteeActivity);
        document.getElementById("clear-form").addEventListener("click", () => {
            document.getElementById("committee-activity-form").reset();
            document.getElementById("form-message").textContent = "";
            currentRecipients = [];
            existingRecipientMap = new Map();
            currentPostAttachments = [];
            currentMode = "new";
            currentPostId = null;
            setEditModeLabel();
            renderRecipientList();
            renderPostList();
        });

        document.getElementById("check-all-recipients").addEventListener("click", () => {
            currentRecipients = currentRecipients.map((item) => ({ ...item, checked: true }));
            renderRecipientList();
        });

        document.getElementById("uncheck-all-recipients").addEventListener("click", () => {
            currentRecipients = currentRecipients.map((item) => ({ ...item, checked: false }));
            renderRecipientList();
        });

        document.getElementById("committee_name").addEventListener("change", async (event) => {
            const committeeName = event.target.value;
            const message = document.getElementById("form-message");
            message.textContent = "";
            try {
                await loadPostsByCommittee(committeeName);
                await switchToNewMode();
                document.getElementById("list_filter_committee").value = committeeName || "";
                await loadActivityPostList(committeeName);
            } catch (error) {
                message.textContent = "委員会情報の読み込みに失敗しました: " + error.message;
            }
        });

        document.getElementById("existing_post_id").addEventListener("change", async (event) => {
            const postId = event.target.value;
            const message = document.getElementById("form-message");
            message.textContent = "";
            try {
                if (!postId) {
                    await switchToNewMode();
                    return;
                }
                await loadPostToForm(Number(postId));
            } catch (error) {
                message.textContent = "修正データの読み込みに失敗しました: " + error.message;
            }
        });

        document.getElementById("switch-new-mode").addEventListener("click", async () => {
            await switchToNewMode();
            renderPostList();
        });

        document.getElementById("refresh-post-list").addEventListener("click", async () => {
            const committeeName = document.getElementById("committee_name").value;
            const summary = document.getElementById("post-list-summary");
            summary.textContent = "再読み込み中...";
            try {
                await loadActivityPostList(committeeName);
            } catch (error) {
                summary.textContent = "一覧の取得に失敗しました: " + error.message;
            }
        });

        document.getElementById("list_filter_committee").addEventListener("change", () => {
            renderPostList();
        });

        document.getElementById("list_filter_keyword").addEventListener("input", () => {
            renderPostList();
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            hideDisplayName: true,
            returnTo: "committee-activity-settings.html",
            onReady: async ({ client, session, profile }) => {
                dbClient = client;
                const sessionUser = session && session.user ? session.user : null;
                currentUserId = sessionUser && sessionUser.id ? sessionUser.id : null;
                currentUserEmail = normalizeEmail(
                    (sessionUser && sessionUser.email)
                    || (session && session.email)
                    || (profile && profile.email)
                    || ""
                );
                currentUserName =
                    (sessionUser && (sessionUser.user_metadata && (sessionUser.user_metadata.display_name || sessionUser.user_metadata.name)))
                    || (session && session.displayName)
                    || (profile && profile.display_name)
                    || currentUserEmail
                    || "未設定";

                setEditModeLabel();
                renderRecipientList();
                await loadActivityPostList("");
            }
        });
    </script>
</body>
</html>
