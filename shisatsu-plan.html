<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視察計画 | 議員ナレッジ共有</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="knowledge.html" class="text-lg font-bold hover:text-gray-200"><i class="fas fa-book mr-2"></i>議員ナレッジ共有</a>
            <span class="text-sm">視察計画</span>
        </div>
    </header>
    <main class="container mx-auto py-8 px-4">
        <div class="mb-6"><a href="knowledge.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold"><i class="fas fa-chevron-left mr-1"></i>ナレッジトップへ戻る</a></div>
        <h1 class="text-3xl font-bold mb-2">視察計画</h1>
        <p class="text-gray-600 mb-6">委員会ごとのボタンから次ページを開き、Googleドキュメントで計画状況を確認できます。</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <a href="plan-soumu.html" class="bg-white rounded-xl p-5 shadow-sm border-t-4 border-indigo-500 hover:shadow-md transition">
                <h2 class="font-bold text-lg mb-2">総務常任委員会</h2>
                <p class="text-sm text-gray-600">視察計画状況を開く</p>
            </a>
            <a href="plan-sangyo-kensetsu.html" class="bg-white rounded-xl p-5 shadow-sm border-t-4 border-green-500 hover:shadow-md transition">
                <h2 class="font-bold text-lg mb-2">産業建設常任委員会</h2>
                <p class="text-sm text-gray-600">視察計画状況を開く</p>
            </a>
            <a href="plan-kyoiku-minsei.html" class="bg-white rounded-xl p-5 shadow-sm border-t-4 border-orange-500 hover:shadow-md transition">
                <h2 class="font-bold text-lg mb-2">教育民生常任委員会</h2>
                <p class="text-sm text-gray-600">視察計画状況を開く</p>
            </a>
        </div>

        <div class="bg-white rounded-xl p-5 shadow-sm mt-6 border border-gray-200">
            <h2 class="font-bold text-lg mb-3">運用メモ</h2>
            <p class="text-sm text-gray-700">各委員会ページのGoogleドキュメントURLは、ページ内の「Googleドキュメントを別タブで開く」リンク先を変更すると差し替えできます。</p>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "shisatsu-plan.html"
        });
    </script>
</body>
</html>
