<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ登録 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
            </a>
            <div class="text-right">
                <span class="text-sm">お知らせ登録</span>
                <div id="authArea"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6 flex flex-wrap gap-3">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルに戻る
            </a>
            <a href="announcements.html" class="text-rose-700 hover:text-rose-900 text-sm font-semibold">
                <i class="fas fa-list mr-1"></i>お知らせ一覧へ
            </a>
        </div>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-rose-500">
            <h1 class="text-2xl font-bold mb-2 text-gray-700">お知らせ登録</h1>
            <p class="text-sm text-gray-600 mb-5">このページは全員が開けます。登録者名はログイン中の利用者名で自動保存されます。</p>

            <form id="announcement-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-sm font-semibold text-gray-700">日付</label>
                    <input id="notice_date" type="date" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">タイトル</label>
                    <input id="notice_title" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="例: 6月定例会資料の更新">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">開始時間</label>
                    <input id="start_time" type="time" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">終了時間</label>
                    <input id="end_time" type="time" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">内容</label>
                    <textarea id="notice_content" rows="3" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="お知らせ本文を入力"></textarea>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">登録者</label>
                    <input id="owner_name_display" readonly class="mt-1 w-full border border-gray-200 bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-700">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">連絡先電話</label>
                    <input id="contact_phone" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="例: 088-000-0000">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">連絡先メール</label>
                    <input id="contact_email" type="email" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="example@nankoku.lg.jp">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">備考</label>
                    <input id="remarks" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="補足事項があれば入力">
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">配信対象</label>
                    <div class="mt-2 space-y-2">
                        <label class="flex items-center gap-2">
                            <input id="visibility_all" type="radio" name="visibility" value="all" checked class="w-4 h-4">
                            <span class="text-sm">全員に配信</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input id="visibility_specific" type="radio" name="visibility" value="specific" class="w-4 h-4">
                            <span class="text-sm">特定のメンバーのみに配信</span>
                        </label>
                    </div>
                </div>
                <div class="md:col-span-2">
                    <label class="flex items-center gap-2">
                        <input id="attendance_required" type="checkbox" class="w-4 h-4">
                        <span class="text-sm font-semibold text-gray-700">このお知らせで出欠確認を行う</span>
                    </label>
                </div>
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700">回答期限（出欠確認ありの場合）</label>
                    <input id="attendance_deadline" type="datetime-local" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" disabled>
                </div>
                <div class="md:col-span-2">
                    <label class="flex items-center gap-2">
                        <input id="google_calendar_invite" type="checkbox" class="w-4 h-4">
                        <span class="text-sm font-semibold text-gray-700">Googleカレンダーで配信対象を参加者招待する</span>
                    </label>
                    <p class="text-xs text-gray-500 mt-1">有効にすると、登録者のGoogleカレンダーで予定を作成し、配信対象へ招待を送信します。</p>
                </div>
                <div id="specific-members-section" class="md:col-span-2 hidden">
                    <label class="text-sm font-semibold text-gray-700 block mb-2">グループ選択（複数可）</label>
                    <div id="member-group-list" class="border border-gray-300 rounded-lg p-3 bg-gray-50 mb-3">
                        <p class="text-sm text-gray-500">グループ読み込み中...</p>
                    </div>
                    <label class="text-sm font-semibold text-gray-700 block mb-2">配信対象メンバー</label>
                    <div id="members-list" class="border border-gray-300 rounded-lg p-3 max-h-48 overflow-y-auto bg-gray-50">
                        <p class="text-sm text-gray-500">メンバー読み込み中...</p>
                    </div>
                </div>

                <div class="md:col-span-2 flex gap-3">
                    <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded-lg text-sm font-semibold">登録</button>
                    <button type="button" id="announcement-clear" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-lg text-sm font-semibold">クリア</button>
                </div>
            </form>
            <p id="announcement-message" class="mt-3 text-sm text-gray-600"></p>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;
        let currentOwnerName = "";
        let currentUserEmail = "";
        let allMembers = [];

            function escapeHtml(value) {
                return String(value || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function isAnnouncementRecipientsTableMissing(error) {
                const message = String(error?.message || "").toLowerCase();
                const details = String(error?.details || "").toLowerCase();
                const hint = String(error?.hint || "").toLowerCase();
                return (
                    message.includes("could not find the table 'public.announcement_recipients'") ||
                    message.includes('relation "public.announcement_recipients" does not exist') ||
                    details.includes("public.announcement_recipients") ||
                    hint.includes("public.announcement_recipients")
                );
            }

            function buildAnnouncementRecipientsMissingMessage() {
                return "配信対象テーブル(public.announcement_recipients)が未反映です。Supabase SQL Editor で supabase_setup.sql を実行後、NOTIFY pgrst, 'reload schema'; を実行してください。";
            }

        const MEMBER_GROUPS = [
            { id: "leaders", label: "正副議長" },
            { id: "giun", label: "議会運営委員会" },
            { id: "soumu", label: "総務委員会" },
            { id: "sangyo", label: "産業建設委員会" },
            { id: "kyoiku", label: "教育民生委員会" },
            { id: "editorial", label: "編集委員会" }
        ];

        function clearForm() {
            document.getElementById("announcement-form").reset();
            document.getElementById("owner_name_display").value = currentOwnerName || "";
            document.getElementById("visibility_all").checked = true;
            document.getElementById("visibility_specific").checked = false;
            document.getElementById("attendance_required").checked = false;
            document.getElementById("attendance_deadline").value = "";
            document.getElementById("attendance_deadline").disabled = true;
            document.getElementById("google_calendar_invite").checked = false;
            document.getElementById("specific-members-section").classList.add("hidden");
            document.querySelectorAll("#member-group-list .member-group-checkbox").forEach((checkbox) => {
                checkbox.checked = false;
            });
        }

        function resolveOwnerName(session, profile) {
            return (session && session.displayName)
                || (profile && profile.display_name)
                || (session && session.email)
                || "未設定";
        }

        async function loadMembers() {
            const { data, error } = await dbClient
                .from("member_directory")
                .select("email, full_name, seat_number, category, position_name, committee, is_giun, is_editorial_committee")
                .eq("is_current", true)
                .order("seat_number", { ascending: true, nullsFirst: false })
                .order("full_name", { ascending: true });

            if (error) {
                console.error("メンバー読み込みエラー:", error);
                return;
            }

            allMembers = (data || []).slice().sort(compareMembersForDisplay);
            renderGroupList();
            renderMembersList();
        }

        function normalizeText(value) {
            return String(value || "").replace(/\s+/g, "").trim();
        }

        function normalizeSeatNumber(value) {
            if (value === null || value === undefined || value === "") {
                return null;
            }
            const n = Number(value);
            if (!Number.isInteger(n) || n <= 0) {
                return null;
            }
            return n;
        }

        function categorySortValue(member) {
            const category = String((member && member.category) || "").trim();
            if (category === "議員") return 1;
            if (category === "職員") return 2;
            return 3;
        }

        function compareMembersForDisplay(a, b) {
            const categoryDiff = categorySortValue(a) - categorySortValue(b);
            if (categoryDiff !== 0) return categoryDiff;

            const seatA = normalizeSeatNumber(a && a.seat_number);
            const seatB = normalizeSeatNumber(b && b.seat_number);
            const seatValueA = seatA === null ? Number.MAX_SAFE_INTEGER : seatA;
            const seatValueB = seatB === null ? Number.MAX_SAFE_INTEGER : seatB;
            const seatDiff = seatValueA - seatValueB;
            if (seatDiff !== 0) return seatDiff;

            return String(a && a.full_name ? a.full_name : "").localeCompare(String(b && b.full_name ? b.full_name : ""), "ja");
        }

        function memberBelongsToGroup(member, groupId) {
            const positionName = String(member.position_name || "").trim();
            const committeeName = normalizeText(member.committee);

            if (groupId === "leaders") {
                return positionName === "議長" || positionName === "副議長";
            }
            if (groupId === "giun") {
                return Boolean(member.is_giun);
            }
            if (groupId === "soumu") {
                return committeeName.includes("総務委員会");
            }
            if (groupId === "sangyo") {
                return committeeName.includes("産業建設委員会");
            }
            if (groupId === "kyoiku") {
                return committeeName.includes("教育民生委員会");
            }
            if (groupId === "editorial") {
                return Boolean(member.is_editorial_committee);
            }

            return false;
        }

        function applyGroupSelectionToMembers() {
            const selectedGroupIds = new Set(
                Array.from(document.querySelectorAll("#member-group-list .member-group-checkbox:checked")).map((checkbox) => checkbox.value)
            );

            document.querySelectorAll("#members-list .member-checkbox").forEach((checkbox) => {
                const member = allMembers.find((item) => item.email === checkbox.value);
                if (!member) {
                    return;
                }
                const shouldSelect = Array.from(selectedGroupIds).some((groupId) => memberBelongsToGroup(member, groupId));
                checkbox.checked = shouldSelect;
            });
        }

        function buildCalendarDateTime(dateValue, timeValue) {
            const time = String(timeValue || "00:00").slice(0, 5);
            return `${dateValue}T${time}:00+09:00`;
        }

        function getRecipientEmails(visibility, selectedMembers) {
            if (visibility === "specific") {
                return Array.from(new Set(selectedMembers.map((email) => normalizeEmail(email)).filter(Boolean)));
            }

            return Array.from(
                new Set(
                    allMembers
                        .map((member) => normalizeEmail(member.email))
                        .filter(Boolean)
                )
            );
        }

        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        async function getGoogleProviderToken(client) {
            const { data, error } = await client.auth.getSession();
            if (!error && data && data.session && data.session.provider_token) {
                localStorage.setItem("portal_google_provider_token", data.session.provider_token);
                return data.session.provider_token;
            }

            const { data: refreshedData, error: refreshError } = await client.auth.refreshSession();
            if (!refreshError && refreshedData && refreshedData.session && refreshedData.session.provider_token) {
                localStorage.setItem("portal_google_provider_token", refreshedData.session.provider_token);
                return refreshedData.session.provider_token;
            }

            return localStorage.getItem("portal_google_provider_token") || null;
        }

        function buildFriendlyGoogleError(detailText) {
            const raw = String(detailText || "").trim();
            let parsed = null;
            try {
                parsed = JSON.parse(raw);
            } catch (_error) {
                parsed = null;
            }

            const err = parsed && parsed.error ? parsed.error : null;
            const reason = (err && err.errors && err.errors[0] && err.errors[0].reason) || "";
            const status = (err && err.status) || "";
            const message = (err && err.message) || raw;

            if (status === "PERMISSION_DENIED" || reason === "accessNotConfigured") {
                return "Google Calendar API が未有効です。管理者が Google Cloud で1回有効化すれば、一般ユーザーの追加設定は不要です。反映まで数分待って再実行してください。";
            }

            if (reason === "insufficientPermissions" || reason === "forbidden" || /insufficient.*scope/i.test(message)) {
                return "Google権限が不足しています。ログアウト後に再ログインして、Googleの権限同意を許可してください。";
            }

            if (reason === "authError" || /invalid credentials|unauthenticated/i.test(message)) {
                return "認証トークンが無効です。ログアウト後に再ログインして再実行してください。";
            }

            return message || "Google Calendar APIエラー";
        }

        async function createGoogleCalendarInvite(client, payload, recipientEmails) {
            const providerToken = await getGoogleProviderToken(client);
            if (!providerToken) {
                return { ok: false, reason: "Google再ログイン後に実行してください（Calendar権限が不足している可能性があります）。" };
            }

            if (!payload.notice_date || !payload.start_time || !payload.end_time) {
                return { ok: false, reason: "日付または時刻が不足しています。" };
            }

            const descriptionLines = [
                payload.content || "",
                payload.contact_phone ? `連絡先電話: ${payload.contact_phone}` : "",
                payload.contact_email ? `連絡先メール: ${payload.contact_email}` : "",
                payload.remarks ? `備考: ${payload.remarks}` : "",
                payload.attendance_required ? "出欠確認あり" : ""
            ].filter(Boolean);

            const eventPayload = {
                summary: payload.title,
                description: descriptionLines.join("\n"),
                start: {
                    dateTime: buildCalendarDateTime(payload.notice_date, payload.start_time),
                    timeZone: "Asia/Tokyo"
                },
                end: {
                    dateTime: buildCalendarDateTime(payload.notice_date, payload.end_time),
                    timeZone: "Asia/Tokyo"
                },
                attendees: recipientEmails.map((email) => ({ email }))
            };

            const response = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?sendUpdates=all", {
                method: "POST",
                headers: {
                    Authorization: `Bearer ${providerToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(eventPayload)
            });

            if (!response.ok) {
                const detail = await response.text();
                return { ok: false, reason: buildFriendlyGoogleError(detail) };
            }

            const eventData = await response.json();
            return {
                ok: true,
                eventId: eventData.id || null,
                htmlLink: eventData.htmlLink || null
            };
        }

        async function writeAuditLog(client, { actionType, targetEmail = "", beforeValue = "", afterValue = "", note = "" }) {
            try {
                await client.from("audit_log").insert({
                    actor_email: currentUserEmail || "不明",
                    target_email: targetEmail,
                    action_type: actionType,
                    before_value: beforeValue,
                    after_value: afterValue,
                    note
                });
            } catch (_err) {
                // 監査ログ失敗は画面操作を止めない
            }
        }

        function renderGroupList() {
            const container = document.getElementById("member-group-list");
            container.innerHTML = MEMBER_GROUPS.map((group) => `
                <label class="inline-flex items-center gap-2 p-2 mr-3 mb-2 hover:bg-white rounded cursor-pointer">
                    <input type="checkbox" value="${group.id}" class="member-group-checkbox w-4 h-4">
                    <span class="text-sm">${group.label}</span>
                </label>
            `).join("");

            container.querySelectorAll(".member-group-checkbox").forEach((checkbox) => {
                checkbox.addEventListener("change", applyGroupSelectionToMembers);
            });
        }

        function renderMembersList() {
            const container = document.getElementById("members-list");
            if (allMembers.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500">メンバーがいません。</p>';
                return;
            }

            container.innerHTML = allMembers.map((member, idx) => `
                <label class="flex items-center gap-2 p-2 hover:bg-white rounded cursor-pointer">
                    <input type="checkbox" value="${member.email}" class="member-checkbox w-4 h-4">
                    <span class="text-sm">${member.full_name} (${member.email})</span>
                </label>
            `).join("");
        }

        async function saveAnnouncement(event) {
            event.preventDefault();

            const visibility = document.querySelector('input[name="visibility"]:checked').value;
            let selectedMembers = [];
            
            if (visibility === "specific") {
                const checkboxes = document.querySelectorAll(".member-checkbox:checked");
                if (checkboxes.length === 0) {
                    document.getElementById("announcement-message").textContent = "配信対象メンバーを選択してください。";
                    return;
                }
                selectedMembers = Array.from(checkboxes).map(cb => cb.value);
            }

            const payload = {
                notice_date: document.getElementById("notice_date").value,
                start_time: document.getElementById("start_time").value,
                end_time: document.getElementById("end_time").value,
                title: document.getElementById("notice_title").value.trim(),
                content: document.getElementById("notice_content").value.trim(),
                owner_name: currentOwnerName || "未設定",
                contact_phone: document.getElementById("contact_phone").value.trim() || null,
                contact_email: document.getElementById("contact_email").value.trim() || null,
                remarks: document.getElementById("remarks").value.trim() || null,
                attendance_required: document.getElementById("attendance_required").checked,
                attendance_deadline: null,
                visibility: visibility,
                updated_at: new Date().toISOString()
            };
            const useGoogleInvite = document.getElementById("google_calendar_invite").checked;

            if (!payload.notice_date || !payload.start_time || !payload.end_time || !payload.title || !payload.content) {
                document.getElementById("announcement-message").textContent = "必須項目を入力してください。";
                return;
            }

            if (payload.start_time > payload.end_time) {
                document.getElementById("announcement-message").textContent = "時間の入力を確認してください（開始時間 <= 終了時間）。";
                return;
            }

            if (payload.attendance_required) {
                const deadlineInput = document.getElementById("attendance_deadline").value;
                if (!deadlineInput) {
                    document.getElementById("announcement-message").textContent = "出欠確認を行う場合は回答期限を入力してください。";
                    return;
                }
                payload.attendance_deadline = new Date(deadlineInput).toISOString();
            }

            const { data, error } = await dbClient
                .from("announcements")
                .insert(payload)
                .select();

            if (error) {
                document.getElementById("announcement-message").textContent = "登録失敗: " + error.message;
                return;
            }

            const announcementNo = data[0]?.no;

            // 配信対象を登録
            if (visibility === "specific" && selectedMembers.length > 0) {
                const recipients = selectedMembers.map(email => {
                    const member = allMembers.find(m => m.email === email);
                    return {
                        announcement_no: announcementNo,
                        recipient_email: email,
                        recipient_name: member?.full_name || email
                    };
                });

                const { error: recipientError } = await dbClient
                    .from("announcement_recipients")
                    .insert(recipients);

                if (recipientError) {
                        document.getElementById("announcement-message").textContent = isAnnouncementRecipientsTableMissing(recipientError)
                            ? buildAnnouncementRecipientsMissingMessage()
                            : "配信対象の保存に失敗しました: " + recipientError.message;
                    return;
                }
            }

            if (useGoogleInvite) {
                const recipientEmails = getRecipientEmails(visibility, selectedMembers);
                if (recipientEmails.length === 0) {
                    await writeAuditLog(dbClient, {
                        actionType: "Google招待同期失敗",
                        targetEmail: currentUserEmail || "",
                        beforeValue: `announcement_no=${announcementNo || "none"}; mode=create; event_id=none`,
                        afterValue: "failed",
                        note: "recipient_count=0"
                    });
                    document.getElementById("announcement-message").textContent = "登録しました（Google招待対象メールが0件のため、カレンダー招待は送信していません）。";
                    clearForm();
                    return;
                }

                const inviteResult = await createGoogleCalendarInvite(dbClient, payload, recipientEmails);
                if (!inviteResult.ok) {
                    await writeAuditLog(dbClient, {
                        actionType: "Google招待同期失敗",
                        targetEmail: currentUserEmail || "",
                        beforeValue: `announcement_no=${announcementNo || "none"}; mode=create; event_id=none`,
                        afterValue: "failed",
                        note: inviteResult.reason || "unknown"
                    });
                    document.getElementById("announcement-message").textContent = `登録しました（Google招待に失敗: ${inviteResult.reason}）`;
                    clearForm();
                    return;
                }

                if (announcementNo && inviteResult.eventId) {
                    const { error: calendarUpdateError } = await dbClient
                        .from("announcements")
                        .update({
                            google_calendar_event_id: inviteResult.eventId,
                            google_calendar_event_link: inviteResult.htmlLink || null,
                            google_calendar_synced_at: new Date().toISOString()
                        })
                        .eq("no", announcementNo);

                    if (calendarUpdateError) {
                        await writeAuditLog(dbClient, {
                            actionType: "Google招待同期失敗",
                            targetEmail: currentUserEmail || "",
                            beforeValue: `announcement_no=${announcementNo}; mode=create; event_id=none`,
                            afterValue: "calendar_synced_but_db_save_failed",
                            note: calendarUpdateError.message || "db save failed"
                        });
                        document.getElementById("announcement-message").textContent = `登録とGoogle招待は完了しましたが、連携情報の保存に失敗しました: ${calendarUpdateError.message}`;
                        clearForm();
                        return;
                    }
                }

                await writeAuditLog(dbClient, {
                    actionType: "Google招待同期",
                    targetEmail: currentUserEmail || "",
                    beforeValue: `announcement_no=${announcementNo || "none"}; mode=create; event_id=none`,
                    afterValue: `event_id=${inviteResult.eventId || "none"}`,
                    note: `recipient_count=${recipientEmails.length}`
                });

                document.getElementById("announcement-message").textContent = `登録しました。Google招待も送信しました（${recipientEmails.length}名）。`;
                clearForm();
                return;
            }

            document.getElementById("announcement-message").textContent = "登録しました。";
            clearForm();
        }

        // 配信対象の表示・非表示切り替え
        document.querySelectorAll('input[name="visibility"]').forEach(radio => {
            radio.addEventListener("change", () => {
                const section = document.getElementById("specific-members-section");
                if (radio.value === "specific" && radio.checked) {
                    section.classList.remove("hidden");
                } else {
                    section.classList.add("hidden");
                }
            });
        });

        document.getElementById("attendance_required").addEventListener("change", (event) => {
            const deadlineInput = document.getElementById("attendance_deadline");
            const isRequired = Boolean(event.target.checked);
            deadlineInput.disabled = !isRequired;
            if (!isRequired) {
                deadlineInput.value = "";
            }
        });

        document.getElementById("announcement-form").addEventListener("submit", saveAnnouncement);
        document.getElementById("announcement-clear").addEventListener("click", clearForm);

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            hideDisplayName: true,
            returnTo: "announcement-register.html",
            onReady: async ({ client, session, profile }) => {
                dbClient = client;
                currentOwnerName = resolveOwnerName(session, profile);
                currentUserEmail = (session && session.email) || (profile && profile.email) || "";
                document.getElementById("owner_name_display").value = currentOwnerName;
                await loadMembers();
            }
        });
    </script>
</body>
</html>
