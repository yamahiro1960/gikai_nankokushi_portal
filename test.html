<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テストHTML</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #0f766e;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #e7f7f3 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, #fef3c7 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 3vw, 2rem);
      color: var(--accent);
    }

    p {
      margin: 0;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main>
    <h1>テストHTML</h1>
    <p>このページはテスト用に新規作成されました。</p>
  </main>
</body>
</html>
